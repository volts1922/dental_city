// ── PWA Service Worker Registration ──────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js')
      .then(reg=>{ console.log('✅ DentalCity PWA ready — offline support enabled'); })
      .catch(err=>{ console.warn('SW registration failed:', err); });
  });
}

// ── PWA Install Prompt ────────────────────────────────────────────────────────
let _pwaInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  _pwaInstallPrompt = e;
  // Show install banner after login
  setTimeout(_showPWABanner, 3000);
});

function _showPWABanner(){
  if(!_pwaInstallPrompt || !_appUnlocked) return;
  if(localStorage.getItem('pwa_dismissed')) return;

  const banner = document.createElement('div');
  banner.id = 'pwaBanner';
  banner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:12px;box-shadow:var(--shadow-lg);z-index:998;display:flex;align-items:center;gap:12px;font-size:13px;font-weight:500;max-width:340px;width:90%;border:1px solid rgba(255,255,255,0.1)';
  banner.innerHTML = `
    <span style="font-size:24px">🦷</span>
    <div style="flex:1">
      <div style="font-weight:700;margin-bottom:2px">Install DentalCity App</div>
      <div style="font-size:11px;opacity:.7">Add to home screen for offline access</div>
    </div>
    <button onclick="installPWA()" style="background:var(--blue);color:#fff;border:none;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">Install</button>
    <button onclick="dismissPWA()" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:20px;cursor:pointer;padding:0 4px;line-height:1">×</button>`;
  document.body.appendChild(banner);
}

function installPWA(){
  if(!_pwaInstallPrompt) return;
  _pwaInstallPrompt.prompt();
  _pwaInstallPrompt.userChoice.then(result=>{
    if(result.outcome === 'accepted'){
      toast('🎉 DentalCity installed! Check your home screen.');
    }
    _pwaInstallPrompt = null;
    dismissPWA();
  });
}

function dismissPWA(){
  localStorage.setItem('pwa_dismissed', '1');
  const b = document.getElementById('pwaBanner');
  if(b) b.remove();
}

// iOS Safari install instructions
window.addEventListener('load', ()=>{
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches;
  if(isIOS && !isInStandaloneMode && !localStorage.getItem('pwa_dismissed')){
    setTimeout(()=>{
      if(!_appUnlocked) return;
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:14px 18px;border-radius:12px;box-shadow:var(--shadow-lg);z-index:998;font-size:12px;max-width:300px;width:90%;text-align:center;border:1px solid rgba(255,255,255,0.1)';
      banner.innerHTML = `
        <div style="font-size:22px;margin-bottom:8px">🦷</div>
        <div style="font-weight:700;margin-bottom:6px">Install DentalCity</div>
        <div style="opacity:.8;line-height:1.5">Tap <b>Share</b> then <b>"Add to Home Screen"</b> to install the app</div>
        <button onclick="this.parentElement.remove();localStorage.setItem('pwa_dismissed','1')" style="margin-top:10px;background:rgba(255,255,255,0.15);border:none;color:#fff;padding:6px 16px;border-radius:8px;font-size:12px;cursor:pointer">Got it</button>`;
      document.body.appendChild(banner);
    }, 3000);
  }
});
buildNav();
// Don't navigate on load — wait for login first
// Focus the username field
document.getElementById('loginUser').focus();

// ── Login button — works on all browsers including iOS Safari & Edge ──────────
var _loginFired = false;
(function(){
  var btn = document.getElementById('loginBtn');
  if(!btn) return;
  btn.addEventListener('touchstart', function(){ _loginFired = false; }, {passive:true});
  btn.addEventListener('touchend', function(e){
    e.preventDefault();
    if(_loginFired) return;
    _loginFired = true;
    doLogin();
  });
})();

// ══════════════════════════════════════════════════════════════════════════════
// ⏱ SESSION AUTO-LOGOUT — 15 minutes of inactivity
// ══════════════════════════════════════════════════════════════════════════════
const _IDLE_MINUTES = 15;
let _idleTimer = null;
let _idleWarnTimer = null;

function _resetIdleTimer(){
  if(!_appUnlocked) return;
  clearTimeout(_idleTimer);
  clearTimeout(_idleWarnTimer);
  // Warn at 13 minutes
  _idleWarnTimer = setTimeout(()=>{
    if(_appUnlocked) toast('⏱ Session expiring in 2 minutes due to inactivity…', 6000);
  }, (_IDLE_MINUTES - 2) * 60 * 1000);
  // Auto-logout at 15 minutes
  _idleTimer = setTimeout(()=>{
    if(_appUnlocked) doLogout(true);
  }, _IDLE_MINUTES * 60 * 1000);
}

function _clearIdleTimer(){
  clearTimeout(_idleTimer);
  clearTimeout(_idleWarnTimer);
}

// Reset timer on any user activity
['mousemove','keydown','click','touchstart','scroll'].forEach(evt=>{
  document.addEventListener(evt, ()=>{ if(_appUnlocked) _resetIdleTimer(); }, {passive:true});
});


// ── 1. Warn before closing — only after user has logged in ───────────────────
window.addEventListener('beforeunload', function(e){
  if(!_appUnlocked) return;
  e.preventDefault();
  e.returnValue = '';
});

// ── 2. Block right-click — but allow inside form inputs ──────────────────────
document.addEventListener('contextmenu', function(e){
  const tag = e.target.tagName;
  if(tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if(e.target.closest('.modal') || e.target.closest('.overlay')) return;
  e.preventDefault();
});

// ── 3. Block keyboard shortcuts — only AFTER login ───────────────────────────
document.addEventListener('keydown', function(e){
  if(!_appUnlocked) return; // ← don't block anything on login screen
  if(e.ctrlKey && e.key === 't'){ e.preventDefault(); }
  if(e.ctrlKey && e.key === 'n'){ e.preventDefault(); }
  if(e.ctrlKey && e.key === 'w'){ e.preventDefault(); }
  if(e.ctrlKey && e.key === 'u'){ e.preventDefault(); }
  if(e.ctrlKey && e.shiftKey && e.key === 'I'){ e.preventDefault(); }
  if(e.ctrlKey && e.shiftKey && e.key === 'J'){ e.preventDefault(); }
});

// ── 4. Fullscreen — only after login, skip iOS ───────────────────────────────
function requestFS(){
  if(_isIOS || !_appUnlocked) return;
  try {
    const el = document.documentElement;
    if(document.fullscreenEnabled && el.requestFullscreen) el.requestFullscreen();
    else if(document.webkitFullscreenEnabled && el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } catch(e){}
}

// ── 5. Detect tab switch ──────────────────────────────────────────────────────
document.addEventListener('visibilitychange', function(){
  document.title = document.hidden
    ? '⚠ Please return to Dental City Clinic'
    : 'Dental City Clinic';
});
</script>
