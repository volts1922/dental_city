// ── Fetch data from all configured branch sheets ──────────────────────────────
async function _fetchAllBranchData(){
  const cfg = getSBConfig();

  // Load local data first
  const allPts  = Object.assign({}, load(KEYS.patients));
  const allApts = Object.assign({}, load(KEYS.appointments));
  const allBil  = Object.assign({}, load(KEYS.billing));

  // If Supabase configured — pull ALL data (owner sees everything)
  if(cfg.url && cfg.key){
    const status = document.getElementById('mbLoadStatus');
    try{
      if(status) status.textContent = 'Pulling all branches from Supabase…';
      const [pts, apts, bil] = await Promise.all([
        _sbFetch('patients?select=*&limit=10000'),
        _sbFetch('appointments?select=*&limit=10000'),
        _sbFetch('billing?select=*&limit=10000'),
      ]);
      if(Array.isArray(pts))  pts.forEach(r=>{ allPts[r.id]  = r; });
      if(Array.isArray(apts)) apts.forEach(r=>{ allApts[r.id] = r; });
      if(Array.isArray(bil))  bil.forEach(r=>{ allBil[r.id]  = r; });
      if(status) status.textContent = 'Done!';
    }catch(e){
      if(status) status.textContent = 'Using local data (offline)';
    }
  }

  return { pts: allPts, apts: allApts, bil: allBil };
}

// ── Render Multi-Branch view with combined data ───────────────────────────────
function _renderMultiBranch({ pts, apts, bil }){
  const td = today();
  const branchMap = {};
  const _branchColor = ['#1A7FC1','#16A34A','#7C3AED','#D97706','#DC2626','#0891B2','#BE185D','#065F46','#92400E'];

  function _resolveBranch(record){
    let b = (record.branch||'').trim();
    if(b && b !== '—' && b !== 'undefined' && b !== 'null') return b;
    if(record.patient_id){
      b = (pts[record.patient_id]||{}).branch||'';
      if(b && b !== '—') return b;
    }
    if(record.patient_name){
      const found = Object.values(pts).find(p=>p.name===record.patient_name);
      b = (found||{}).branch||'';
      if(b && b !== '—') return b;
    }
    return 'Unassigned';
  }

  Object.entries(pts).forEach(([id,p])=>{
    const b = (p.branch||'').trim() || 'Unassigned';
    if(!branchMap[b]) branchMap[b] = {patients:{}, appointments:{}, billing:{}};
    branchMap[b].patients[id] = p;
  });
  Object.entries(apts).forEach(([id,a])=>{
    const b = _resolveBranch(a);
    if(!branchMap[b]) branchMap[b] = {patients:{}, appointments:{}, billing:{}};
    branchMap[b].appointments[id] = a;
  });
  Object.entries(bil).forEach(([id,bill])=>{
    const b = _resolveBranch(bill);
    if(!branchMap[b]) branchMap[b] = {patients:{}, appointments:{}, billing:{}};
    branchMap[b].billing[id] = bill;
  });

  const branchList = Object.entries(branchMap);

  let totalPts=0, totalToday=0, totalRev=0, totalUnpaid=0;
  branchList.forEach(([,b])=>{
    totalPts    += Object.keys(b.patients).length;

    totalRev    += Object.values(b.billing).reduce((s,x)=>s+parseFloat(x.paid||0),0);

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div style="font-weight:700;font-size:15px;color:var(--navy)">${name}</div>
          <span style="font-size:10px;background:${color}22;color:${color};padding:2px 8px;border-radius:10px;font-weight:600">View →</span>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
          <div style="background:var(--sky);padding:8px;border-radius:8px">
            <div style="font-weight:700;font-size:18px;color:var(--blue)">${pts2}</div>
            <div style="color:var(--muted)">Patients</div>
          </div>
          <div style="background:#DCFCE7;padding:8px;border-radius:8px">
            <div style="font-weight:700;font-size:18px;color:var(--green)">${apts2}</div>

          <div style="background:#FEE2E2;padding:8px;border-radius:8px">
            <div style="font-weight:700;font-size:18px;color:var(--red)">${unpaid}</div>
            <div style="color:var(--muted)">Unpaid Bills</div>
          </div>
        </div>
      </div>`;
  }).join('') : `<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--muted)">
    <div style="font-size:40px">🏢</div>

  (document.getElementById('main')||{}).innerHTML = `

        <div class="card-val" style="color:var(--blue)">${totalPts}</div>

function importBranchBackup(e){
  const files = Array.from(e.target.files);
  if(!files.length) return;
  let loaded = 0;
  const branches = getBranches();
  const colorIdx = Object.keys(branches).length;

  files.forEach((file, i)=>{
    const reader = new FileReader();
    reader.onload = function(ev){
      try{
        const data = JSON.parse(ev.target.result);
        if(!data.version){ toast(`❌ ${file.name} is not a valid backup file.`); return; }
        // Use branch_name from file if available, otherwise use filename
        const branchName = data.branch_name ||
          file.name.replace('.json','').replace('dental_clinic_backup_','').replace(/_/g,' ');
        const id = 'B' + Date.now() + i + Math.random().toString(36).slice(2,6);
        branches[id] = {
          name:         branchName,
          color:        BRANCH_COLORS[(colorIdx+i) % BRANCH_COLORS.length],
          imported:     new Date().toISOString(),
          patients:     data.patients     || {},
          appointments: data.appointments || {},
          treatments:   data.treatments   || {},
          billing:      data.billing      || {},
          inventory:    data.inventory    || {},
        };
        loaded++;
        if(loaded === files.length){
          saveBranches(branches);
          toast(`✅ ${loaded} branch backup(s) imported!`);
          showMultiBranch();
        }
      } catch(err){
        toast(`❌ Failed to read ${file.name}`);
      }
    };
    reader.readAsText(file);
  });
  e.target.value = '';
}

function renameBranch(id){
  const branches = getBranches();
  const current = branches[id]?.name || id;
  const newName = prompt('Enter branch name:', current);
  if(newName && newName.trim()){
    branches[id].name = newName.trim();
    saveBranches(branches);
    toast('✅ Branch renamed!');
    showMultiBranch();
  }
}

async function removeBranch(id){
  const branches = getBranches();
  if(await _confirm(`Remove branch "${branches[id]?.name}"?\nThis only removes it from the multi-branch view, not the actual data.`)){
    delete branches[id];
    saveBranches(branches);
    toast('🗑 Branch removed from view');
    showMultiBranch();
  }
}

function exportAllBranches(){
  const branches = getBranches();
  const rows = [['Branch','Patient ID','Patient Name','Date','Services','Amount','Paid','Balance','Status']];
  Object.entries(branches).forEach(([,b])=>{
    Object.entries(b.billing||{}).forEach(([,bill])=>{
      const pname = (b.patients||{})[bill.patient_id]?.name||'—';
      const amt  = parseFloat(bill.amount||0);
      const paid = parseFloat(bill.paid||0);
      rows.push([b.name, bill.patient_id, pname, bill.date,
                 bill.services, amt, paid, amt-paid, bill.status]);
    });
  });
  downloadCSV(`all_branches_${today()}.csv`, rows);
}

function histTab(btn, tabId){
  ['hTab1','hTab2','hTab3','hTab4'].forEach(t=>{
    const el = document.getElementById(t);
    if(el) el.style.display = t===tabId ? 'block' : 'none';
  });
  btn.closest('.modal-body').querySelectorAll('.btn').forEach(b=>b.className='btn btn-secondary btn-sm');
  btn.className = 'btn btn-primary btn-sm';
}

function loadXrays(pid){
  const xrays = load(KEYS.xrays);
  const patXrays = Object.entries(xrays)
    .filter(([,x])=>x.patient_id===pid)
    .sort((a,b)=>b[1].date.localeCompare(a[1].date));

  const grid = document.getElementById('xrayGrid_'+pid);
  if(!grid) return;

  if(!patXrays.length){
    grid.innerHTML = `
      <div style="text-align:center;padding:32px;color:var(--muted);grid-column:1/-1">
        <div style="font-size:36px;margin-bottom:8px">🩻</div>
        <p>No X-rays yet. Click Upload X-Ray to add.</p>
      </div>`;
    return;
  }

  grid.innerHTML = patXrays.map(([xid,x])=>`
    <div style="background:#fff;border-radius:10px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border)">
      <div style="position:relative;background:#0A2540;cursor:pointer" onclick="viewXray('${xid}')">
        <img src="${x.image}" style="width:100%;height:140px;object-fit:cover;display:block;opacity:0.9">
        <div style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);color:#fff;padding:2px 8px;border-radius:20px;font-size:10px">🔍 View</div>
      </div>
      <div style="padding:8px 10px">
        <div style="font-size:11px;font-weight:700;color:var(--navy)">${x.label||'X-Ray'}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">${cleanDate(x.date)} · ${x.type||'General'}</div>
        ${x.notes ? `<div style="font-size:10px;color:var(--muted);margin-top:2px">${x.notes}</div>` : ''}
        <div style="display:flex;gap:4px;margin-top:6px">
          <button class="btn btn-sm" style="flex:1;background:var(--sky);color:var(--blue);font-size:10px;padding:4px" onclick="viewXray('${xid}')">🔍</button>
          <button class="btn btn-sm" style="flex:1;background:var(--teal);color:#fff;font-size:10px;padding:4px" onclick="printXray('${xid}')">🖨</button>
          <button class="btn btn-danger btn-sm" style="flex:1;font-size:10px;padding:4px" onclick="deleteXray('${xid}','${pid}')">🗑</button>
        </div>
      </div>
    </div>`).join('');
}

function uploadXray(input, pid){
  const files = Array.from(input.files);
  if(!files.length) return;
  const pts = load(KEYS.patients);
  const p   = pts[pid]||{};
  let uploaded = 0;

  files.forEach(file=>{
    if(!file.type.startsWith('image/')){ toast('⚠️ Only image files allowed'); return; }
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        // Compress X-ray — larger than photo but still manageable
        const MAX = 800;
        let w = img.width, h = img.height;
        if(w > MAX){ h = Math.round(h*MAX/w); w = MAX; }
        else if(h > MAX){ w = Math.round(w*MAX/h); h = MAX; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.75);

        // Ask for label
        const label = prompt(`Label for X-Ray ${uploaded+1} of ${files.length}:\n(e.g. Upper Jaw, Lower Jaw, Full Mouth, Periapical)`, 'Dental X-Ray');
        if(label === null) return; // cancelled

        const xrays = load(KEYS.xrays);
        const xid   = nextId(xrays, 'X');
        xrays[xid]  = {
          patient_id:   pid,
          patient_name: p.name||'',
          date:         today(),
          label:        label||'Dental X-Ray',
          type:         'X-Ray',
          notes:        '',
          image:        compressed,
          branch:       _saveBranch(),
          size:         Math.round(compressed.length*0.75/1024)+'KB'
        };
        DB.set(KEYS.xrays, xrays); // save locally only — images too large for Supabase free
        uploaded++;
        toast(`✅ X-Ray uploaded! (${Math.round(compressed.length*0.75/1024)}KB)`);
        loadXrays(pid); // refresh grid
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

      <div id="qrdiv_${id}" style="padding:12px;background:#fff;border-radius:10px;box-shadow:var(--shadow);min-height:200px;min-width:200px;display:flex;align-items:center;justify-content:center"></div>


      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="printQR('${id}','${p.name.replace(/'/g,"\\'")}')">🖨 Print</button>
        <button class="btn btn-teal btn-sm" onclick="dlQR('${id}','${p.name.replace(/'/g,"\\'")}')">⬇ Download</button>
      </div>
    </div>`,null,null
  );
  document.getElementById('modalSave').style.display='none';

  // Compute last visit and next appointment dates
  const _apts = Object.values(load(KEYS.appointments)||{}).filter(a=>a.patient_id===id);
  const _completed = _apts.filter(a=>a.status==='Completed').map(a=>a.date).filter(Boolean).sort();
  const _scheduled = _apts.filter(a=>a.status==='Scheduled').map(a=>a.date).filter(Boolean).sort();
  const lastVisit = _completed.length ? _completed[_completed.length-1] : null;
  const nextApt   = _scheduled.length ? _scheduled[0] : null;

  // Store data for switching
  window._qrData = { id, secureText:'DENTAL:'+id, publicText, patient: p, lastVisit, nextApt };

  setTimeout(()=>renderQR(id, 'secure'), 200);
}

function switchQR(type, id){
  const sec  = document.getElementById('qrTabSecure');
  const pub  = document.getElementById('qrTabPublic');
  const phn  = document.getElementById('qrTabPhone');
  const desc = document.getElementById('qrDesc');
  const C_BLUE='var(--blue)', C_GREEN='#16A34A', C_TRANS='transparent', C_TXT='var(--text)';
  [sec,pub,phn].forEach(b=>{ if(b){b.style.background=C_TRANS;b.style.color=C_TXT;} });
  if(type==='secure'){
    sec.style.background=C_BLUE; sec.style.color='#fff';
    desc.innerHTML='🔒 <b>Secure QR</b> — Patient ID only. Only your app shows the info. Best for clinic privacy.';
    desc.style.color='var(--muted)';
    renderQR(id,'secure');
  } else if(type==='public'){
    pub.style.background='#7C3AED'; pub.style.color='#fff';
    desc.innerHTML='📋 <b>Public QR</b> — Embeds basic patient info. <span style="color:var(--red)">⚠️ Any scanner sees the data.</span>';
    desc.style.color='var(--muted)';
    renderQR(id,'public');
  } else {
    phn.style.background=C_GREEN; phn.style.color='#fff';
    desc.innerHTML='📱 <b>Phone View</b> — Opens a full patient card on this device, or copy a share link. <span style="color:var(--green)">✅ No server needed.</span>';
    desc.style.color=C_GREEN;
    renderPhoneQR(id);
  }
}

// ── QR helper: build API image URL ───────────────────────────────────────────
function _qrApiUrl(text, color, size){
  const safe = text.replace(/[^\x20-\x7E\n]/g,'').trim().slice(0,300);
  return 'https://api.qrserver.com/v1/create-qr-code/?size='+(size||220)+'x'+(size||220)
    +'&color='+(color||'0B3D6E')+'&bgcolor=ffffff&ecc=M&data='+encodeURIComponent(safe);
}

// ── Render QR into a div ──────────────────────────────────────────────────────
function renderQR(id, type){
  const el = document.getElementById('qrdiv_'+id);
  if(!el || !window._qrData) return;

  const rawText = type==='public' ? window._qrData.publicText : window._qrData.secureText;
  const color   = type==='public' ? '7C3AED' : '0B3D6E';

  el.style.cssText = 'padding:12px;background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(11,61,110,0.08);text-align:center;min-height:220px;min-width:220px;display:flex;align-items:center;justify-content:center;flex-direction:column;';
  el.innerHTML = '<div style="color:#6B84A0;font-size:12px">⏳ Generating QR…</div>';

  const img = new Image();
  img.width = 220; img.height = 220;
  img.crossOrigin = 'anonymous';
  img.style.cssText = 'border-radius:8px;display:block;';
  img.onload = () => { el.innerHTML=''; el.appendChild(img); };
  img.onerror = () => {
    // Fallback to qrcodejs library if API fails
    el.innerHTML = '';
    if(typeof QRCode !== 'undefined'){
      try{
        new QRCode(el, {
          text: rawText.replace(/[^\x20-\x7E\n]/g,'').trim().slice(0,200),
          width:220, height:220,
          colorDark:'#'+color, colorLight:'#ffffff',
          correctLevel: type==='public' ? QRCode.CorrectLevel.L : QRCode.CorrectLevel.H
        });
      } catch(e){
        el.innerHTML='<div style="color:#DC2626;font-size:12px;padding:16px">⚠️ Could not generate QR.<br>Check internet connection.</div>';
      }
    } else {
      el.innerHTML='<div style="color:#D97706;font-size:12px;padding:16px;text-align:center">⚠️ QR needs internet connection.<br>Please connect and try again.</div>';
    }
  };
  img.src = _qrApiUrl(rawText, color, 220);
}

function dlQR(id,name){

      const cv=document.createElement('canvas'); cv.width=220; cv.height=220;
      cv.getContext('2d').drawImage(img,0,0,220,220);
      _downloadBlob(cv.toDataURL('image/png'),fname);

    toast(_isIOS?'💡 Long-press image to save':'⬇ QR downloaded!');

    _downloadBlob(c.toDataURL('image/png'),fname);

  } else {
    toast('QR not ready yet.');
  }
}

// ── Compress photo for push ───────────────────────────────────────────────────
async function _compressPhoto(b64, size=80, q=0.4){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=c.height=size;
      c.getContext('2d').drawImage(img,
        (img.width-Math.min(img.width,img.height))/2,
        (img.height-Math.min(img.width,img.height))/2,
        Math.min(img.width,img.height), Math.min(img.width,img.height),
        0,0,size,size);
      res(c.toDataURL('image/jpeg',q).split(',')[1]);
    };
    img.onerror=()=>res(null);
    img.src='data:image/jpeg;base64,'+b64;
  });
}

function handleScan(text){
  text=text.trim();
  let id=text;
  if(text.startsWith('DENTAL:')) id=text.split(':')[1];
  else if(text.startsWith('DENTAL_PATIENT:')) id=text.split(':')[1];

  const pts=load(KEYS.patients);
  // Try exact ID
  let p=pts[id?.trim()];
  // Try case-insensitive
  if(!p){ const k=Object.keys(pts).find(k=>k.toLowerCase()===id?.toLowerCase()); if(k) p=pts[k]; id=k||id; }
  // Try name search
  if(!p){ const entry=Object.entries(pts).find(([,v])=>v.name?.toLowerCase().includes(text.toLowerCase())); if(entry){id=entry[0];p=entry[1];} }

  if(!p){
    toast('❌ Patient not found: '+text);
    const log=document.getElementById('scanLog');
    if(log){
      const err=document.createElement('div');
      err.style.cssText='background:var(--red-bg);border:1.5px solid var(--red);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:13px;color:var(--red);';
      err.textContent='❌ Not found: '+text;
      log.insertBefore(err,log.firstChild);
      setTimeout(()=>err.remove(),4000);
    }
    return;
  }

  // Build full record
  const apts=load(KEYS.appointments), bil=load(KEYS.billing), txs=load(KEYS.treatments);
  const patApts=Object.values(apts).filter(a=>a.patient_id===id).sort((a,b)=>b.date.localeCompare(a.date));
  const patBills=Object.values(bil).filter(b=>b.patient_id===id).sort((a,b)=>b.date.localeCompare(a.date));
  const totalBilled=patBills.reduce((s,b)=>s+parseFloat(b.amount||0),0);
  const totalPaid=patBills.filter(b=>b.status==='Paid').reduce((s,b)=>s+parseFloat(b.amount||0),0);
  const unpaidBills=patBills.filter(b=>b.status==='Unpaid'||b.status==='Partial');
  const patTxs=Object.values(txs).filter(t=>t.patient_id===id).sort((a,b)=>b.date.localeCompare(a.date));
  const lastApt=patApts[0];
  const now=new Date();
  const scanTime=now.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});

  // All treatments as a readable string (most recent 10)
  const txList=patTxs.slice(0,10).map(t=>`${t.date}: ${t.procedure||'—'}${t.tooth?' (Tooth '+t.tooth+')':''} - ₱${parseFloat(t.cost||0).toFixed(2)}`).join(' | ');

  // All unpaid bills as string
  const unpaidList=unpaidBills.map(b=>`${b.date}: ${b.services||'—'} ₱${parseFloat(b.amount||0).toFixed(2)} (${b.status})`).join(' | ');

  const record={
    id, scanTime, scanDate:today(),
    name:p.name||'',age:p.age||'',gender:p.gender||'',
    contact:p.contact||'',email:p.email||'',address:p.address||'',
    medical_history:p.medical_history||'',allergies:p.allergies||'',
    // Billing
    totalBilled:totalBilled.toFixed(2),
    totalPaid:totalPaid.toFixed(2),
    balance:(totalBilled-totalPaid).toFixed(2),
    unpaidCount:unpaidBills.length,
    unpaidList:unpaidList||'None',
    lastBillDate:patBills[0]?.date||'',
    lastBillServices:patBills[0]?.services||'',
    lastBillAmount:patBills[0]?.amount||'0',
    lastBillStatus:patBills[0]?.status||'',
    // Appointments
    totalVisits:patApts.filter(a=>a.status==='Completed').length,
    totalApts:patApts.length,
    lastApt:lastApt?.date||'',
    lastAptType:lastApt?.type||'',
    lastAptDentist:lastApt?.dentist||'',
    lastAptStatus:lastApt?.status||'',
    // Treatments
    totalTreatments:patTxs.length,
    lastTreatment:patTxs[0]?.procedure||'',
    lastTreatmentDate:patTxs[0]?.date||'',

    lastTreatmentCost:patTxs[0]?.cost||'0',
    lastTreatmentDentist:patTxs[0]?.dentist||'',
    treatmentHistory:txList||'None',
    // Raw arrays for multi-row export
    _txs:patTxs, _bills:patBills,
  };

  // Remove duplicate scan of same patient
  _scanned=_scanned.filter(r=>r.id!==id);
  _scanned.push(record);
  toast('✅ '+p.name+' added to preview!');

  // Update only the scan log + counts (don't re-render the whole page or it stops the camera)
  const log = document.getElementById('scanLog');
  if(log) log.innerHTML = _buildScanLog();
  const dlBtn = document.querySelector('[onclick="dlScannedCSV()"]');
  if(dlBtn) dlBtn.textContent = '⬇ Download Excel ('+_scanned.length+' records)';
  const countLabels = document.querySelectorAll('#main span[id="scanCount"]');
  countLabels.forEach(el => el.textContent = _scanned.length);
}

function _dlRecords(records, filename){
  const esc=v=>{ const s=String(v===undefined||v===null?'':v); return (s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s; };
  const rows=[];

  records.forEach((r,i)=>{
    // Separator between patients
    if(i>0){ rows.push([]); rows.push(['--- NEXT PATIENT ---']); rows.push([]); }

    // ── PATIENT INFO ──
    rows.push(['=== PATIENT INFORMATION ===']);
    rows.push(['Scan Date','Scan Time','Patient ID','Name','Age','Gender']);
    rows.push([r.scanDate,r.scanTime,r.id,r.name,r.age,r.gender]);
    rows.push([]);
    rows.push(['Contact','Email','Address','Medical History','Allergies']);
    rows.push([r.contact,r.email,r.address,r.medical_history,r.allergies]);
    rows.push([]);

    // ── BILLING SUMMARY ──
    rows.push(['=== BILLING SUMMARY ===']);
    rows.push(['Total Billed','Total Paid','BALANCE DUE','Unpaid Bills']);
    rows.push(['₱'+r.totalBilled,'₱'+r.totalPaid,'₱'+r.balance,r.unpaidCount]);
    rows.push([]);

    // ── BILLING DETAILS ──
    if(r._bills && r._bills.length){
      rows.push(['=== BILLING DETAILS ===']);
      rows.push(['Date','Services','Amount','Paid','Balance','Status','Payment Method']);
      r._bills.forEach(b=>{
        const amt=parseFloat(b.amount||0), paid=parseFloat(b.paid||0);
        rows.push([b.date,b.services||'—','₱'+amt.toFixed(2),'₱'+paid.toFixed(2),'₱'+(amt-paid).toFixed(2),b.status||'—',b.payment_method||'—']);
      });
      rows.push([]);
    }

    // ── TREATMENT HISTORY ──
    if(r._txs && r._txs.length){
      rows.push(['=== TREATMENT HISTORY ===']);
      rows.push(['Date','Procedure','Tooth No.','Dentist','Cost','Notes']);
      r._txs.forEach(t=>{
        rows.push([t.date,t.procedure||'—',t.tooth||'—',t.dentist||'—','₱'+parseFloat(t.cost||0).toFixed(2),t.notes||'']);
      });
      rows.push([]);
    } else {
      rows.push(['=== TREATMENT HISTORY ===']);
      rows.push(['No treatment records found']);
      rows.push([]);
    }

    // ── APPOINTMENT HISTORY ──
    rows.push(['=== APPOINTMENT SUMMARY ===']);
    rows.push(['Total Appointments','Completed Visits','Last Appointment','Last Apt Type','Last Apt Dentist','Last Apt Status']);
    rows.push([r.totalApts,r.totalVisits,r.lastApt,r.lastAptType,r.lastAptDentist,r.lastAptStatus]);
  });

  const csv=rows.map(r=>r.map(esc).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=filename; a.click();
}

function dlSingleRecord(id){ const r=_scanned.find(s=>s.id===id); if(r) _dlRecords([r],r.name.replace(/\s+/g,'_')+'_record.csv'); }
function dlScannedCSV(){
  if(!_scanned.length){toast('No scanned records yet. Scan some patients first!');return;}
  _dlRecords(_scanned,'scanned_patients_'+today()+'.csv');

// ── Camera ────────────────────────────────────────────────────────────────────
function startCam(){
  const video=document.getElementById('qr-video'), status=document.getElementById('camStatus');
  if(!video){toast('Go to QR Scanner page first');return;}
  if(typeof jsQR==='undefined'){
    status.textContent='⏳ Loading decoder...';
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
    s.onload=()=>_startStream(video,status);
    s.onerror=()=>{status.textContent='❌ No internet. Use USB/manual input.';status.style.color='var(--red)';};
    document.head.appendChild(s);
  } else _startStream(video,status);
}

function _startStream(video,status){
  video.setAttribute('playsinline',true); video.muted=true;
  const tries=[{video:{facingMode:{exact:'environment'}}},{video:{facingMode:'environment'}},{video:true}];
  function tryNext(i){
    if(i>=tries.length){status.innerHTML='❌ Camera blocked.<br><small>Use USB/manual input or allow camera in Settings.</small>';status.style.color='var(--red)';return;}
    navigator.mediaDevices.getUserMedia(tries[i]).then(stream=>{
      _qrStream=stream; video.srcObject=stream;
      video.play().then(()=>{
        status.textContent='✅ Camera active — point at QR code';status.style.color='var(--green)';
        video.addEventListener('loadeddata',()=>_decode(video),{once:true});
        if(video.readyState>=2)_decode(video);
      }).catch(()=>tryNext(i+1));
    }).catch(()=>tryNext(i+1));
  }
  tryNext(0);
}

function _decode(video){
  if(_qrInterval){clearInterval(_qrInterval);_qrInterval=null;}
  const canvas=document.getElementById('qr-canvas'),ctx=canvas.getContext('2d');
  let last='',busy=false;
  _qrInterval=setInterval(()=>{
    if(busy||!video||video.paused||!video.videoWidth)return;
    busy=true;
    canvas.width=video.videoWidth; canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);
    try{
      const d=jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data,canvas.width,canvas.height,{inversionAttempts:'attemptBoth'});
      if(d&&d.data&&d.data!==last){last=d.data;handleScan(d.data);setTimeout(()=>{last='';},3000);}
    }catch(e){}
    busy=false;
  },400);
}

function stopCam(){ _stopCam(); const s=document.getElementById('camStatus'); if(s){s.textContent='Camera stopped.';s.style.color='var(--muted)';} }
function _stopCam(){ if(_qrInterval){clearInterval(_qrInterval);_qrInterval=null;} if(_qrStream){_qrStream.getTracks().forEach(t=>t.stop());_qrStream=null;} }

// ── Scroll hint: show ›› arrow when table is wider than its container ─────────
function initScrollHints(){
  document.querySelectorAll('.table-wrap').forEach(wrap=>{
    const scroll = wrap.querySelector('.table-scroll');
    if(!scroll) return;
    // Add hint element if not already there
    if(!wrap.querySelector('.scroll-hint')){
      const hint = document.createElement('div');
      hint.className = 'scroll-hint';
      hint.textContent = '›';
      wrap.appendChild(hint);
    }
    const hint = wrap.querySelector('.scroll-hint');
    const check = () => {
      const scrollable = scroll.scrollWidth > scroll.clientWidth + 4;
      const atEnd = scroll.scrollLeft + scroll.clientWidth >= scroll.scrollWidth - 8;
      hint.classList.toggle('show', scrollable && !atEnd);
    };
    scroll.addEventListener('scroll', check);
    setTimeout(check, 300);
  });

// ── PWA Service Worker — inlined so GitHub Pages always serves latest ────────
if('serviceWorker' in navigator){
  // Cache-bust sw.js with version string so GitHub Pages always serves latest
  const _SW_VER = 'dcclinic-v51';

  async function _registerSW(){
    // Do NOT unregister — let SW update flow naturally so banner can show
    return navigator.serviceWorker.register('./sw.js?v=52', {updateViaCache:'none', scope:'/dental_city/'});
  }

  function _setupReg(reg){
    function _track(sw){
      if(!sw) return;
      sw.addEventListener('statechange', ()=>{
        // Only show banner when SW is waiting — means a NEW version is ready
        // Do NOT trigger on activating/activated — that's normal background activation
        if(sw.state==='installed' && navigator.serviceWorker.controller){
          _showUpdateBanner();
        }
      });
    }
    // Only show banner if there's already a waiting SW AND a controller (not first install)
    if(reg.waiting && navigator.serviceWorker.controller){ _showUpdateBanner(); }
    reg.addEventListener('updatefound', ()=>{ _track(reg.installing); });
    reg.update();
    // Poll every 5s for 60s — only trigger on waiting (not installing)
    let _pc=0;
    const _pid=setInterval(()=>{
      if(reg.waiting && navigator.serviceWorker.controller){ _showUpdateBanner(); clearInterval(_pid); return; }
      if(++_pc>=12) clearInterval(_pid);
    },5000);
    setInterval(()=>reg.update(), 5*60*1000);
  }

  window.addEventListener('load', ()=>{
    _registerSW().then(_setupReg).catch(()=>{});

    document.addEventListener('visibilitychange', ()=>{
      if(document.visibilityState==='visible'){
        navigator.serviceWorker.getRegistration().then(reg=>{
          if(!reg) return;
          reg.update();
          // Only show banner if waiting SW exists AND app already has a controller
          if(reg.waiting && navigator.serviceWorker.controller) _showUpdateBanner();
        });
      }
    });

    // Only reload when user clicked Update — not on silent SW activation
    navigator.serviceWorker.addEventListener('controllerchange', ()=>{
      if(window._userRequestedUpdate){ window.location.reload(); }
    });
  });
}

function _showUpdateBanner(){
  if(sessionStorage.getItem('_updatingNow')) return;
  // Suppress banner for 60s after update to prevent re-showing on mobile
  const lastUpdate = parseInt(localStorage.getItem('_lastSWUpdate')||'0');
  if(Date.now() - lastUpdate < 60000) return;
  const existing = document.getElementById('updateBanner');
  if(existing) existing.remove(); // always recreate fresh
  const banner = document.createElement('div');
  banner.id = 'updateBanner';
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#0F2744;color:#fff;padding:14px 20px;box-shadow:0 4px 16px rgba(0,0,0,0.4);z-index:9999;display:flex;align-items:center;justify-content:center;gap:14px;font-size:15px;font-weight:700;border-bottom:4px solid #C9A84C;animation:slideDown .3s ease';
  banner.innerHTML = `
    <span>🆕 New version available!</span>
    <button id="_updateBtn" onclick="_doUpdate()"
      style="background:#C9A84C;color:#0F2744;border:none;padding:10px 22px;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;min-width:130px;min-height:40px;touch-action:manipulation">
      Update Now ↺
    </button>`;
  document.body.appendChild(banner);
}

function _doUpdate(){
  const btn = document.getElementById('_updateBtn');
  if(btn){ btn.disabled=true; btn.textContent='Updating…'; }
  window._userRequestedUpdate = true;
  sessionStorage.setItem('_updatingNow','1');
  localStorage.setItem('_lastSWUpdate', Date.now().toString());
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(regs=>{
      let sent = false;
      for(const r of regs){
        const sw = r.waiting || r.installing;
        if(sw){ sw.postMessage({type:'SKIP_WAITING'}); sent=true; }
      }
      setTimeout(()=>window.location.reload(), sent?1500:300);
    });
  } else {
    window.location.reload();
  }
}

// CALENDAR VIEW — Weekly dentist schedule
// ══════════════════════════════════════════════════════════════════════════════

let _calWeekOffset = 0; // 0 = current week
let _calMonthOffset = 0; // 0 = current month

function showCalendar(){
  _calWeekOffset = 0;
  _renderCalendar();
}

function _getWeekDates(offset){
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day===0?6:day-1) + (offset*7));
  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    days.push(d);
  }
  return days;
}

function _fmtDate(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function _renderCalendar(){
  const apts    = load(KEYS.appointments) || {};
  const pts     = load(KEYS.patients)     || {};
  const branch  = getBranchName();
  const days    = _getWeekDates(_calWeekOffset);
  const today   = _fmtDate(new Date());
  // Helper: resolve patient name from patient_id or fallback to patient_name field
  const _aptName = (a) => (pts[a.patient_id]||{}).name || a.patient_name || '—';

  const STATUS_COLORS = {
    'Scheduled':  {bg:'#DBEAFE',border:'#2563EB',text:'#1D4ED8'},
    'Completed':  {bg:'#DCFCE7',border:'#16A34A',text:'#15803D'},
    'Cancelled':  {bg:'#FEE2E2',border:'#DC2626',text:'#B91C1C'},
    'No-show':    {bg:'#FEF9C3',border:'#CA8A04',text:'#92400E'},
    'In Progress':{bg:'#FEF3C7',border:'#D97706',text:'#92400E'},
  };

  const dentists = [...new Set(
    Object.values(apts)
      .filter(a=>!branch||a.branch===branch)
      .map(a=>a.dentist||'').filter(Boolean)
  )].sort();

  const selDentist = document.getElementById('calDentistFilter')?.value || '';
  const viewMode   = document.getElementById('calViewMode')?.value || 'week';

  const wStart = days[0], wEnd = days[6];
  const wLabel = `${wStart.toLocaleDateString('en-PH',{month:'short',day:'numeric'})} – ${wEnd.toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'})}`;

  const dentistFilter = `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <select id="calDentistFilter" onchange="_renderCalendar()"
        style="padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;font-weight:600;color:var(--navy)">
        <option value="">All Dentists</option>
        ${dentists.map(d=>`<option value="${d}"${d===selDentist?' selected':''}>${d}</option>`).join('')}
      </select>
      <select id="calViewMode" onchange="_renderCalendar()"
        style="padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;color:var(--navy)">
        <option value="week"${viewMode==='week'?' selected':''}>Week View</option>
        <option value="month"${viewMode==='month'?' selected':''}>Month View</option>
        <option value="day"${viewMode==='day'?' selected':''}>Day View</option>
      </select>
    </div>`;

  const isMonth = viewMode==='month';
  const navBtns = `
    <button class="btn btn-secondary btn-sm" onclick="${isMonth?'_calMonthOffset--':'_calWeekOffset--'};_renderCalendar()">&#8249; Prev</button>
    <button class="btn btn-sm" style="background:var(--blue-pale);color:var(--blue);font-weight:700"
      onclick="_calWeekOffset=0;_calMonthOffset=0;_renderCalendar()">Today</button>
    <button class="btn btn-secondary btn-sm" onclick="${isMonth?'_calMonthOffset++':'_calWeekOffset++'};_renderCalendar()">Next &#8250;</button>
    <button class="btn btn-primary btn-sm" onclick="addApt()">&#xFF0B; Add</button>`;

  const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // ── WEEK VIEW — compact 7-column card grid ────────────────────────────────
  if(viewMode === 'week'){
    let totalApts = 0, todayApts = 0;

    const dayCols = days.map((d,dayIdx)=>{
      const dateStr = _fmtDate(d);
      const isToday = dateStr === today;

      const dayApts = Object.entries(apts)
        .filter(([,a])=>{
          if(branch && a.branch && a.branch!==branch) return false;
          if(selDentist && a.dentist!==selDentist) return false;
          return cleanDate(a.date) === dateStr;
        })
        .sort(([,a],[,b])=>(a.time||'').localeCompare(b.time||''));

      totalApts += dayApts.length;
      if(isToday) todayApts = dayApts.length;

      const header = `
        <div style="text-align:center;padding:8px 4px 6px;border-bottom:2px solid ${isToday?'var(--blue)':'var(--border)'};
          background:${isToday?'rgba(37,99,235,0.07)':'var(--bg)'}">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;
            color:${isToday?'var(--blue)':'var(--muted)'};margin-bottom:3px">${DAY_NAMES[dayIdx]}</div>
          <div style="display:inline-flex;align-items:center;justify-content:center;
            width:28px;height:28px;border-radius:50%;font-size:15px;font-weight:900;
            background:${isToday?'var(--blue)':'transparent'};color:${isToday?'#fff':'var(--navy)'}">${d.getDate()}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${d.toLocaleDateString('en-PH',{month:'short'})}</div>
          ${dayApts.length?`<div style="font-size:10px;font-weight:700;color:${isToday?'var(--blue)':'var(--muted)'};margin-top:2px">${dayApts.length} appt${dayApts.length!==1?'s':''}</div>`:''}
        </div>`;

      const cards = dayApts.length ? dayApts.map(([id,a])=>{
        const col = STATUS_COLORS[a.status]||{bg:'#F1F5F9',border:'#94A3B8',text:'#475569'};
        return `<div onclick="editApt('${id}')" style="
          background:${col.bg};border-left:3px solid ${col.border};border-radius:5px;
          padding:6px 7px;margin:5px 5px 0;cursor:pointer;
          transition:transform .12s,box-shadow .12s;font-size:11px;line-height:1.4"
          onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 2px 8px rgba(0,0,0,0.12)'"
          onmouseout="this.style.transform='';this.style.boxShadow=''">
          <div style="font-weight:700;color:${col.text};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${_aptName(a)}</div>
          <div style="color:${col.text};opacity:.85;font-size:10px;margin-top:1px">&#128336; ${a.time||'—'} &middot; ${a.type||'—'}</div>
          ${!selDentist&&a.dentist?`<div style="color:${col.text};opacity:.65;font-size:10px">&#129489;&#8205;&#9877;&#65039; ${_esc(a.dentist)}</div>`:''}
        </div>`;
      }).join('') : `<div style="text-align:center;padding:16px 4px;color:var(--muted);font-size:13px">&mdash;</div>`;

      return `<td style="width:${Math.floor(100/7)}%;vertical-align:top;border-right:1px solid var(--border)">
        ${header}<div style="padding-bottom:8px;min-height:50px">${cards}</div>
      </td>`;
    }).join('');

    (document.getElementById('main')||{}).innerHTML = `
      <div class="section-header">
        <div class="section-title" style="font-family:var(--font-serif)">&#128197; Appointment Calendar</div>
        <div class="btn-row">${dentistFilter}${navBtns}</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px">
        <div style="font-weight:700;font-size:15px;color:var(--navy)">${wLabel}</div>
        <div style="display:flex;gap:8px">
          <span style="background:var(--blue-pale);color:var(--blue);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700">
            &#128197; Today: ${todayApts} appt${todayApts!==1?'s':''}
          </span>
          <span style="background:#F1F5F9;color:var(--navy);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700">
            Week: ${totalApts} total
          </span>
        </div>
      </div>
      <div class="table-wrap" style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;min-width:560px;border:1px solid var(--border);border-radius:10px;overflow:hidden">
          <tbody><tr>${dayCols}</tr></tbody>
        </table>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;padding:8px 12px;background:var(--bg);border-radius:10px;border:1px solid var(--border)">
        <span style="font-size:11px;font-weight:700;color:var(--muted);margin-right:4px">LEGEND:</span>
        ${Object.entries(STATUS_COLORS).map(([s,c])=>`
          <span style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:${c.text}">
            <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${c.bg};border:1.5px solid ${c.border}"></span>${s}
          </span>`).join('')}
      </div>`;
    return;
  }

  // ── MONTH VIEW — full calendar grid ────────────────────────────────────────
  if(viewMode === 'month'){
    const now      = new Date();
    const mYear    = now.getFullYear();
    const mMonth   = now.getMonth() + _calMonthOffset;
    const baseDate = new Date(mYear, mMonth, 1);
    const dispYear = baseDate.getFullYear();
    const dispMonth= baseDate.getMonth();
    const monthLabel = baseDate.toLocaleDateString('en-PH',{month:'long',year:'numeric'});

    // Days in month
    const daysInMonth = new Date(dispYear, dispMonth+1, 0).getDate();
    // First day of month (0=Sun, shift to Mon-start)
    let firstDow = new Date(dispYear, dispMonth, 1).getDay(); // 0=Sun
    firstDow = firstDow === 0 ? 6 : firstDow - 1; // Mon=0 ... Sun=6

    // Build lookup: dateStr -> appointments[]
    const aptsByDate = {};
    Object.entries(apts).forEach(([id,a])=>{
      if(branch && a.branch && a.branch!==branch) return;
      if(selDentist && a.dentist!==selDentist) return;
      const ds = cleanDate(a.date);
      if(!ds) return;
      const d = new Date(ds+'T00:00:00');
      if(d.getFullYear()===dispYear && d.getMonth()===dispMonth){
        if(!aptsByDate[ds]) aptsByDate[ds]=[];
        aptsByDate[ds].push([id,a]);
      }
    });

    // Total for the month
    const monthTotal = Object.values(aptsByDate).reduce((s,v)=>s+v.length,0);

    const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const dowHeaders = DOW.map(d=>`
      <th style="padding:8px 4px;text-align:center;font-size:11px;font-weight:700;
        color:var(--muted);text-transform:uppercase;border-bottom:2px solid var(--border);
        background:var(--bg)">${d}</th>`).join('');

    // Build calendar cells
    let cells = '';
    let dayNum = 1;
    let started = false;

    // Up to 6 rows
    for(let row=0; row<6; row++){
      if(dayNum > daysInMonth) break;
      cells += '<tr>';
      for(let col=0; col<7; col++){
        if(!started && col < firstDow){
          cells += `<td style="background:#F8FAFC;border:1px solid var(--border)"></td>`;
          continue;
        }
        started = true;
        if(dayNum > daysInMonth){
          cells += `<td style="background:#F8FAFC;border:1px solid var(--border)"></td>`;
          continue;
        }
        const ds = `${dispYear}-${String(dispMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
        const isToday2 = ds === today;
        const dayApts  = aptsByDate[ds] || [];
        const maxShow  = 3;
        const aptCards = dayApts.slice(0,maxShow).map(([id,a])=>{
          const col2 = STATUS_COLORS[a.status]||{bg:'#F1F5F9',border:'#94A3B8',text:'#475569'};
          return `<div onclick="editApt('${id}')" style="
            background:${col2.bg};border-left:2px solid ${col2.border};
            border-radius:3px;padding:2px 5px;margin-bottom:2px;cursor:pointer;
            font-size:10px;font-weight:600;color:${col2.text};
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
            onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">
            ${a.time||''} ${_aptName(a)}
          </div>`;
        }).join('');
        const moreTag = dayApts.length > maxShow
          ? `<div style="font-size:10px;color:var(--blue);font-weight:700;cursor:pointer;padding:1px 4px"
              onclick="window._calDaySelect='${ds}';(document.getElementById('calViewMode')||{}).value='day';_renderCalendar()">
              +${dayApts.length-maxShow} more</div>`
          : '';

        cells += `<td style="vertical-align:top;border:1px solid var(--border);
          background:${isToday2?'rgba(37,99,235,0.05)':'#fff'};
          min-width:80px;min-height:80px;padding:0">
          <div style="padding:4px 6px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:13px;font-weight:800;
                color:${isToday2?'#fff':'var(--navy)'};
                background:${isToday2?'var(--blue)':'transparent'};
                width:24px;height:24px;border-radius:50%;
                display:inline-flex;align-items:center;justify-content:center">${dayNum}</span>
              ${dayApts.length?`<span style="font-size:10px;font-weight:700;color:var(--blue)">${dayApts.length}</span>`:''}
            </div>
            ${aptCards}${moreTag}
          </div>
        </td>`;
        dayNum++;
      }
      cells += '</tr>';
    }

    (document.getElementById('main')||{}).innerHTML = `
      <div class="section-header">
        <div class="section-title" style="font-family:var(--font-serif)">&#128197; Appointment Calendar</div>
        <div class="btn-row">${dentistFilter}${navBtns}</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px">
        <div style="font-weight:700;font-size:16px;color:var(--navy)">${monthLabel}</div>
        <span style="background:#F1F5F9;color:var(--navy);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700">
          ${monthTotal} appointment${monthTotal!==1?'s':''} this month
        </span>
      </div>
      <div class="table-wrap" style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;min-width:560px">
          <thead><tr>${dowHeaders}</tr></thead>
          <tbody>${cells}</tbody>
        </table>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;padding:8px 12px;background:var(--bg);border-radius:10px;border:1px solid var(--border)">
        <span style="font-size:11px;font-weight:700;color:var(--muted);margin-right:4px">LEGEND:</span>
        ${Object.entries(STATUS_COLORS).map(([s,c])=>`
          <span style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:${c.text}">
            <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${c.bg};border:1.5px solid ${c.border}"></span>${s}
          </span>`).join('')}
      </div>`;
    return;
  }

  // ── DAY VIEW — clean agenda for a selected day ────────────────────────────
  if(!window._calDaySelect || !days.some(d=>_fmtDate(d)===window._calDaySelect)){
    const todayIdx = days.findIndex(d=>_fmtDate(d)===today);
    window._calDaySelect = _fmtDate(days[todayIdx>=0?todayIdx:0]);
  }
  const selDateStr = window._calDaySelect;
  const selDay     = days.find(d=>_fmtDate(d)===selDateStr) || days[0];

  const dayApts = Object.entries(apts)
    .filter(([,a])=>{
      if(branch && a.branch && a.branch!==branch) return false;
      if(selDentist && a.dentist!==selDentist) return false;
      return cleanDate(a.date) === selDateStr;
    })
    .sort(([,a],[,b])=>(a.time||'').localeCompare(b.time||''));

  const agendaRows = dayApts.length ? dayApts.map(([id,a])=>{
    const col = STATUS_COLORS[a.status]||{bg:'#F1F5F9',border:'#94A3B8',text:'#475569'};
    return `<div onclick="editApt('${id}')" style="
      display:flex;gap:12px;align-items:flex-start;
      background:#fff;border:1px solid var(--border);border-left:4px solid ${col.border};
      border-radius:8px;padding:10px 14px;cursor:pointer;margin-bottom:8px;
      transition:box-shadow .15s"
      onmouseover="this.style.boxShadow='0 2px 12px rgba(0,0,0,0.10)'"
      onmouseout="this.style.boxShadow=''">
      <div style="min-width:52px;text-align:center;padding-top:2px">
        <div style="font-size:14px;font-weight:800;color:var(--navy)">${a.time||'—'}</div>
      </div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:14px;color:var(--navy)">${_aptName(a)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${a.type||'—'}${a.dentist?' &middot; &#129489;&#8205;&#9877;&#65039; '+_esc(a.dentist):''}</div>
      </div>
      <span style="background:${col.bg};color:${col.text};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap">${a.status||'Scheduled'}</span>
    </div>`;
  }).join('') : `<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">No appointments for this day</div>`;

  const dayPicker = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
    ${days.map((d,i)=>{
      const ds=_fmtDate(d), isSel=ds===selDateStr, isT=ds===today;
      return `<button onclick="window._calDaySelect='${ds}';_renderCalendar()" style="
        padding:6px 10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;
        border:1.5px solid ${isSel?'var(--blue)':isT?'var(--blue)':'var(--border)'};
        background:${isSel?'var(--blue)':isT?'var(--blue-pale)':'#fff'};
        color:${isSel?'#fff':isT?'var(--blue)':'var(--navy)'}">${DAY_NAMES[i]} ${d.getDate()}</button>`;
    }).join('')}
  </div>`;

  (document.getElementById('main')||{}).innerHTML = `
    <div class="section-header">
      <div class="section-title" style="font-family:var(--font-serif)">&#128197; Appointment Calendar</div>
      <div class="btn-row">${dentistFilter}${navBtns}</div>
    </div>
    <div style="font-weight:700;font-size:15px;color:var(--navy);margin-bottom:10px">${wLabel}</div>
    ${dayPicker}
    <div style="font-weight:700;font-size:13px;color:var(--navy);margin-bottom:8px">
      &#128197; ${selDay.toLocaleDateString('en-PH',{weekday:'long',month:'long',day:'numeric'})}
      <span style="font-weight:400;color:var(--muted);font-size:12px;margin-left:6px">${dayApts.length} appointment${dayApts.length!==1?'s':''}</span>
    </div>
    ${agendaRows}
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;padding:8px 12px;background:var(--bg);border-radius:10px;border:1px solid var(--border)">
      <span style="font-size:11px;font-weight:700;color:var(--muted);margin-right:4px">LEGEND:</span>
      ${Object.entries(STATUS_COLORS).map(([s,c])=>`
        <span style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:${c.text}">
          <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${c.bg};border:1.5px solid ${c.border}"></span>${s}
        </span>`).join('')}
    </div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// QUEUE / WAITING LIST
// ══════════════════════════════════════════════════════════════════════════════

// Queue stored in localStorage (branch-specific, resets daily)
let _queueViewBranch = ''; // for Owner — which branch queue to view

function _queueBranch(){
  // Staff/Admin use their own branch; Owner picks via selector
  if(canSeeAllBranches()) return _queueViewBranch || getBranchName() || 'Main Branch';
  return getBranchName() || 'Main Branch';
}
function _queueKey(){ return `dc_queue_${_queueBranch()}_${_fmtDate(new Date())}`; }
function _loadQueue(){ try{ return JSON.parse(localStorage.getItem(_queueKey())||'[]'); }catch{ return []; } }
function _saveQueue(q){ localStorage.setItem(_queueKey(), JSON.stringify(q)); }

let _queueInterval = null;

function showQueue(){
  if(canSeeAllBranches() && !_queueViewBranch){
    // Default owner to their own branch name or first available
    _queueViewBranch = getBranchName() || '';
  }
  _renderQueue();
  // Auto-refresh every 15 seconds
  if(_queueInterval) clearInterval(_queueInterval);
  _queueInterval = setInterval(()=>{
    if(currentPage==='Queue') _renderQueue();
    else clearInterval(_queueInterval);
  }, 15000);
}

function _renderQueue(){
  const queue   = _loadQueue();
  const apts    = load(KEYS.appointments) || {};
  const pts     = load(KEYS.patients) || {};
  const today   = _fmtDate(new Date());

  // Today's scheduled appointments (not yet in queue or completed)
  const qBranch = _queueBranch();
  const todayApts = Object.entries(apts)
    .filter(([id,a])=>{
      if(qBranch && a.branch && a.branch!==qBranch) return false;
      return cleanDate(a.date)===today && a.status==='Scheduled';
    })
    .sort(([,a],[,b])=>(a.time||'').localeCompare(b.time||''));

  const STATUS_BADGE = {
    'Waiting':     {bg:'#FEF3C7',color:'#D97706',icon:'⏳'},
    'In Chair':    {bg:'#DBEAFE',color:'#2563EB',icon:'🦷'},
    'Done':        {bg:'#DCFCE7',color:'#16A34A',icon:'✅'},
    'No-show':     {bg:'#FEE2E2',color:'#DC2626',icon:'❌'},
  };

  const serving = queue.find(q=>q.status==='In Chair');
  const waiting = queue.filter(q=>q.status==='Waiting');
  const done    = queue.filter(q=>q.status==='Done');
  const noshow  = queue.filter(q=>q.status==='No-show');

  // Build queue rows
  const queueRows = queue.length ? queue.map((q,i)=>{
    const sb = STATUS_BADGE[q.status] || {bg:'#F1F5F9',color:'#64748B',icon:'•'};
    const waitMins = q.arrivedAt ? Math.floor((Date.now()-q.arrivedAt)/60000) : null;
    return `<tr style="background:${q.status==='In Chair'?'rgba(37,99,235,0.04)':'transparent'}">
      <td style="padding:12px 10px;font-size:22px;font-weight:900;color:${q.status==='In Chair'?'var(--blue)':'var(--muted)'};text-align:center;width:40px">${q.status==='Waiting'?q.qNum:'—'}</td>
      <td style="padding:12px 10px">
        <div style="font-weight:700;font-size:14px;color:var(--navy)">${q.patientName}</div>
        <div style="font-size:12px;color:var(--muted)">${q.type||'—'} · Dr. ${q.dentist||'—'}</div>
        ${q.notes?`<div style="font-size:11px;color:var(--blue);margin-top:2px">📝 ${q.notes}</div>`:''}
      </td>
      <td style="padding:12px 10px;text-align:center">
        <div style="font-size:12px;font-weight:600;color:var(--muted)">${q.time||'—'}</div>
        ${waitMins!==null&&q.status==='Waiting'?`<div style="font-size:10px;color:${waitMins>20?'#DC2626':'var(--muted)'}">⏱ ${waitMins}m waiting</div>`:''}
      </td>
      <td style="padding:12px 10px;text-align:center">
        <span style="background:${sb.bg};color:${sb.color};padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700">
          ${sb.icon} ${q.status}
        </span>
      </td>
      <td style="padding:12px 10px;text-align:center">
        <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
          ${q.status==='Waiting'?`
            <button class="btn btn-sm" style="background:var(--blue);color:#fff;font-size:11px"
              onclick="_setQueueStatus(${i},'In Chair')">🦷 Call In</button>
            <button class="btn btn-sm" style="background:#FEE2E2;color:#DC2626;font-size:11px"
              onclick="_setQueueStatus(${i},'No-show')">❌ No-show</button>`:''}
          ${q.status==='In Chair'?`
            <button class="btn btn-sm" style="background:#DCFCE7;color:#16A34A;font-size:11px"
              onclick="_setQueueStatus(${i},'Done')">✅ Done</button>`:''}
          ${q.status==='Done'||q.status==='No-show'?`
            <span style="font-size:11px;color:var(--muted)">${q.finishedAt?new Date(q.finishedAt).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}):''}</span>`:''}
          <button class="btn btn-sm" style="background:#F1F5F9;color:var(--muted);font-size:11px"
            onclick="_removeFromQueue(${i})">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('') : `<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--muted)">Queue is empty — add patients below</td></tr>`;

  // Now serving banner
  const nowServing = serving ? `
    <div style="background:linear-gradient(135deg,#1A3A5C,#2563EB);color:#fff;border-radius:14px;
      padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 20px rgba(37,99,235,0.3)">
      <div style="font-size:40px">🦷</div>
      <div>
        <div style="font-size:11px;font-weight:600;letter-spacing:2px;opacity:.7;text-transform:uppercase">Now In Chair</div>
        <div style="font-size:22px;font-weight:800;font-family:var(--font-serif)">${serving.patientName}</div>
        <div style="font-size:13px;opacity:.8">${serving.type||'—'} · Dr. ${serving.dentist||'—'} · ${serving.time||'—'}</div>
      </div>
      <div style="margin-left:auto;text-align:center">
        <div style="font-size:28px;font-weight:900">#${serving.qNum||'—'}</div>
        <div style="font-size:10px;opacity:.7">Queue #</div>
      </div>
    </div>` : `
    <div style="background:var(--bg);border:2px dashed var(--border);border-radius:14px;
      padding:16px 24px;margin-bottom:16px;text-align:center;color:var(--muted);font-size:13px">
      🪑 No patient in chair — call a waiting patient to start
    </div>`;

  // Stats bar
  const statsBar = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">
      <div class="card" style="border-color:var(--yellow);padding:12px;text-align:center">
        <div style="font-size:24px;font-weight:800;color:#D97706">${waiting.length}</div>
        <div style="font-size:11px;color:var(--muted)">⏳ Waiting</div>
      </div>
      <div class="card" style="border-color:var(--blue);padding:12px;text-align:center">
        <div style="font-size:24px;font-weight:800;color:var(--blue)">${serving?1:0}</div>
        <div style="font-size:11px;color:var(--muted)">🦷 In Chair</div>
      </div>

function _addToQueue(aptId, patientName, time, type, dentist){
  const queue = _loadQueue();
  if(queue.some(q=>q.aptId===aptId)){ toast('Already in queue!'); return; }
  const waiting = queue.filter(q=>q.status==='Waiting');
  const qNum    = waiting.length + 1;
  queue.push({
    aptId, patientName, time, type, dentist,
    status:'Waiting', qNum,
    arrivedAt: Date.now(),
    notes: ''
  });
  _saveQueue(queue);
  toast(`✅ ${patientName} added to queue — #${qNum}`);
  _renderQueue();
}

function _renderQueuePtList(q){
  const container = document.getElementById('wq_pt_results');
  if(!container) return;
  const lower = (q||'').toLowerCase().trim();
  const list  = window._wqPtList || [];
  const filtered = lower ? list.filter(([,p])=>(p.name||'').toLowerCase().includes(lower)) : list;

  if(!filtered.length){
    container.innerHTML = '<div style="padding:14px;text-align:center;color:var(--muted);font-size:13px">' +
      (list.length ? 'No patients match "'+q+'"' : 'No patients found for this branch') + '</div>';
    return;
  }

  container.style.display = '';
  container.innerHTML = '';
  filtered.slice(0, 50).forEach(([id,p])=>{
    const row = document.createElement('div');
    row.style.cssText = 'padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;transition:background .12s';
    row.innerHTML =
      '<div style="width:34px;height:34px;border-radius:50%;background:var(--navy);color:#fff;' +
        'display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0">' +
        (p.name||'?')[0].toUpperCase() + '</div>' +
      '<div>' +
        '<div style="font-weight:700;font-size:13px;color:var(--navy)">' + (p.name||'—') + '</div>' +
        '<div style="font-size:11px;color:var(--muted)">' + (p.contact||'') + (p.age?' · '+p.age+' yrs':'') + '</div>' +
      '</div>';
    row.addEventListener('mouseover', ()=>{ row.style.background='var(--blue-pale)'; });
    row.addEventListener('mouseout',  ()=>{ row.style.background=''; });
    row.addEventListener('click', ()=>{ _selectQueuePt(id, p.name||'', p.contact||''); });
    container.appendChild(row);
  });
}

function _filterQueuePtList(q){
  const rows = document.querySelectorAll('.wq-pt-row');
  const lower = q.toLowerCase();
  rows.forEach(r=>{
    const name = (r.dataset.name||'').toLowerCase();
    r.style.display = name.includes(lower) ? '' : 'none';
  });
}

function _selectQueuePt(id, name, contact){
  window._wqSelectedPtId = id;
  const sel = document.getElementById('wq_selected');
  if(sel){
    sel.style.display = 'flex';
    (document.getElementById('wq_selected_name')||{}).textContent = name;
  }
  (document.getElementById('wq_search')||{}).value = name;
  document.getElementById('wq_pt_results').style.display = 'none';
  (document.getElementById('wq_walkin_name')||{}).value = '';
}

function _clearQueuePtSel(){
  window._wqSelectedPtId = null;
  const sel = document.getElementById('wq_selected');
  if(sel) sel.style.display = 'none';
  const res = document.getElementById('wq_pt_results');
  if(res) res.style.display = '';
  const s = document.getElementById('wq_search');
  if(s) s.value = '';
}

function _setQueueStatus(idx, newStatus){
  const queue = _loadQueue();
  if(!queue[idx]) return;
  // Only one In Chair at a time
  if(newStatus==='In Chair' && queue.some(q=>q.status==='In Chair')){
    toast('⚠ A patient is already in the chair!'); return;
  }
  queue[idx].status = newStatus;
  if(newStatus==='Done'||newStatus==='No-show') queue[idx].finishedAt = Date.now();
  _saveQueue(queue);
  _renderQueue();
  const name = queue[idx].patientName;
  const msgs = {'In Chair':`🦷 ${name} called in!`,'Done':`✅ ${name} done!`,'No-show':`❌ ${name} marked no-show`};
  toast(msgs[newStatus]||'Updated');
}

function _removeFromQueue(idx){
  const queue = _loadQueue();
  queue.splice(idx,1);
  _saveQueue(queue);
  _renderQueue();
}

function _chatChannelName(a, b){

}

async function _openChat(username, name, branch){
  const me = _loggedInUser||'owner';
  _chatPartner = username;
  _chatMessages = [];
  document.getElementById('_chatList').style.display = 'none';
  document.getElementById('_chatPane').style.display = 'flex';
  (document.getElementById('_chatPaneName')||{}).textContent = name + ' • ' + branch;
  const _cl=document.getElementById('_chatLogo'); if(_cl&&typeof _DC_LOGO_SIDEBAR!=='undefined') _cl.src=_DC_LOGO_SIDEBAR;
  _renderChat();

  // Load history from DB
  try{
    const h = { 'apikey':_SB_API_KEY, 'Authorization':'Bearer '+_SB_API_KEY };
    const [r1,r2] = await Promise.all([
      fetch(`${_SB_URL}/rest/v1/messages?from_user=eq.${encodeURIComponent(me)}&to_user=eq.${encodeURIComponent(username)}&order=sent_at.asc&limit=100`,{headers:h}),
      fetch(`${_SB_URL}/rest/v1/messages?from_user=eq.${encodeURIComponent(username)}&to_user=eq.${encodeURIComponent(me)}&order=sent_at.asc&limit=100`,{headers:h})
    ]);
    const [a,b] = await Promise.all([r1.ok?r1.json():[], r2.ok?r2.json():[]]);
    const rows = [...(Array.isArray(a)?a:[]),...(Array.isArray(b)?b:[])];
    rows.sort((x,y)=>x.ts<y.ts?-1:1);
    _chatMessages = rows.map(r=>({ id:r.id, from:r.from_user, text:r.text, ts:r.sent_at }));
    _renderChat();
    // Mark messages from this contact as read
    fetch(`${_SB_URL}/rest/v1/messages?from_user=eq.${encodeURIComponent(username)}&to_user=eq.${encodeURIComponent(me)}&read_at=is.null`,{
      method:'PATCH',
      headers:{...h,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({read_at:new Date().toISOString()})
    }).catch(()=>{});
  }catch(e){}

  const sb = _getSBClient();
  if(!sb){ toast('⚠ Supabase not loaded'); return; }
  if(_chatChannel) sb.removeChannel(_chatChannel);

  _chatChannel = sb.channel(_chatChannelName(me, username), { config:{ broadcast:{ self:true } } });
  _chatChannel.on('broadcast', { event:'msg' }, ({ payload })=>{
    if(payload.from===me) return;
    _chatMessages.push(payload);
    _renderChat();
    _chatNotify(payload);
  }).subscribe();
}

function _closeChat(){
  const sb = _getSBClient();
  if(sb && _chatChannel){ sb.removeChannel(_chatChannel); _chatChannel=null; }
  _chatPartner = null;
  document.getElementById('_chatList').style.display = '';
  document.getElementById('_chatPane').style.display = 'none';
}

async function _clearChat(){
  if(!_chatPartner) return;
  if(!(await _confirm('Clear all messages in this conversation? This cannot be undone.'))) return;
  const me = _loggedInUser||'owner';
  const h = { 'apikey':_SB_API_KEY, 'Authorization':'Bearer '+_SB_API_KEY };
  try{
    await Promise.all([
      fetch(`${_SB_URL}/rest/v1/messages?from_user=eq.${encodeURIComponent(me)}&to_user=eq.${encodeURIComponent(_chatPartner)}`,{ method:'DELETE', headers:h }),
      fetch(`${_SB_URL}/rest/v1/messages?from_user=eq.${encodeURIComponent(_chatPartner)}&to_user=eq.${encodeURIComponent(me)}`,{ method:'DELETE', headers:h })
    ]);
    _chatMessages = [];
    _renderChat();
    toast('🗑 Conversation cleared');
  }catch(e){ toast('⚠ Could not clear — check connection'); }
}

function _renderChat(){
  const me = _loggedInUser||'owner';
  const box = document.getElementById('_chatMsgs');
  if(!box) return;
  if(!_chatMessages.length){ box.innerHTML='<div style="text-align:center;color:var(--muted);font-size:13px;padding:40px 0">No messages yet 👋</div>'; return; }
  const now = new Date();
  const toDay = d=>{ const x=new Date(d); x.setHours(0,0,0,0); return x.toDateString(); };
  const dayLabel = d=>{
    const x=new Date(d); x.setHours(0,0,0,0);
    const diff=(new Date().setHours(0,0,0,0))-x;
    if(diff===0) return 'Today';
    if(diff===86400000) return 'Yesterday';
    return x.toLocaleDateString('en-PH',{month:'short',day:'numeric',year:x.getFullYear()!==now.getFullYear()?'numeric':undefined});
  };
  let lastDay='', html='';
  _chatMessages.forEach((m,i)=>{
    const mine=m.from===me;
    const t=new Date(m.ts).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});
    const day=toDay(m.ts);
    if(day!==lastDay){
      lastDay=day;
      html+=`<div style="text-align:center;margin:10px 0 6px"><span style="background:var(--bg-2);color:var(--muted);font-size:11px;padding:3px 12px;border-radius:20px">${dayLabel(m.ts)}</span></div>`;
    }
    html+=`<div style="display:flex;flex-direction:column;align-items:${mine?'flex-end':'flex-start'}">
      <div style="max-width:72%;background:${mine?'var(--navy)':'var(--bg-2)'};color:${mine?'#fff':'var(--text)'};padding:9px 14px;border-radius:${mine?'16px 16px 4px 16px':'16px 16px 16px 4px'};font-size:13px;word-break:break-word;position:relative">
        ${_esc(m.text)}
        ${mine?`<span onclick="_deleteMsg(${i})" title="Delete" style="position:absolute;top:-6px;right:-6px;background:#e53e3e;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">×</span>`:''}
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px">${t}</div>
    </div>`;
  });
  box.innerHTML=html;
  box.scrollTop=box.scrollHeight;
}

async function _deleteMsg(idx){
  const m = _chatMessages[idx];
  if(!m) return;
  // Remove from UI immediately
  _chatMessages.splice(idx,1);
  _renderChat();
  // Delete from DB if it has an id
  if(m.id){
    try{
      await fetch(`${_SB_URL}/rest/v1/messages?id=eq.${m.id}`,{
        method:'DELETE',
        headers:{'apikey':_SB_API_KEY,'Authorization':'Bearer '+_SB_API_KEY}
      });
    }catch(e){}
  }
}

function _chatNotify(msg){
  // Sound ping
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 520; o.type='sine';
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.4);
  }catch(e){}

  // In-app banner (works on all devices, no permission needed)
  const accs = getAllAccounts();
  const name = accs[msg.from]?.name || msg.from;
  const existing = document.getElementById('_chatToast');
  if(existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = '_chatToast';
  // Mobile: bottom-center. Desktop (>768px): bottom-right
  const isMobile = window.innerWidth <= 768;
  toast.style.cssText = `position:fixed;${isMobile?'bottom:80px;left:50%;transform:translateX(-50%)':'bottom:24px;right:24px'};background:#0F2744;color:#fff;padding:12px 16px;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.4);z-index:9998;display:flex;align-items:center;gap:12px;font-size:13px;font-weight:600;cursor:pointer;min-width:260px;max-width:90vw;border-left:4px solid #C9A84C;animation:slideUp .3s ease`;
  const logoSrc = (typeof _DC_LOGO_SIDEBAR!=='undefined'&&_DC_LOGO_SIDEBAR) ? _DC_LOGO_SIDEBAR : '';
  toast.innerHTML = `
    ${logoSrc?`<img src="${logoSrc}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">`:'<span style="font-size:20px">💬</span>'}
    <div style="min-width:0">
      <div style="font-size:10px;opacity:.65;margin-bottom:2px">💬 New message from <b>${name}</b></div>
      <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px">${_esc(msg.text.length>50?msg.text.slice(0,50)+'…':msg.text)}</div>
    </div>
    <span onclick="event.stopPropagation();document.getElementById('_chatToast')?.remove()" style="margin-left:auto;opacity:.5;font-size:16px;padding:0 4px">×</span>`;
  toast.onclick = ()=>{ toast.remove(); navigate('Chat','showChat'); };
  document.body.appendChild(toast);
  setTimeout(()=>{ if(toast.parentNode) toast.remove(); }, 5000);

  // Badge on nav
  _chatUnread++;
  buildNav();
}


// ── Global chat listener — notifies on any incoming message ──────────────────
let _globalChatChannel = null;
function _startGlobalChatListener(){
  const sb = _getSBClient();
  if(!sb || !_loggedInUser) return;
  if(_globalChatChannel) sb.removeChannel(_globalChatChannel);
  // Listen on a personal inbox channel: inbox:{username}
  _globalChatChannel = sb.channel('inbox:'+_loggedInUser, {config:{broadcast:{self:false}}});
  _globalChatChannel.on('broadcast',{event:'msg'},({payload})=>{
    // Don't notify if already in that chat
    if(_chatPartner === payload.from) return;
    _chatNotify(payload);
  }).subscribe();
}
function _stopGlobalChatListener(){
  const sb = _getSBClient();
  if(sb && _globalChatChannel){ sb.removeChannel(_globalChatChannel); _globalChatChannel=null; }
}
async function _sendChat(){
  const inp = document.getElementById('_chatInput');
  const text = (inp?.value||'').trim();
  if(!text || !_chatPartner || !_chatChannel) return;
  inp.value = '';
  const me = _loggedInUser||'owner';
  const ts = new Date().toISOString();
  const payload = { from:me, text, ts };

  // Show immediately in UI
  _chatMessages.push(payload);
  _renderChat();

  // Send via broadcast (instant delivery to other user)
  _chatChannel.send({ type:'broadcast', event:'msg', payload });
  // Also notify recipient's inbox channel then immediately remove
  const sb2 = _getSBClient();
  if(sb2){
    const tmp = sb2.channel('inbox:'+_chatPartner,{config:{broadcast:{self:false}}});
    tmp.subscribe(status=>{ if(status==='SUBSCRIBED'){ tmp.send({type:'broadcast',event:'msg',payload}).then(()=>sb2.removeChannel(tmp)); } });
  }

  // Save to DB and store returned id for delete
  try{
    const r = await fetch(`${_SB_URL}/rest/v1/messages`, {
      method:'POST',
      headers:{ 'apikey':_SB_API_KEY, 'Authorization':'Bearer '+_SB_API_KEY, 'Content-Type':'application/json', 'Prefer':'return=representation' },
      body: JSON.stringify({ from_user:me, to_user:_chatPartner, text, sent_at:ts })
    });
    if(r.ok){ const rows=await r.json(); if(rows[0]?.id) payload.id=rows[0].id; }
    else{ const e=await r.text(); console.error('Chat save failed:',e); toast('⚠ Message not saved: '+r.status); }
  }catch(e){ console.error('Chat save error:',e); }
}

// ── Login button — works on all browsers including iOS Safari & Edge ──────────
var _loginFired = false;
(function(){
  var btn = document.getElementById('loginBtn');
  if(!btn) return;
  btn.addEventListener('touchstart', function(){ _loginFired = false; }, {passive:true});
  btn.addEventListener('touchend', function(e){
    e.preventDefault();
    if(_loginFired) return;
    _loginFired = true;
    doLogin();
  });
})();

// ══════════════════════════════════════════════════════════════════════════════
// ⏱ SESSION AUTO-LOGOUT — 15 minutes of inactivity
// ══════════════════════════════════════════════════════════════════════════════
const _IDLE_MINUTES = 15;
let _idleTimer = null;
let _idleWarnTimer = null;

function _resetIdleTimer(){
  if(!_appUnlocked) return;
  clearTimeout(_idleTimer);
  clearTimeout(_idleWarnTimer);
  // Warn at 13 minutes
  _idleWarnTimer = setTimeout(()=>{
    if(_appUnlocked) toast('⏱ Session expiring in 2 minutes due to inactivity…', 6000);
  }, (_IDLE_MINUTES - 2) * 60 * 1000);
  // Auto-logout at 15 minutes
  _idleTimer = setTimeout(()=>{
    if(_appUnlocked) doLogout(true);
  }, _IDLE_MINUTES * 60 * 1000);
}

function _clearIdleTimer(){
  clearTimeout(_idleTimer);
  clearTimeout(_idleWarnTimer);
}

// Reset timer on any user activity
['mousemove','keydown','click','touchstart','scroll'].forEach(evt=>{
  document.addEventListener(evt, ()=>{ if(_appUnlocked) _resetIdleTimer(); }, {passive:true});
});


// ── 1. Warn before closing — only after user has logged in ───────────────────
window.addEventListener('beforeunload', function(e){
  if(!_appUnlocked) return;
  e.preventDefault();
  e.returnValue = '';
});

// ── 2. Block right-click — but allow inside form inputs ──────────────────────
document.addEventListener('contextmenu', function(e){
  const tag = e.target.tagName;
  if(tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if(e.target.closest('.modal') || e.target.closest('.overlay')) return;
  e.preventDefault();
});

// ── 3. Block keyboard shortcuts — only AFTER login ───────────────────────────
document.addEventListener('keydown', function(e){
  if(!_appUnlocked) return; // ← don't block anything on login screen
  if(e.ctrlKey && e.key === 't'){ e.preventDefault(); }
  if(e.ctrlKey && e.key === 'n'){ e.preventDefault(); }
  if(e.ctrlKey && e.key === 'w'){ e.preventDefault(); }
  if(e.ctrlKey && e.key === 'u'){ e.preventDefault(); }
  if(e.ctrlKey && e.shiftKey && e.key === 'I'){ e.preventDefault(); }
  if(e.ctrlKey && e.shiftKey && e.key === 'J'){ e.preventDefault(); }
});

// ── 4. Fullscreen — only after login, skip iOS ───────────────────────────────
function requestFS(){
  if(_isIOS || !_appUnlocked) return;
  try {
    const el = document.documentElement;
    if(document.fullscreenEnabled && el.requestFullscreen) el.requestFullscreen();
    else if(document.webkitFullscreenEnabled && el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } catch(e){}
}

// ── 5. Detect tab switch ──────────────────────────────────────────────────────
document.addEventListener('visibilitychange', function(){
  document.title = document.hidden
    ? '⚠ Please return to Dental City Clinic'
    : 'Dental City Clinic';
});

_initLogos();
</script>
