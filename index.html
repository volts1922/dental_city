// ── Branch color helper ───────────────────────────────────────────────────────
const _BRANCH_COLORS_MAP = {};
const _BRANCH_COLOR_LIST = ['#1A7FC1','#7C3AED','#16A34A','#D97706','#DC2626','#0891B2','#BE185D','#065F46'];
let _branchColorIdx = 0;
function branchColor(name){
  if(!name || name==='—') return '#999';
  if(!_BRANCH_COLORS_MAP[name]){
    _BRANCH_COLORS_MAP[name] = _BRANCH_COLOR_LIST[_branchColorIdx % _BRANCH_COLOR_LIST.length];
    _branchColorIdx++;
  }
  return _BRANCH_COLORS_MAP[name];
}
function branchBadge(name){
  if(!name || name==='—' || name.trim()==='' || name==='undefined' || name==='null') return '';
  // Consistent color based on branch name hash
  const colors = ['#1A7FC1','#16A34A','#7C3AED','#D97706','#DC2626','#0891B2','#BE185D','#065F46'];
  let hash=0; for(let i=0;i<name.length;i++) hash+=name.charCodeAt(i);
  const color = colors[hash % colors.length];
  return `<br><span style="font-size:10px;color:#fff;background:${color};padding:1px 8px;border-radius:10px;white-space:nowrap;display:inline-block;margin-top:2px">${name}</span>`;
}
// Alias for backwards compatibility
const _branchBadge = branchBadge;

// ── Get branch from a record or its linked patient ────────────────────────────
function _getBranch(record, patientRecord){
  const b = (record && record.branch) || (patientRecord && patientRecord.branch) || '';
  if(!b || b==='—' || b.trim()==='' || b==='undefined' || b==='null') return '';
  return b;
}
function cleanDate(val){
  if(!val || val==='—') return val||'—';
  // Already clean format YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}/.test(val)) return val.substring(0,10);
  // Parse full date string e.g. "Fri May 15 2026 00:00:00 GMT+0800..."
  try{
    const d = new Date(val);
    if(!isNaN(d)){
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${dd}`;
    }
  }catch(e){}
  return val;
}

// ── Clean time — strips timezone garbage ─────────────────────────────────────
function cleanTime(val){
  if(!val || val==='—') return val||'—';
  // Already HH:MM
  if(/^\d{2}:\d{2}/.test(val)) return val.substring(0,5);
  // Parse full date string
  try{
    const d = new Date(val);
    if(!isNaN(d)){
      return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    }
  }catch(e){}
  return val;
}

// ── Dashboard cross-branch patient search ─────────────────────────────────────
function _dashSearchPatients(q){
  const resultsDiv = document.getElementById('dashSearchResults');
  if(!resultsDiv) return;

  if(!q || q.length < 2){
    resultsDiv.style.display = 'none';
    resultsDiv.innerHTML = '';
    return;
  }

  const allPts = load(KEYS.patients)||{};
  const allApts= load(KEYS.appointments)||{};
  const ql = q.toLowerCase();

  // Search across ALL patients (no branch filter)
  const results = Object.entries(allPts)
    .filter(([id,p])=>{
      const searchStr = `${_esc(p.name||'')} ${p.contact||''} ${p.email||''} ${id}`.toLowerCase();
      return searchStr.includes(ql);
    })
    .slice(0, 20); // max 20 results

  if(!results.length){
    resultsDiv.style.display = 'block';
    resultsDiv.innerHTML = `<div style="text-align:center;padding:12px;color:var(--muted);font-size:13px">No patients found for "${q}"</div>`;
    return;
  }

  // Find last appointment for each patient
  const aptsByPt = {};
  Object.entries(allApts).forEach(([aid,a])=>{
    const pid = a.patient_id;
    if(!pid) return;
    if(!aptsByPt[pid] || cleanDate(a.date) > cleanDate(aptsByPt[pid].date)){
      aptsByPt[pid] = a;
    }
  });

  const rows = results.map(([id,p])=>{
    const branch  = p.branch || '—';
    const lastApt = aptsByPt[id];
    const lastInfo= lastApt
      ? `Last visit: ${cleanDate(lastApt.date)} · ${lastApt.type||lastApt.procedure||'—'}`
      : 'No appointments on record';
    const colors = ['#1A7FC1','#16A34A','#7C3AED','#D97706','#DC2626','#0891B2','#BE185D','#065F46'];
    let hash=0; for(let i=0;i<branch.length;i++) hash+=branch.charCodeAt(i);
    const bColor = colors[hash%colors.length];

    return `<div onclick="navigate('Patients','showPatients','${(p.name||'').replace(/'/g,"\\'")}')"
      style="display:flex;align-items:center;gap:12px;padding:10px 12px;cursor:pointer;
        border-bottom:1px solid var(--border);transition:background .12s;border-radius:6px"
      onmouseover="this.style.background='var(--blue-pale)'" onmouseout="this.style.background=''">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--navy);color:#fff;
        display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0">
        ${(p.name||'?')[0].toUpperCase()}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:13px;color:var(--navy)">${_esc(p.name||'—')}
          <span style="font-size:10px;color:#fff;background:${bColor};padding:1px 8px;border-radius:10px;margin-left:6px">${branch}</span>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:1px">${p.contact||''} ${p.age?'· '+p.age+' yrs':''}</div>
        <div style="font-size:11px;color:var(--blue);margin-top:1px">${lastInfo}</div>
      </div>
    </div>`;
  }).join('');

  resultsDiv.style.display = 'block';
  resultsDiv.innerHTML = `
    <div style="font-size:11px;color:var(--muted);padding:4px 8px;font-weight:600">${results.length} patient${results.length!==1?'s':''} found</div>
    ${rows}`;
}

async function quickAptStatus(id, status){
  const apts = load(KEYS.appointments);
  if(!apts[id]) return;
  apts[id].status = status;
  save(KEYS.appointments, apts, id);
  toast(`✅ Marked as ${status}`);

  // If marked Completed, offer to add treatment
  if(status === 'Completed' && !_hasTreatmentForApt(id, apts[id].patient_id)){
    const pts   = load(KEYS.patients);
    const pname = (pts[apts[id].patient_id]||{}).name || 'Patient';
    setTimeout(async ()=>{
      if(await _confirm(`✅ Appointment completed!\n\n👉 Add Treatment record for ${pname}?\n\n"${apts[id].type||'Procedure'}" will be pre-filled.`)){
        _addTxFromApt(apts[id]);
      } else {
        showDashboard();
      }
    }, 300);
  } else {
    showDashboard();
  }
}

// ── Check if a treatment already exists for this appointment ──────────────────
function _hasTreatmentForApt(aptId, patientId){
  const apts = load(KEYS.appointments);
  const txs  = load(KEYS.treatments);
  const apt  = apts[aptId];
  if(!apt) return false;
  // Check by apt_id link (if previously auto-created) or by matching patient + date + procedure
  return Object.values(txs).some(t=>
    t.apt_id === aptId ||
    (t.patient_id === patientId && t.date === apt.date && t.procedure === apt.type)
  );
}

// ── Photo helpers ─────────────────────────────────────────────────────────────
function previewPhoto(input){
  const file = input.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ toast('Please select an image file'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      // Auto-compress: max 200x200, JPEG 70% (~30-50KB)
      const MAX = 200;
      let w = img.width, h = img.height;
      if(w > h){ if(w > MAX){ h = Math.round(h*MAX/w); w = MAX; } }
      else      { if(h > MAX){ w = Math.round(w*MAX/h); h = MAX; } }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.7);

      // Save to hidden input
      (document.getElementById('f_photo')||{}).value = compressed;

      // Show preview
      const box = document.getElementById('photoBox');
      box.innerHTML = `<img src="${compressed}" style="width:100%;height:100%;object-fit:cover">`;

      const origKB = Math.round(file.size/1024);
      const compKB = Math.round(compressed.length*0.75/1024);
      toast(`📷 Compressed: ${origKB}KB → ${compKB}KB`);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removePhoto(){
  (document.getElementById('f_photo')||{}).value = '';
  (document.getElementById('photoBox')||{}).innerHTML =

function calculatePhilHealthShare(){

function generatePhilHealthClaim(billingId) {
  const billing = load(KEYS.billing)[billingId];
  if (!billing) { toast('❌ Billing not found'); return; }
  
  const patient = load(KEYS.patients)[billing.patient_id];
  if (!patient || !patient.philhealth_has) {
    toast('⚠️ Patient not PhilHealth eligible'); return;
  }
  
  if (!patient.philhealth_member_id) {
    toast('⚠️ PhilHealth member ID not on file'); return;
  }
  
  try {
    // FIX #1: Check for existing claim (prevent duplicates)
    let claims = load(KEYS.philhealthClaims);
    const existingClaim = Object.values(claims).find(c => c.billing_id === billingId);
    if(existingClaim) {
      toast('⚠️ Claim already exists for this bill: ' + existingClaim.id);
      return existingClaim;
    }
    
    // FIX #2: Fix math rounding - ensure exact total
    const amount = parseFloat(billing.amount || 0);
    const covers = Math.round(amount * 0.71);
    const patient_share = amount - covers;  // Ensures exact total
    
    const claim = {
      id: 'ph_' + Date.now(),
      billing_id: billingId,
      patient_id: billing.patient_id,
      patient_name: patient.name,
      member_id: patient.philhealth_member_id,
      claim_amount: covers,
      total_amount: amount,
      patient_share: patient_share,
      status: 'pending',
      created_date: today(),
      branch: _saveBranch() || 'Main Branch'
    };
    
    claims[claim.id] = claim;
    save(KEYS.philhealthClaims, claims, claim.id);
    
    toast('✅ PhilHealth claim created! ID: ' + claim.id);
    return claim;
  } catch(e) {
    // FIX #3: Error handling
    if(e.name === 'QuotaExceededError') {
      toast('❌ Storage full! Delete old photos or clear cache');
    } else {
      toast('❌ Error: ' + e.message);
    }
    return null;
  }
}

// ── Auto-CSV: called every time patients are saved ────────────────────────────
function autoSavePatientsCSV(){
  const pts  = load(KEYS.patients);
  const apts = load(KEYS.appointments);
  const rows = [['ID','Name','Age','Gender','Contact','Email','Address','Medical History','Allergies','PhilHealth','Member ID','Last Visit']];
  Object.entries(pts).forEach(([id,p])=>{
    const visits = Object.values(apts).filter(a=>a.patient_id===id&&a.status==='Completed').map(a=>a.date);
    const last = visits.length ? visits.sort().pop() : '—';
    rows.push([id,p.name||'',p.age||'',p.gender||'',p.contact||'',p.email||'',
      p.address||'',p.medical_history||'',p.allergies||'',p.philhealth_has?'Yes':'No',p.philhealth_member_id||'',last]);
  });
  const csv = rows.map(r=>r.map(v=>{
    if(typeof v==='string' && (v.includes(',') || v.includes('"'))){
      return '"' + v.replace(/"/g, '""') + '"';
    }
    return v;
  }).join(',')).join('\n');

  // Show floating download button
  showAutoSaveNotif('patients', csv, `patients_${today()}.csv`);
}

function deletePatient(id){
  const pts  = load(KEYS.patients);
  const name = pts[id]?.name || id;

  // Branch ownership check — BranchAdmin can only delete their own branch's patients
  if(currentRole === 'BranchAdmin'){
    const myB = getBranchName();
    const patBranch = (pts[id]?.branch || '').trim();
    if(myB && patBranch && patBranch !== myB){
      toast('⛔ You can only delete patients from your own branch.'); return;
    }
  }

  // Count related records so user knows what will be deleted
  const apts = load(KEYS.appointments);
  const txs  = load(KEYS.treatments);
  const bil  = load(KEYS.billing);
  const aptCount = Object.values(apts).filter(a=>a.patient_id===id).length;
  const txCount  = Object.values(txs).filter(t=>t.patient_id===id).length;
  const bilCount = Object.values(bil).filter(b=>b.patient_id===id).length;

  const details = [];
  if(aptCount) details.push(`${aptCount} appointment(s)`);
  if(txCount)  details.push(`${txCount} treatment(s)`);
  if(bilCount) details.push(`${bilCount} billing record(s)`);
  const extra = details.length ? `\n\nThis will also delete:\n• ${details.join('\n• ')}` : '';

  confirmDelete(`Delete patient "${name}"?${extra}`, ()=>{
    // Collect related IDs before deleting
    const aptIds = Object.keys(apts).filter(k=>apts[k].patient_id===id);
    const txIds  = Object.keys(txs).filter(k=>txs[k].patient_id===id);
    const bilIds = Object.keys(bil).filter(k=>bil[k].patient_id===id);

    // Delete locally only (Supabase deletes handled separately below)
    delete pts[id];
    DB.set(KEYS.patients, pts);
    aptIds.forEach(k=>delete apts[k]); DB.set(KEYS.appointments, apts);
    txIds.forEach(k=>delete txs[k]);   DB.set(KEYS.treatments, txs);
    bilIds.forEach(k=>delete bil[k]);  DB.set(KEYS.billing, bil);
    const charts = load(KEYS.charts);
    if(charts[id]){ delete charts[id]; DB.set(KEYS.charts, charts); }
    _deletePhoto(id); // clean up orphan photo from localStorage

    // Delete from Supabase (with silent retry on fail)
    Promise.all([
      _sbDelete('patients', id),
      _sbDeleteMany('appointments', aptIds),
      _sbDeleteMany('treatments', txIds),
      _sbDeleteMany('billing', bilIds)
    ]).catch(()=>{
      // Queue a sync retry when back online
      window.addEventListener('online', ()=>{ smartRefresh(); }, {once:true});
    });

    toast(`🗑 "${name}" and all related records deleted`);
    _auditLog('DELETE', 'patients', id, `Deleted patient: ${name} (${aptIds.length} apts, ${txIds.length} txs, ${bilIds.length} bills)`);
    autoSavePatientsCSV();
    showPatients();
  });
}

      if(await _confirm(`✅ Appointment saved!\n\n👉 Add Treatment for ${pname} now?\n\n"${aptData.type}" will be auto-filled as the Procedure.`)){
        _addTxFromApt(aptData);
      } else {
        showAppointments();
      }
    }, 300);
  });
}

// ── Add Treatment pre-filled from Appointment ─────────────────────────────────
async function _addTxFromApt(apt, aptId){
  openModal('Add Treatment', txForm({
    patient_id: apt.patient_id,
    procedure:  apt.type,
    date:       apt.date,
    dentist:    apt.dentist
  }), ()=>{
    if(!fval('patient_id')||!fval('procedure')){ toast('Patient and Procedure required'); return; }
    const txs = load(KEYS.treatments);
    const id  = nextId(txs,'T');
    const txData = {patient_id:fval('patient_id'),procedure:fval('procedure'),date:fval('date'),
      tooth:fval('tooth'),dentist:fval('dentist'),cost:fval('cost'),notes:fval('notes'),
      branch: _saveBranch(),
      apt_id: aptId || null};
    txs[id] = txData;
    save(KEYS.treatments, txs, id);
    closeModal();
    toast('✅ Treatment saved!');

    // ── Cascade to Billing ────────────────────────────────────────────────────
    const pts   = load(KEYS.patients);
    const pname = (pts[txData.patient_id]||{}).name||'Patient';
    setTimeout(async ()=>{
      if(await _confirm(`✅ Treatment saved!\n\n👉 Create a Bill for ${pname} now?\n\n"${txData.procedure}" will be auto-filled as Services Rendered.`)){
        _addBillFromTx(txData);
      } else {
        showTreatments();
      }
    }, 300);
  });
}

// ── Add Bill pre-filled from Treatment ───────────────────────────────────────
function _addBillFromTx(tx){
  openModal('New Bill', billForm({
    patient_id: tx.patient_id,
    date:       tx.date,
    services:   tx.procedure,
    amount:     tx.cost||'0'
  }), ()=>{
    if(!fval('patient_id')){ toast('Select a patient'); return; }
    const bil  = load(KEYS.billing);
    const id   = nextId(bil,'B');
    const amt  = parseFloat(fval('amount')||0);
    const paid = parseFloat(fval('paid')||0);
    bil[id] = {patient_id:fval('patient_id'),date:fval('date'),services:fval('services'),
      amount:fval('amount'),paid:fval('paid'),payment_method:fval('payment_method'),
      notes:fval('notes'), status: paid>=parseFloat(fval('discounted_amount')||amt)?'Paid': paid>0?'Partial':'Unpaid'};
    save(KEYS.billing, bil, id);
    closeModal();
    toast('✅ Bill saved! All records complete 🎉');
    showBilling();
  });
  // Pre-load appointment suggestions
  setTimeout(()=>billAutoFillServices(tx.patient_id), 150);
}

async function editApt(id){
  const apts = load(KEYS.appointments);
  const prev = apts[id] || {};
  openModal('Edit Appointment', aptForm(prev), async ()=>{
    if(!fval('patient_id')){ toast('Select a patient'); return; }
    if(!(await _checkCloudVersion('appointments', id, prev))) return;
    const newStatus = fval('status');
    apts[id] = {...prev, patient_id:fval('patient_id'),date:fval('date'),time:fval('time'),
      dentist:fval('dentist'),type:fval('type'),status:newStatus,notes:fval('notes'),
      updated_at:new Date().toISOString()};
    save(KEYS.appointments, apts, id);
    closeModal();
    toast('✅ Appointment updated!');

    // If marked Completed and no treatment yet linked, offer to add one
    if(newStatus === 'Completed' && !_hasTreatmentForApt(id, fval('patient_id'))){
      const pts   = load(KEYS.patients);
      const pname = (pts[fval('patient_id')]||{}).name || 'Patient';
      setTimeout(async ()=>{
        if(await _confirm(`✅ Appointment completed!\n\n👉 Add Treatment record for ${pname}?\n\n"${fval('type')||apts[id].type}" will be pre-filled.`)){
          _addTxFromApt(apts[id]);
        } else {
          showAppointments();
        }
      }, 300);
    } else {
      showAppointments();
    }
  });
}

function setAptStatus(id, status){

function deleteApt(id, fromDash=false){

function showAppointments(filters={}){
  if(typeof filters !== 'object' || filters === null) filters = {};
  const allApts = load(KEYS.appointments);
  const allPts  = load(KEYS.patients);
  const apts    = _filterByBranch(allApts, allPts);
  const pts     = allPts;
  const td      = today();

  // ── Read active filters ───────────────────────────────────────────────────
  const fSearch  = (filters.search  || document.getElementById('aptSearch')?.value  || '').toLowerCase();
  const fStatus  = (filters.status  || document.getElementById('aptStatus')?.value  || 'All');
  const fFrom    = (filters.from    || document.getElementById('aptFrom')?.value    || '');
  const fTo      = (filters.to      || document.getElementById('aptTo')?.value      || '');
  const fBranch  = (filters.branch  || document.getElementById('aptBranch')?.value  || 'All');
  const fType    = (filters.type    || document.getElementById('aptType')?.value    || 'All');

  // ── Unique branches and types for dropdowns ───────────────────────────────
  const branches = [...new Set(Object.entries(apts).map(([,a])=>{
    const p = pts[a.patient_id]||{};
    return _getBranch(a,p) || a.branch || p.branch || '';
  }).filter(Boolean))].sort();
  const types = [...new Set(Object.values(apts).map(a=>a.type||'').filter(Boolean))].sort();

  // ── Filter records ────────────────────────────────────────────────────────
  const filtered = Object.entries(apts)
    .filter(([id,a])=>{
      const p     = pts[a.patient_id]||{};
      const pname = (p.name || a.patient_name || '').toLowerCase();
      const date  = cleanDate(a.date)||'';
      if(fSearch  && !pname.includes(fSearch) && !id.toLowerCase().includes(fSearch) && !(a.type||'').toLowerCase().includes(fSearch)) return false;
      if(fStatus  !== 'All' && (a.status||'Scheduled') !== fStatus) return false;
      if(fFrom    && date < fFrom) return false;
      if(fTo      && date > fTo)   return false;
      if(fBranch  !== 'All'){
        const pb = _getBranch(a, pts[a.patient_id]||{}) || a.branch || (pts[a.patient_id]||{}).branch || '';
        if(pb !== fBranch) return false;
      }
      if(fType    !== 'All' && (a.type||'')    !== fType)    return false;
      return true;
    })
    .sort((a,b)=>(cleanDate(b[1].date)+b[1].time||'').localeCompare(cleanDate(a[1].date)+a[1].time||''));

  // ── Stats bar ─────────────────────────────────────────────────────────────
  const total     = filtered.length;
  const todayCount= filtered.filter(([,a])=>cleanDate(a.date)===td).length;
  const upcoming  = filtered.filter(([,a])=>cleanDate(a.date)>td && (a.status||'Scheduled')==='Scheduled').length;
  const completed = filtered.filter(([,a])=>(a.status||'')==='Completed').length;

  // ── Table rows ────────────────────────────────────────────────────────────
  const rows = filtered.map(([id,a])=>{
    const p      = pts[a.patient_id]||{};
    const pname  = p.name || a.patient_name || '—';
    const branch = _getBranch(a, p);
    const isToday = cleanDate(a.date)===td;
    return `<tr${isToday?' style="background:#FFFBEB"':''}>
      <td>${id}</td>
      <td><b onclick="showPatientHistory('${a.patient_id}')" style="cursor:pointer;color:var(--blue);transition:all 0.2s;transform:scale(1)" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">${pname}</b></td>
      <td>${branchBadge(branch)||'<span style="color:var(--muted)">—</span>'}</td>
      <td>${isToday?`<b style="color:var(--green)">${cleanDate(a.date)} 📅</b>`:cleanDate(a.date)||'—'}</td>
      <td>${cleanTime(a.time)||'—'}</td>
      <td>${a.type||'—'}</td>
      <td>${badgeHtml(a.status||'Scheduled')}</td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="editApt('${id}')">✏ Update</button>
        <button class="btn btn-danger btn-sm" onclick="deleteApt('${id}')">🗑 Delete</button>
      </td>
    </tr>`;
  }).join('') || `<tr><td colspan="8"><div class="empty"><div class="empty-icon">📅</div><p>No appointments match your filter</p><button class="btn btn-primary btn-sm" onclick="clearAptFilters()" style="margin-top:8px">Clear Filters</button></div></td></tr>`;

  (document.getElementById('main')||{}).innerHTML = `
    <div class="section-header">
      <div class="section-title">Appointments</div>
      <div class="btn-row">
        <button class="btn btn-teal" onclick="exportAppointments()">Export CSV</button>
        <button class="btn btn-primary" onclick="addApt()">＋ Schedule Appointment</button>
      </div>
    </div>

    <!-- Filter Bar -->
    <div style="background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap">🔍 Filter:</span>

        <input id="aptSearch" type="text" placeholder="Search patient / type..."
          value="${fSearch}" oninput="filterAptTable(this.value)"
          style="padding:5px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;min-width:160px;flex:1">

        <select id="aptStatus" onchange="showAppointments()"
          style="padding:5px 8px;border:1.5px solid var(--border);border-radius:7px;font-size:12px">
          ${['All','Scheduled','Completed','Cancelled','No-show'].map(s=>`<option${s===fStatus?' selected':''}>${s}</option>`).join('')}
        </select>

        <select id="aptBranch" onchange="showAppointments()"
          style="padding:5px 8px;border:1.5px solid var(--border);border-radius:7px;font-size:12px">
          <option value="All"${fBranch==='All'?' selected':''}>All Branches</option>
          ${branches.map(b=>`<option${b===fBranch?' selected':''}>${b}</option>`).join('')}
        </select>

        <select id="aptType" onchange="showAppointments()"
          style="padding:5px 8px;border:1.5px solid var(--border);border-radius:7px;font-size:12px">
          <option value="All"${fType==='All'?' selected':''}>All Procedures</option>
          ${types.map(t=>`<option${t===fType?' selected':''}>${t}</option>`).join('')}
        </select>

        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--muted)">From:</span>
          <input id="aptFrom" type="date" value="${fFrom}" onchange="showAppointments()"
            style="padding:4px 6px;border:1.5px solid var(--border);border-radius:7px;font-size:12px">
          <span style="font-size:11px;color:var(--muted)">To:</span>
          <input id="aptTo" type="date" value="${fTo}" onchange="showAppointments()"
            style="padding:4px 6px;border:1.5px solid var(--border);border-radius:7px;font-size:12px">
        </div>

        <button onclick="clearAptFilters()"
          style="padding:5px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;background:var(--bg);cursor:pointer;color:var(--muted)">✕ Clear</button>

        <!-- Quick filters -->
        <button onclick="setAptQuick('today')"
          style="padding:4px 10px;border:1.5px solid var(--green);border-radius:20px;font-size:11px;background:#DCFCE7;color:#16A34A;cursor:pointer;font-weight:600">📅 Today</button>
        <button onclick="setAptQuick('upcoming')"
          style="padding:4px 10px;border:1.5px solid var(--blue);border-radius:20px;font-size:11px;background:var(--sky);color:var(--blue);cursor:pointer;font-weight:600">⏭ Upcoming</button>
        <button onclick="setAptQuick('week')"
          style="padding:4px 10px;border:1.5px solid var(--teal);border-radius:20px;font-size:11px;background:#CCFBF1;color:var(--teal);cursor:pointer;font-weight:600">📆 This Week</button>
        <button onclick="setAptQuick('month')"
          style="padding:4px 10px;border:1.5px solid var(--yellow);border-radius:20px;font-size:11px;background:#FEF3C7;color:var(--yellow);cursor:pointer;font-weight:600">🗓 This Month</button>
      </div>

      <!-- Stats -->
      <div style="display:flex;gap:14px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap">
        <span style="font-size:12px;color:var(--muted)">Showing <b style="color:var(--text)">${total}</b> appointments</span>
        <span style="font-size:12px;color:var(--green)">📅 Today: <b>${todayCount}</b></span>
        <span style="font-size:12px;color:var(--blue)">⏭ Upcoming: <b>${upcoming}</b></span>
        <span style="font-size:12px;color:var(--teal)">✅ Completed: <b>${completed}</b></span>
      </div>
    </div>

    <div class="table-wrap"><div class="table-scroll">
      <table>
        <thead><tr><th>ID</th><th>Patient</th><th>Branch</th><th>Date</th><th>Time</th><th>Procedure</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="aptTableBody">${rows}</tbody>
      </table>
    </div></div>`;
  setTimeout(initScrollHints, 100);
}

function clearAptFilters(){
  showAppointments({search:'',status:'All',branch:'All',type:'All',from:'',to:''});
}

function setAptQuick(preset){
  const td  = today();
  const d   = new Date();
  // Clear first
  clearAptFilters();
  const fromEl = document.getElementById('aptFrom');
  const toEl   = document.getElementById('aptTo');
  const statEl = document.getElementById('aptStatus');
  if(!fromEl) return;
  if(preset==='today'){
    fromEl.value = td; toEl.value = td;
  } else if(preset==='upcoming'){
    fromEl.value = td;
    if(statEl) statEl.value = 'Scheduled';
  } else if(preset==='week'){
    // Monday to Sunday of current week
    const day  = d.getDay()||7;
    const mon  = new Date(d); mon.setDate(d.getDate()-(day-1));
    const sun  = new Date(mon); sun.setDate(mon.getDate()+6);
    fromEl.value = mon.toISOString().split('T')[0];
    toEl.value   = sun.toISOString().split('T')[0];
  } else if(preset==='month'){
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0');
    fromEl.value = `${y}-${m}-01`;
    toEl.value   = `${y}-${m}-${new Date(y,d.getMonth()+1,0).getDate()}`;
  }
  showAppointments();
}

function filterTxTable(q=''){
  const allTxs = load(KEYS.treatments);
  const allPts = load(KEYS.patients);
  const txs = _filterByBranch(allTxs, allPts);
  const ql  = (q||'').toLowerCase();

  const rows = Object.entries(txs)
    .sort((a,b)=>cleanDate(b[1].date).localeCompare(cleanDate(a[1].date)))
    .filter(([id,t])=>{
      if(!ql) return true;
      const pname = (allPts[t.patient_id]||{}).name || t.patient_name || '';
      return (pname+id+(t.procedure||'')+(t.dentist||'')).toLowerCase().includes(ql);
    })
    .map(([id,t])=>{
      const p     = allPts[t.patient_id]||{};
      const pname = p.name || t.patient_name || '—';
      const branch= _getBranch(t, p) || t.branch || p.branch || '—';
      return `<tr>
        <td>${id}</td><td><b onclick="showPatientHistory('${t.patient_id}')" style="cursor:pointer;color:var(--blue);transition:all 0.2s;transform:scale(1)" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">${pname}</b></td><td>${branchBadge(branch)||'<span style="color:var(--muted)">—</span>'}</td><td>${cleanDate(t.date)}</td>
        <td>${t.procedure||'—'}</td><td>${t.tooth||'—'}</td>
        <td>${t.dentist||'—'}</td><td>${fmt(t.cost)}</td>
        <td>
          <button class="btn btn-secondary btn-sm" onclick="editTx('${id}')">✏ Update</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTx('${id}')">🗑 Delete</button>
        </td>
      </tr>`;
    }).join('') || `<tr><td colspan="9"><div class="empty"><div class="empty-icon">🦷</div><p>${ql?'No results found':'No treatments yet'}</p></div></td></tr>`;

  const body = document.getElementById('txTableBody');
  if(body) body.innerHTML = rows;
}

async function addTx(){
  const pts = load(KEYS.patients);
  if(!Object.keys(pts).length){
    if(await _confirm('No patients found!\n\nWould you like to add a patient first?')){
      navigate('Patients','showPatients');
    }
    return;
  }
  openModal('Add Treatment', txForm(), ()=>{
    if(!fval('patient_id')||!fval('procedure')){ toast('Patient and Procedure required'); return; }
    const txs  = load(KEYS.treatments);
    const id   = nextId(txs,'T');
    const txData = {
      patient_id: fval('patient_id'),
      patient_name: (pts[fval('patient_id')]||{}).name||'',
      procedure:  fval('procedure'),
      date:       fval('date'),
      tooth:      fval('tooth'),
      dentist:    fval('dentist'),
      cost:       fval('cost'),
      notes:      fval('notes'),
      branch:     _saveBranch()||'Main Branch'
    };
    txs[id] = txData;
    save(KEYS.treatments, txs, id);
    closeModal();
    toast('✅ Treatment saved!');

    // ── Cascade to Billing ────────────────────────────────────────────────────
    const pname = (pts[txData.patient_id]||{}).name||'Patient';
    setTimeout(async ()=>{
      if(await _confirm(`✅ Treatment saved!\n\n👉 Create a Bill for ${pname} now?\n\n"${txData.procedure}" will be auto-filled as Services Rendered.`)){
        _addBillFromTx(txData);
      } else {
        showTreatments();
      }
    }, 300);
  });
}

async function editTx(id){
  const txs = load(KEYS.treatments);
  openModal('Edit Treatment', txForm(txs[id]), async ()=>{
    if(!fval('patient_id')||!fval('procedure')){ toast('Patient and Procedure required'); return; }
    if(!(await _checkCloudVersion('treatments', id, txs[id]))) return;
    txs[id] = {...txs[id], patient_id:fval('patient_id'),procedure:fval('procedure'),date:fval('date'),
      tooth:fval('tooth'),dentist:fval('dentist'),cost:fval('cost'),notes:fval('notes'),
      updated_at:new Date().toISOString()};
    save(KEYS.treatments, txs, id);
    closeModal(); toast('✅ Treatment updated!'); showTreatments();
  });
}

function deleteTx(id){
  const txs = load(KEYS.treatments);
  confirmDelete('Delete this treatment record?', ()=>{
    delete txs[id]; save(KEYS.treatments, txs, id);
    _sbDelete('treatments', id);
    toast('🗑 Treatment deleted'); showTreatments();
  });
}

const CONDITIONS = ['Healthy','Caries','Filled','Missing','Crown','Bridge','Root Canal','Extraction','Implant','Fractured'];
const COND_COLORS = {Healthy:'#16A34A',Caries:'#DC2626',Filled:'#2563EB',Missing:'#94A3B8',
  Crown:'#D97706',Bridge:'#7C3AED','Root Canal':'#EA580C',Extraction:'#9F1239',Implant:'#0D9488',Fractured:'#DC2626'};

let chartPatientId = '';

function showDentalChart(){
  const allPts = load(KEYS.patients);
  const pts    = _filterPatientsByBranch(allPts);
  (document.getElementById('main')||{}).innerHTML = `
    <div class="section-header">
      <div class="section-title">Dental Chart</div>
      <div class="btn-row">
        <select class="form-control" style="width:220px" id="chartPatSel" onchange="loadChart()">
          <option value="">-- Select Patient --</option>
          ${Object.entries(pts).map(([id,p])=>`<option value="${id}">${_esc(p.name)} (${id})</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="legend">${Object.entries(COND_COLORS).map(([c,col])=>`
      <div class="legend-item"><div class="legend-dot" style="background:${col}"></div>${c}</div>`).join('')}
    </div>
    <div class="chart-container" id="chartContainer">
      <div style="text-align:center;color:var(--muted);padding:32px">Select a patient to view their dental chart</div>
    </div>
    <div id="chartHistory"></div>`;
}

function loadChart(){
  chartPatientId = document.getElementById('chartPatSel')?.value;
  if(!chartPatientId) return;
  renderChart();
  renderChartHistory();
}

function renderChart(){
  const charts = load(KEYS.charts);
  const chart  = charts[chartPatientId] || {};

  function teethRow(teeth){
    return teeth.map(t=>{
      const cond  = (chart[t]||{}).condition || 'Healthy';
      const color = COND_COLORS[cond] || COND_COLORS.Healthy;
      return `<div class="tooth-svg-wrapper" onclick="editTooth(${t})" style="cursor:pointer;position:relative" title="Tooth ${t}: ${cond}">
        <svg width="44" height="56" viewBox="0 0 44 56" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.15))">
          <!-- Tooth root -->
          <path d="M 12 32 Q 10 42 14 50 L 30 50 Q 34 42 32 32 Z" fill="${color}" opacity="0.4" stroke="${color}" stroke-width="1"/>
          <!-- Tooth crown -->
          <path d="M 12 32 Q 11 16 12 8 Q 14 2 22 2 Q 30 2 32 8 Q 33 16 32 32 Z" fill="${color}" stroke="${color}" stroke-width="1.5"/>
          <!-- Tooth shine -->
          <ellipse cx="18" cy="12" rx="4" ry="6" fill="#fff" opacity="0.35"/>
          <!-- Condition indicator dot -->
          <circle cx="36" cy="6" r="4" fill="${color}" stroke="#fff" stroke-width="1"/>
        </svg>
        <div style="font-size:9px;font-weight:600;color:var(--text);margin-top:2px;text-align:center">${t}</div>
      </div>`;
    }).join('');
  }

  (document.getElementById('chartContainer')||{}).innerHTML = `
    <div style="min-width:640px">
      <div style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:8px">UPPER JAW</div>
      <div class="teeth-row">${teethRow(UPPER)}</div>
      <div class="tooth-divider" style="margin:10px 0"></div>
      <div class="teeth-row">${teethRow(LOWER)}</div>
      <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:8px">LOWER JAW</div>
    </div>`;
}

function renderChartHistory(){
  const charts = load(KEYS.charts);
  const chart  = charts[chartPatientId] || {};
  const entries = Object.entries(chart);
  if(!entries.length){
    (document.getElementById('chartHistory')||{}).innerHTML = '';
    return;
  }
  const rows = entries.map(([tooth,info])=>`<tr>
    <td>${tooth}</td>
    <td><span class="badge" style="background:${COND_COLORS[info.condition]}22;color:${COND_COLORS[info.condition]}">${info.condition}</span></td>
    <td>${info.updated||'—'}</td>
    <td>${info.notes||'—'}</td>
  </tr>`).join('');

  (document.getElementById('chartHistory')||{}).innerHTML = `
    <div class="section-title" style="margin:20px 0 12px">Tooth Condition History</div>
    <div class="table-wrap"><div class="table-scroll">
      <table><thead><tr><th>Tooth</th><th>Condition</th><th>Updated</th><th>Notes</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div></div>`;
}

function editTooth(toothNum){
  if(!chartPatientId){ toast('Select a patient first'); return; }
  const charts = load(KEYS.charts);
  const current = (charts[chartPatientId]||{})[toothNum] || {};
  openModal(`Tooth ${toothNum}`, `
    ${formRow('Condition','condition',current.condition||'Healthy',null,CONDITIONS)}
    ${formRow('Notes','notes',current.notes)}`, ()=>{
    if(!charts[chartPatientId]) charts[chartPatientId]={};
    charts[chartPatientId][toothNum] = {condition:fval('condition'),notes:fval('notes'),updated:today()};
    save(KEYS.charts, charts);
    closeModal(); toast('✅ Tooth updated!');
    renderChart(); renderChartHistory();
  });
}

function showBilling(q=''){
  const allBil = load(KEYS.billing);
  const allPts = load(KEYS.patients);
  const bil = _filterByBranch(allBil, allPts);
  const pts = allPts;
  const ql  = (q||'').toLowerCase();

  const totalBilled = Object.values(bil).reduce((s,b)=>s+parseFloat(b.amount||0),0);
  const totalPaid   = Object.values(bil).reduce((s,b)=>s+parseFloat(b.paid||0),0);

  const rows = Object.entries(bil)
    .sort((a,b)=>cleanDate(b[1].date).localeCompare(cleanDate(a[1].date)))
    .filter(([id,b])=>{
      if(!ql) return true;
      const p = pts[b.patient_id]||{};
      const pname = p.name || b.patient_name || '';
      return (pname+id+(b.services||'')+(b.status||'')).toLowerCase().includes(ql);
    })
    .map(([id,b])=>{
      const p      = pts[b.patient_id]||{};
      const pname  = p.name || b.patient_name || '—';
      const branch = _getBranch(b, p);
      const amt    = parseFloat(b.amount||0);
      const paid   = parseFloat(b.paid||0);
      return `<tr>
        <td>${id}</td>
        <td><b onclick="showPatientHistory('${b.patient_id}')" style="cursor:pointer;color:var(--blue);transition:all 0.2s;transform:scale(1)" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">${pname}</b>${branchBadge(branch)}</td>
        <td>${cleanDate(b.date)}</td>
        <td>${b.services||'—'}</td><td>${fmt(amt)}${b.discount_type?`<br><span style="font-size:10px;color:var(--green);font-weight:700">${b.discount_type==='senior'?'👴SC':b.discount_type==='pwd'?'♿PWD':b.hmo_provider||'HMO'} -${b.discount_pct||0}%</span>`:''}</td>
        <td>${fmt(paid)}</td><td>${fmt((parseFloat(b.discounted_amount||amt))-paid)}</td>
        <td>
          ${badgeHtml(b.status||'Unpaid')}
          ${(b.payments||[]).length > 0
            ? `<span style="font-size:10px;color:var(--muted);display:block;margin-top:2px">${(b.payments||[]).length} payment(s)</span>`
            : ''}
        </td>
        <td style="white-space:nowrap">
          ${amt-paid > 0
            ? `<button class="btn btn-sm" style="background:#16A34A;color:#fff" onclick="recordPayment('${id}')">💳 Pay</button>`
            : `<button class="btn btn-sm" style="background:#D1FAE5;color:#16A34A;cursor:default">✅ Paid</button>`}
          <button class="btn btn-sm" style="background:#7C3AED;color:#fff" onclick="viewPayments('${id}')">📋 History</button>
          <button class="btn btn-secondary btn-sm" onclick="editBill('${id}')">✏</button>
          <button class="btn btn-danger btn-sm" onclick="deleteBill('${id}')">🗑</button>
          <button class="btn btn-sm" style="background:#6366F1;color:#fff" onclick="printReceipt('${id}')">🖨</button>
          <button class="btn btn-sm" style="background:#0891B2;color:#fff" onclick="printInvoice('${id}')">📄</button>
          <button class="btn btn-sm" style="background:#10B981;color:#fff" onclick="generatePhilHealthClaim('${id}')">📋 PhilHealth</button>
        </td>
      </tr>`;
    }).join('') || `<tr><td colspan="9"><div class="empty"><div class="empty-icon">💰</div><p>${ql?'No results found':'No bills yet'}</p></div></td></tr>`;

  (document.getElementById('main')||{}).innerHTML = `
    <div class="section-header">
      <div class="section-title">Billing & Payments</div>
      <div class="btn-row">
        <input class="search-box" id="bilSearch" placeholder="🔍 Search patient or service..." oninput="filterBilTable(this.value)" value="${q}">
        <button class="btn btn-teal" onclick="exportBillingCSV()">Export CSV</button>
        <button class="btn btn-primary" onclick="addBill()">＋ New Bill</button>
      </div>
    </div>
    <div class="summary-strip">
      <div class="summary-item"><div class="summary-val" style="color:var(--blue)">${fmt(totalBilled)}</div><div class="summary-lbl">Total Billed</div></div>
      <div class="summary-divider"></div>
      <div class="summary-item"><div class="summary-val" style="color:var(--green)">${fmt(totalPaid)}</div><div class="summary-lbl">Total Collected</div></div>
      <div class="summary-divider"></div>
      <div class="summary-item"><div class="summary-val" style="color:var(--red)">${fmt(totalBilled-totalPaid)}</div><div class="summary-lbl">Outstanding</div></div>
    </div>
    <div class="table-wrap"><div class="table-scroll">
      <table><thead><tr>
        <th>ID</th><th>Patient</th><th>Date</th><th>Services</th><th>Amount</th><th>Paid</th><th>Balance</th><th>Status</th><th>Actions</th>
      </tr></thead><tbody id="bilTableBody">${rows}</tbody></table>
    </div></div>`;

  const s = document.getElementById('bilSearch');
  if(s && q){ s.focus(); s.setSelectionRange(q.length, q.length); }
}

function billAutoFillServices(patientId){
  const sugg = document.getElementById('apt_suggestions');
  const svc  = document.getElementById('f_services');
  if(!sugg || !patientId) return;

  const apts = load(KEYS.appointments);
  // Get this patient's recent appointments, most recent first
  const recent = Object.values(apts)
    .filter(a => a.patient_id === patientId && a.type)
    .sort((a,b) => (b.date||'').localeCompare(a.date||''))
    .slice(0, 6);

  if(!recent.length){
    sugg.innerHTML = '<span style="font-size:11px;color:var(--muted)">No appointments found for this patient.</span>';
    return;
  }

  // Show unique types as clickable chips
  const seen = new Set();
  const chips = recent
    .filter(a => { if(seen.has(a.type)) return false; seen.add(a.type); return true; })
    .map(a => `
      <button type="button" onclick="(document.getElementById('f_services')||{}).value='${a.type.replace(/'/g,"\\'")}';document.getElementById('apt_suggestions').querySelectorAll('button').forEach(b=>b.style.background='');this.style.background='var(--blue)';this.style.color='#fff';"
        style="padding:5px 12px;border-radius:20px;border:1.5px solid var(--blue);background:var(--sky);color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s">
        ${a.type} <span style="font-size:10px;opacity:.7">${a.date||''}</span>
      </button>`).join('');

  sugg.innerHTML = '<span style="font-size:11px;color:var(--muted);width:100%;display:block;margin-bottom:4px">📋 Recent appointments — click to fill:</span>' + chips;

  // Auto-fill if field is empty
  if(!svc.value && recent[0]) svc.value = recent[0].type;
}

function applyBillDiscount(){
  const type   = document.getElementById('f_discount_type')?.value;
  const pctEl  = document.getElementById('f_discount_pct');
  const hmoRow = document.getElementById('f_hmo_row');
  const prev   = document.getElementById('f_discount_preview');
  const amt    = parseFloat(document.getElementById('f_amount')?.value||0);
  const discEl = document.getElementById('f_discounted_amount');

  // Show/hide fields
  if(pctEl) pctEl.style.display = (type==='custom'||type==='hmo') ? 'block' : 'none';
  if(hmoRow) hmoRow.style.display = type==='hmo' ? 'block' : 'none';

  let pct = 0;
  if(type==='senior' || type==='pwd'){ pct=20; if(pctEl) pctEl.value=20; }
  else if(type==='custom'||type==='hmo'){ pct=parseFloat(pctEl?.value||0); }

  const disc = amt * (pct/100);
  const final = Math.max(0, amt - disc);
  if(discEl) discEl.value = final.toFixed(2);
  if(prev){
    prev.textContent = pct>0
      ? `Discount: ₱${disc.toFixed(2)} (${pct}%) → Net: ₱${final.toFixed(2)}`
      : '';
  }
}

function addBill(){
  const pts = load(KEYS.patients);
  if(!Object.keys(pts).length){ toast('Add patients first!'); return; }
  openModal('New Bill', billForm(), ()=>{
    if(!fval('patient_id')){ toast('Select a patient'); return; }
    const bil = load(KEYS.billing);
    const id  = nextId(bil,'B');
    const amt = parseFloat(fval('amount')||0);
    const paid= parseFloat(fval('paid')||0);
    const discType=fval('discount_type'), discPct=parseFloat(fval('discount_pct')||0);
    const hmoProvider=fval('hmo_provider')||'', hmoCard=fval('hmo_card')||'';
    const discAmt=parseFloat(fval('discounted_amount')||fval('amount')||0);
    bil[id] = {patient_id:fval('patient_id'),date:fval('date'),services:fval('services'),
      amount:fval('amount'),discounted_amount:discAmt,discount_type:discType,discount_pct:discPct,
      hmo_provider:hmoProvider,hmo_card:hmoCard,
      paid:fval('paid'),payment_method:fval('payment_method'),
      notes:fval('notes'), status: paid>=parseFloat(fval('discounted_amount')||amt)?'Paid': paid>0?'Partial':'Unpaid',
      branch: _saveBranch() || 'Main Branch',
      philhealth_eligible: document.getElementById('f_ph_eligible')?.checked || false,
      philhealth_covers: document.getElementById('f_ph_covers')?.value || 0,
      philhealth_patient: document.getElementById('f_ph_patient')?.value || 0};
    save(KEYS.billing, bil, id);
    closeModal(); toast('✅ Bill saved!'); showBilling();
  });
  // Attach amount change listener after modal renders
  setTimeout(()=>{
    const amtField = document.getElementById('f_amount');
    if(amtField) {
      amtField.addEventListener('change', calculatePhilHealthShare);
      amtField.addEventListener('input', calculatePhilHealthShare);  // BONUS: Real-time update
    }
  }, 100);
}

async function editBill(id){
  const bil = load(KEYS.billing);
  openModal('Edit Bill', billForm(bil[id]), async ()=>{
    if(!fval('patient_id')){ toast('Select a patient'); return; }
    if(!(await _checkCloudVersion('billing', id, bil[id]))) return;
    const amt = parseFloat(fval('amount')||0);
    const paid= parseFloat(fval('paid')||0);
    const discType2=fval('discount_type'), discPct2=parseFloat(fval('discount_pct')||0);
    const discAmt2=parseFloat(fval('discounted_amount')||fval('amount')||0);
    bil[id] = {...bil[id], patient_id:fval('patient_id'),date:fval('date'),services:fval('services'),
      amount:fval('amount'),discounted_amount:discAmt2,discount_type:discType2,discount_pct:discPct2,
      hmo_provider:fval('hmo_provider')||'',hmo_card:fval('hmo_card')||'',
      paid:fval('paid'),payment_method:fval('payment_method'),
      notes:fval('notes'), status: paid>=parseFloat(fval('discounted_amount')||amt)?'Paid': paid>0?'Partial':'Unpaid',
      updated_at:new Date().toISOString(),
      philhealth_eligible: document.getElementById('f_ph_eligible')?.checked || false,
      philhealth_covers: document.getElementById('f_ph_covers')?.value || 0,
      philhealth_patient: document.getElementById('f_ph_patient')?.value || 0};
    save(KEYS.billing, bil, id);
    closeModal(); toast('✅ Bill updated!'); showBilling();
  });
  // Show appointment suggestions for the existing patient
  setTimeout(()=>{ billAutoFillServices(bil[id]?.patient_id); applyBillDiscount(); calculatePhilHealthShare(); }, 150);
}

function markPaid(id){
  const bil = load(KEYS.billing);
  const b   = bil[id];
  const amt = parseFloat(b.amount||0);
  const alreadyPaid = parseFloat(b.paid||0);
  const remaining = amt - alreadyPaid;
  if(remaining <= 0){ toast('✅ Already fully paid!'); return; }
  // Record as a single full payment
  if(!b.payments) b.payments = [];
  b.payments.push({ date: today(), amount: remaining, method: b.payment_method||'Cash', notes: 'Full payment' });
  b.paid   = amt;
  b.status = 'Paid';
  save(KEYS.billing, bil, id);
  toast('✅ Marked as Paid!'); showBilling();
}

// ── INSTALLMENT: Record a Payment ────────────────────────────────────────────
function recordPayment(id){
  const bil = load(KEYS.billing);
  const pts = load(KEYS.patients);
  const b   = bil[id];
  if(!b){ toast('❌ Bill not found'); return; }
  const amt       = parseFloat(b.discounted_amount||b.amount||0);
  const rawAmt    = parseFloat(b.amount||0);
  const alreadyPaid = parseFloat(b.paid||0);
  const remaining = amt - alreadyPaid;
  const pname     = pName(b, pts);
  const discLabel = b.discount_type ? `<div style="font-size:11px;color:var(--green);font-weight:700;margin-top:4px">${b.discount_type==='senior'?'👴 Senior Citizen':b.discount_type==='pwd'?'♿ PWD':b.hmo_provider||'HMO'} discount applied: -${b.discount_pct||0}% (saved ₱${(rawAmt-amt).toFixed(2)})</div>` : '';

  if(remaining <= 0){ toast('✅ This bill is already fully paid!'); return; }

  openModal(`💳 Record Payment — ${pname}`, `
    <div style="background:var(--sky);border-radius:10px;padding:14px 16px;margin-bottom:16px">
      ${discLabel}
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center">
        <div>
          <div style="font-size:18px;font-weight:700;color:var(--blue)">${fmt(amt)}</div>
          <div style="font-size:11px;color:var(--muted)">Total Bill</div>
        </div>
        <div>
          <div style="font-size:18px;font-weight:700;color:var(--green)">${fmt(alreadyPaid)}</div>

function updatePayBalance(remaining){

  if(prev) prev.innerHTML = `After this payment, balance will be <b style="color:${bal>0?'var(--red)':'var(--green)'}">${fmt(bal)}</b>`;
}

// ── INSTALLMENT: Delete a single payment entry ────────────────────────────────
async function deletePayment(billId, payIndex){
  if(!(await _confirm('Remove this payment entry? The amount will be deducted from the total paid.'))) return;
  const bil = load(KEYS.billing);
  const b   = bil[billId];
  if(!b || !b.payments) return;
  const removed = parseFloat(b.payments[payIndex].amount||0);
  b.payments.splice(payIndex, 1);
  const newPaid = Math.max(0, parseFloat(b.paid||0) - removed);
  b.paid   = parseFloat(newPaid.toFixed(2));
  b.status = newPaid <= 0 ? 'Unpaid' : newPaid >= parseFloat(b.discounted_amount||b.amount||0) - 0.01 ? 'Paid' : 'Partial';
  save(KEYS.billing, bil, billId);
  toast('🗑 Payment entry removed');
  closeModal();
  showBilling();
}

function deleteBill(id){
  const bil = load(KEYS.billing);
  const pts = load(KEYS.patients);
  const pname = pName(bil[id]||{}, pts);
  confirmDelete(`Delete bill for ${pname}?`, ()=>{
    delete bil[id]; save(KEYS.billing, bil, id);
    _sbDelete('billing', id);
    toast('🗑 Bill deleted'); showBilling();
  });
}

function exportBilling(){
  const bil = load(KEYS.billing);
  const pts = load(KEYS.patients);
  const rows = [['ID','Patient','Date','Services','Amount','Paid','Balance','Method','Status']];
  Object.entries(bil).forEach(([id,b])=>{
    const pname = (pts[b.patient_id]||{}).name||'';
    const amt = parseFloat(b.amount||0), paid = parseFloat(b.paid||0);
    rows.push([id,pname,b.date,b.services,amt,paid,amt-paid,b.payment_method,b.status]);
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'billing_export.csv';
  a.click();
  toast('📥 CSV exported!');
}

function showInventory(){
  let inv = load(KEYS.inventory);
  
  // Apply branch filter (BranchAdmin/Staff can only see their branch's inventory)
  if(!canSeeAllBranches()) {
    const myBranch = _myBranch();
    inv = Object.fromEntries(
      Object.entries(inv).filter(([k,v]) => v.branch === myBranch || !v.branch)
    );
  }
  
  const now = new Date();
  const in30 = new Date(); in30.setDate(in30.getDate()+30);

  const rows = Object.entries(inv).map(([id,item])=>{
    const qty = parseFloat(item.quantity||0);
    const reorder = parseFloat(item.reorder||0);
    const status = qty <= reorder ? '⚠ Low' : 'OK';

    // Expiry check
    let expiryDisplay = item.expiry || '—';
    let rowStyle = '';
    if(item.expiry){
      const expD = new Date(item.expiry);
      if(!isNaN(expD)){
        if(expD < now){
          expiryDisplay = `<span style="color:var(--red);font-weight:700">🚫 EXPIRED ${item.expiry}</span>`;
          rowStyle = 'background:#FFF1F1';
        } else if(expD <= in30){
          expiryDisplay = `<span style="color:var(--yellow);font-weight:700">⚠️ ${item.expiry}</span>`;
          rowStyle = 'background:#FFFBEB';
        }
      }
    }

    return `<tr style="${rowStyle}">
      <td>${id}</td><td><b>${_esc(item.name)}</b></td><td>${item.category||'—'}</td>
      <td>${qty}</td><td>${item.unit||'pcs'}</td><td>${reorder}</td>
      <td>${fmt(item.unit_cost)}</td><td>${item.supplier||'—'}</td>
      <td>${expiryDisplay}</td>
      <td>${badgeHtml(status)}</td>
      <td>
        <button class="btn btn-teal btn-sm" onclick="addStock('${id}')" title="Add stock">＋ Stock</button>
        <button class="btn btn-secondary btn-sm" onclick="editItem('${id}')">✏ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteItem('${id}')">🗑 Delete</button>
      </td>
    </tr>`;
  }).join('') || `<tr><td colspan="11"><div class="empty"><div class="empty-icon">📦</div><p>No items in inventory</p></div></td></tr>`;

  (document.getElementById('main')||{}).innerHTML = `
    <div class="section-header">
      <div class="section-title">Inventory & Supplies</div>
      <div class="btn-row">
        <button class="btn btn-teal" onclick="exportInventory()">Export CSV</button>
        <button class="btn btn-primary" onclick="addItem()">＋ Add Item</button>
      </div>

function downloadCSV(filename, rows){
  // Add BOM for Excel to read Filipino characters correctly
  const bom = '\uFEFF';
  const csv = rows.map(r=>r.map(v=>{
    const s = (v===null||v===undefined) ? '' : String(v);
    return (s.includes(',')||s.includes('\n')||s.includes('"')) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\r\n');
  const content = bom + csv;
  const blob = new Blob([content], {type:'text/csv;charset=utf-8'});

  // Detect mobile/tablet
  const isMobile = /Android|iPhone|iPad|iPod|Mobile|Tablet/i.test(navigator.userAgent);

  // Try Web Share API first (works on Android + iOS Safari)
  if(isMobile && navigator.share){
    const file = new File([blob], filename, {type:'text/csv'});
    navigator.share({
      title: 'Dental City Clinic — Export',
      text: filename,
      files: [file]
    }).then(()=>{
      toast('📤 File shared successfully!');
    }).catch(err=>{
      if(err.name !== 'AbortError'){
        _showMobileExportModal(content, filename);
      }
    });
    return;
  }

  // Desktop — normal download
  if(!isMobile){
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 10000);
    toast('📥 '+filename+' exported!');
    return;
  }

  // Mobile fallback — show options modal
  _showMobileExportModal(content, filename);
}

function _copyCSVToClipboard(){
  const content = window._csvExportContent || '';
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(content).then(()=>{
      toast('📋 Copied! Paste into Google Sheets or Excel');
      document.getElementById('mobileExportModal')?.remove();
    }).catch(()=>{
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = content;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('📋 Copied! Paste into Google Sheets or Excel');
      document.getElementById('mobileExportModal')?.remove();
    });
  }
}

function _openCSVNewTab(){
  const content  = window._csvExportContent || '';
  const filename = window._csvExportFilename || 'export.csv';

  const url  = URL.createObjectURL(blob);
  window.open(url, '_blank');

// 💾 AUTO-BACKUP SYSTEM
// ══════════════════════════════════════════════════════════════════════════════
const _AUTO_BACKUP_KEY  = 'dc_auto_backups';   // rolling JSON snapshots
const _LAST_AUTO_BACKUP = 'dc_last_auto_backup';

// Take a full JSON snapshot and store in localStorage (keeps last 3)
function takeAutoBackup(){
  try{
    const snapshot = {
      ts:      Date.now(),
      time:    new Date().toLocaleString('en-PH'),
      branch:  getBranchName() || 'Main',
      version: '3.0',
      data:{
        patients:     load(KEYS.patients),
        appointments: load(KEYS.appointments),
        treatments:   load(KEYS.treatments),
        billing:      load(KEYS.billing),
        inventory:    load(KEYS.inventory),
      }
    };
    let backups = [];
    try{ backups = JSON.parse(localStorage.getItem(_AUTO_BACKUP_KEY)||'[]'); }catch(e){}
    backups.unshift(snapshot);
    backups = backups.slice(0, 3);
    localStorage.setItem(_AUTO_BACKUP_KEY, JSON.stringify(backups));
    localStorage.setItem(_LAST_AUTO_BACKUP, Date.now().toString());
    localStorage.setItem(KEYS.lastBackup, new Date().toISOString());
    _uploadBackupToCloud(snapshot).catch(()=>{});
    return true;
  }catch(e){ return false; }
}

async function _uploadBackupToCloud(snapshot){
  const cfg = getSBConfig();
  if(!cfg.url||!cfg.key) return;
  try{
    const branch   = _branchSlug(snapshot.branch);
    const filename = branch+'_'+Date.now()+'.csv';
    const path     = 'backups/'+branch+'/'+filename;
    // Build CSV same format as manual exportBackup()
    const d = snapshot.data;
    const pts = d.patients||{}, apts = d.appointments||{}, txs = d.treatments||{}, bil = d.billing||{}, inv = d.inventory||{};
    const rows = [
      ['DENTAL CLINIC SYSTEM — CLOUD BACKUP'],
      ['Branch:', snapshot.branch, 'Saved:', snapshot.time],
      [],
      ['=== PATIENTS ==='],
      ['ID','Name','Age','Gender','Contact','Email','Branch'],
    ];
    Object.entries(pts).forEach(([id,p])=>rows.push([id,p.name||'',p.age||'',p.gender||'',p.contact||'',p.email||'',p.branch||'']));
    rows.push([],['=== APPOINTMENTS ==='],['ID','Patient ID','Date','Time','Dentist','Type','Status']);
    Object.entries(apts).forEach(([id,a])=>rows.push([id,a.patient_id||'',a.date||'',a.time||'',a.dentist||'',a.type||'',a.status||'']));
    rows.push([],['=== TREATMENTS ==='],['ID','Patient ID','Date','Procedure','Tooth','Dentist','Cost']);
    Object.entries(txs).forEach(([id,t])=>rows.push([id,t.patient_id||'',t.date||'',t.procedure||'',t.tooth||'',t.dentist||'',t.cost||'0']));
    rows.push([],['=== BILLING ==='],['ID','Patient ID','Date','Services','Amount','Paid','Status']);
    Object.entries(bil).forEach(([id,b])=>rows.push([id,b.patient_id||'',b.date||'',b.services||'',b.amount||'0',b.paid||'0',b.status||'']));
    rows.push([],['=== INVENTORY ==='],['ID','Name','Category','Quantity','Unit','Reorder','Cost']);
    Object.entries(inv).forEach(([id,i])=>rows.push([id,i.name||'',i.category||'',i.quantity||'0',i.unit||'',i.reorder||'0',i.unit_cost||'0']));
    const csv = '\uFEFF' + rows.map(r=>r.map(v=>{ const s=String(v||''); return (s.includes(',')||s.includes('"'))?'"'+s.replace(/"/g,'""')+'"':s; }).join(',')).join('\r\n');
    const res = await fetch(cfg.url+'/storage/v1/object/'+path,{
      method:'POST',
      headers:{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key,'Content-Type':'text/csv','x-upsert':'true'},
      body: csv
    });
    if(res.ok){
      console.log('☁️ Backup uploaded:', path);
      // Only prune once a day to avoid slowdowns
      const lastPrune = parseInt(localStorage.getItem('_lastCloudPrune')||'0');
      if(Date.now()-lastPrune > 86400000){
        localStorage.setItem('_lastCloudPrune', Date.now());
        setTimeout(()=>_pruneCloudBackups(branch, cfg).catch(()=>{}), 5000);
      }
    }
  }catch(e){}
}

async function _pruneCloudBackups(branch, cfg){
  try{
    const res = await fetch(cfg.url+'/storage/v1/object/list/backups',{
      method:'POST',
      headers:{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key,'Content-Type':'application/json'},
      body: JSON.stringify({limit:100,offset:0,prefix:branch+'/',sortBy:{column:'created_at',order:'asc'}})
    });
    if(!res.ok) return;
    const files = await res.json();
    if(!Array.isArray(files)||files.length<=5) return;
    const toDelete = files.slice(0,files.length-5).map(f=>'backups/'+branch+'/'+f.name);
    await fetch(cfg.url+'/storage/v1/object/backups',{
      method:'DELETE',
      headers:{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key,'Content-Type':'application/json'},
      body: JSON.stringify({prefixes:toDelete})
    });
  }catch(e){}
}

// ── Download a cloud backup file ──────────────────────────────────────────────
async function _downloadCloudBackup(folder, filename){
  const cfg = getSBConfig();
  if(!cfg.url||!cfg.key) return;
  try{
    const res = await fetch(cfg.url+'/storage/v1/object/backups/'+folder+'/'+filename,{
      headers:{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key}
    });
    if(!res.ok){ toast('❌ Download failed'); return; }
    const text = await res.text();
    const blob = new Blob([text],{type:'text/csv;charset=utf-8'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download=filename; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    toast('📥 Downloaded: '+filename);
  }catch(e){ toast('❌ Error: '+e.message); }
}

// ── Restore from a cloud backup file ─────────────────────────────────────────
async function _restoreCloudBackup(folder, filename){
  const cfg = getSBConfig();
  if(!cfg.url||!cfg.key) return;

  // Branch restriction check
  if(!canSeeAllBranches()){
    const mySlug = _branchSlug(getBranchName());
    if(folder !== mySlug){ toast('⛔ You can only restore your own branch backups.'); return; }
  }

  if(!(await _confirm('↩ Restore this cloud backup?\n\nThis will REPLACE your current local data. Are you sure?',{icon:'☁️',ok:'Restore',danger:true}))) return;

  try{
    toast('⏳ Downloading backup…');
    const res = await fetch(cfg.url+'/storage/v1/object/backups/'+folder+'/'+filename,{
      headers:{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key}
    });
    if(!res.ok){ toast('❌ Could not fetch backup'); return; }
    const text = await res.text();

    // Parse CSV (reuse existing importBackup parser logic)
    const lines = text.replace(/^\uFEFF/,'').split(/\r?\n/);
    const data = {patients:{},appointments:{},treatments:{},billing:{},inventory:{}};
    let section=null, headers=[];

    for(let i=0;i<lines.length;i++){
      const line=lines[i].trim();
      if(!line) continue;
      if(line.includes('=== PATIENTS ==='))    { section='patients';     headers=[]; continue; }
      if(line.includes('=== APPOINTMENTS ===')) { section='appointments'; headers=[]; continue; }
      if(line.includes('=== TREATMENTS ==='))   { section='treatments';   headers=[]; continue; }
      if(line.includes('=== BILLING ==='))      { section='billing';      headers=[]; continue; }
      if(line.includes('=== INVENTORY ==='))    { section='inventory';    headers=[]; continue; }
      if(line.includes('=== END')||line.includes('CLOUD BACKUP')||line.includes('Branch:')) { section=null; continue; }
      if(!section) continue;
      const cols=parseCSVLine(line);
      if(!cols.length||!cols[0]) continue;
      if(!headers.length){ headers=cols; continue; }
      const id=cols[0];
      if(!id||id.startsWith('Total')||id.startsWith('===')) continue;
      const rec={};
      headers.forEach((h,idx)=>{ if(idx>0) rec[h.toLowerCase().replace(/\s+/g,'_')]=cols[idx]||''; });
      if(section==='patients')     data.patients[id]     = {name:rec.name||'',age:rec.age||'',gender:rec.gender||'',contact:rec.contact||'',email:rec.email||'',branch:rec.branch||''};
      if(section==='appointments') data.appointments[id] = {patient_id:rec.patient_id||'',date:rec.date||'',time:rec.time||'',dentist:rec.dentist||'',type:rec.type||'',status:rec.status||''};
      if(section==='treatments')   data.treatments[id]   = {patient_id:rec.patient_id||'',date:rec.date||'',procedure:rec.procedure||'',tooth:rec.tooth||'',dentist:rec.dentist||'',cost:rec.cost||'0'};
      if(section==='billing')      data.billing[id]      = {patient_id:rec.patient_id||'',date:rec.date||'',services:rec.services||'',amount:rec.amount||'0',paid:rec.paid||'0',status:rec.status||''};
      if(section==='inventory')    data.inventory[id]    = {name:rec.name||'',category:rec.category||'',quantity:rec.quantity||'0',unit:rec.unit||'',reorder:rec.reorder||'0',unit_cost:rec.unit_cost||'0'};
    }

    const pts=Object.keys(data.patients).length;
    if(!pts){ toast('❌ Could not parse backup file'); return; }

    // SAFE RESTORE: merge into existing local data instead of replacing entire table
    // Prevents wiping other branches' records from Developer/Owner local view
    const mergeAndPush = (key, table, newRecords) => {
      const existing = load(key) || {};
      const merged = { ...existing, ...newRecords };
      DB.set(key, merged);
      // Push ONLY the restored records to Supabase (not the whole merged set)
      Object.entries(newRecords).forEach(([id,rec])=>{
        _sbUpsertOne(table, id, rec).catch(()=>{});
      });
    };

    if(pts) mergeAndPush(KEYS.patients, 'patients', data.patients);
    if(Object.keys(data.appointments).length) mergeAndPush(KEYS.appointments, 'appointments', data.appointments);
    if(Object.keys(data.treatments).length)   mergeAndPush(KEYS.treatments,   'treatments',   data.treatments);
    if(Object.keys(data.billing).length)      mergeAndPush(KEYS.billing,      'billing',      data.billing);
    if(Object.keys(data.inventory).length)    mergeAndPush(KEYS.inventory,    'inventory',    data.inventory);

    closeModal();
    toast('✅ Cloud backup restored! '+pts+' patients merged & pushed to Supabase.');
    showDashboard();
  }catch(e){ toast('❌ Restore failed: '+e.message); }
}

// Restore from a specific auto-backup snapshot
async function restoreAutoBackup(index){
  try{
    const backups = JSON.parse(localStorage.getItem(_AUTO_BACKUP_KEY)||'[]');
    const snap = backups[index];
    if(!snap){ toast('❌ Backup not found'); return; }
    if(!(await _confirm(`Restore backup from ${snap.time}?\n\nYour current data will be replaced.`))) return;
    const d = snap.data;
    // Merge backup into existing data (newer records win via ID)
    const merge = (key, incoming) => {
      if(!incoming) return;
      const existing = load(key) || {};
      const merged = Object.assign({}, incoming, existing); // existing wins on conflict
      save(key, merged);
    };
    merge(KEYS.patients,     d.patients);
    merge(KEYS.appointments, d.appointments);
    merge(KEYS.treatments,   d.treatments);
    merge(KEYS.billing,      d.billing);
    merge(KEYS.inventory,    d.inventory);
    toast('✅ Backup restored!');
    showDashboard();
  }catch(e){ toast('❌ Restore failed: '+e.message); }
}

// Check if auto-backup is needed (every 12 hours)
function checkAutoBackup(){
  if(!_appUnlocked) return;
  const last  = parseInt(localStorage.getItem(_LAST_AUTO_BACKUP)||'0');
  const hours = (Date.now() - last) / (1000 * 60 * 60);
  if(hours >= 12){
    const ok = takeAutoBackup(); // local snapshot + CSV to Supabase Storage
    if(ok){
      toast('💾 Auto-backup saved! Syncing to cloud…');
      // Also push all local data to Supabase DB tables
      _autoSyncToCloud().catch(()=>{});
    }
  }
}

// ── Push all local data to Supabase DB every 12h ─────────────────────────────
async function _autoSyncToCloud(){
  try{
    const cfg = getSBConfig();
    if(!cfg.url||!cfg.key) return;
    const tables = [
      { key: KEYS.patients,     table: 'patients'     },
      { key: KEYS.appointments, table: 'appointments' },
      { key: KEYS.treatments,   table: 'treatments'   },
      { key: KEYS.billing,      table: 'billing'      },
      { key: KEYS.inventory,    table: 'inventory'    },
    ];
    let pushed = 0;
    for(const {key, table} of tables){
      const data = load(key);
      const records = Object.entries(data||{});
      for(const [id, record] of records){
        try{
          await _sbUpsertOne(table, id, record);
          pushed++;
        }catch(e){}
      }
    }
    console.log('☁️ Auto-sync complete —', pushed, 'records pushed');
    localStorage.setItem('_lastCloudSync', new Date().toLocaleString('en-PH'));
  }catch(e){ console.log('Auto-sync error:', e.message); }
}

// Get backup health status
function getBackupHealth(){
  const last = parseInt(localStorage.getItem(_LAST_AUTO_BACKUP)||'0');
  if(!last) return { status:'none', label:'No backup', color:'var(--red)' };
  const hours = (Date.now() - last) / (1000 * 60 * 60);
  if(hours < 12)  return { status:'good',    label:'Backed up ' + (hours<1?'recently':`${Math.floor(hours)}h ago`), color:'var(--green)' };
  if(hours < 48)  return { status:'warning', label:'Backup ' + Math.floor(hours) + 'h ago',  color:'var(--yellow)' };
                  return { status:'danger',  label:'Backup overdue!',                          color:'var(--red)'    };
}

// ── Force backup download every 3 days — non-dismissible ─────────────────────
function checkBackupReminder(){
  const last = localStorage.getItem(KEYS.lastBackup);
  const daysSince = last
    ? (Date.now() - new Date(last).getTime()) / (1000 * 60 * 60 * 24)
    : 999;

  // Auto-backup snapshot every 12 hours (silent)
  setTimeout(checkAutoBackup, 3000);
  // Schedule recurring auto-backup check every 12 hours
  setInterval(checkAutoBackup, 12 * 60 * 60 * 1000);

  if(daysSince >= 3){
    setTimeout(()=>_showBackupRequiredModal(daysSince), 2500);
  }
}

  const bil  = load(KEYS.billing);

  const rows = [
    ['BRANCH REPORT — '+branch.toUpperCase()],
    ['Branch:', branch, 'Date:', new Date().toLocaleString('en-PH'), contact?'Sent to:':'', contact||''],
    [],
    ['=== PATIENTS ==='],

  ];
  Object.entries(pts).forEach(([id,p])=>{
    rows.push([id,p.name||'',p.age||'',p.gender||'',p.contact||'',p.email||'',branch]);
  });

  rows.push([],['=== APPOINTMENTS ==='],
    ['ID','Patient','Date','Time','Dentist','Type','Status','Branch']);

    .forEach(([id,a])=>{
      rows.push([id,pName(a,pts),cleanDate(a.date),cleanTime(a.time),a.dentist||'',a.type||'',a.status||'',branch]);
    });

  rows.push([],['=== TREATMENTS ==='],
    ['ID','Patient','Date','Procedure','Tooth','Dentist','Cost']);
  Object.entries(txs).sort((a,b)=>cleanDate(b[1].date).localeCompare(cleanDate(a[1].date)))
    .forEach(([id,t])=>{
      rows.push([id,pName(t,pts),cleanDate(t.date),t.procedure||'',t.tooth||'',t.dentist||'',t.cost||'0']);
    });

  rows.push([],['=== BILLING ==='],

  Object.entries(bil).sort((a,b)=>cleanDate(b[1].date).localeCompare(cleanDate(a[1].date)))

  rows.push([],['=== END OF REPORT ===']);
  downloadCSV(`branch_report_${branch.replace(/\s+/g,'_')}_${date}.csv`, rows);
  toast('✅ Report downloaded! Send the CSV file to main branch.');
}

async function importBackup(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e){
    try{
      const text = e.target.result.replace(/^\uFEFF/,''); // remove BOM
      const lines = text.split(/\r?\n/);

      // Parse sections
      const data = { patients:{}, appointments:{}, treatments:{}, billing:{}, inventory:{} };
      let section = null;
      let headers = [];
      let branchName = '';

      // Get branch from header row
      const headerLine = lines[1]||'';
      const bMatch = headerLine.match(/Branch[,:]+"?([^,"]+)"?/i);
      if(bMatch) branchName = bMatch[1].trim();

      for(let i=0; i<lines.length; i++){
        const line = lines[i].trim();
        if(!line) continue;

        // Section headers
        if(line.includes('=== PATIENTS ==='))     { section='patients';     headers=[]; continue; }
        if(line.includes('=== APPOINTMENTS ==='))  { section='appointments'; headers=[]; continue; }
        if(line.includes('=== TREATMENTS ==='))    { section='treatments';   headers=[]; continue; }
        if(line.includes('=== BILLING ==='))       { section='billing';      headers=[]; continue; }
        if(line.includes('=== INVENTORY ==='))     { section='inventory';    headers=[]; continue; }
        if(line.includes('=== END'))               { section=null; continue; }

        if(!section) continue;
        const cols = parseCSVLine(line);
        if(!cols.length || !cols[0]) continue;

        // First data row after section = headers
        if(!headers.length){ headers=cols; continue; }

        const id = cols[0];
        if(!id || id.startsWith('Total') || id.startsWith('===')) continue;

        const rec = {};
        headers.forEach((h,idx)=>{ if(idx>0) rec[h.toLowerCase().replace(/\s+/g,'_')] = cols[idx]||''; });

        // Map columns back to internal field names
        if(section==='patients'){
          data.patients[id] = {
            name:rec.name||'', age:rec.age||'', gender:rec.gender||'',
            contact:rec.contact||'', email:rec.email||'', address:rec.address||'',
            medical_history:rec.medical_history||'', allergies:rec.allergies||'',
            branch:rec.branch||branchName||''
          };
        } else if(section==='appointments'){
          data.appointments[id] = {
            patient_id:rec.patient_id||rec['patient id']||'',
            date:rec.date||'', time:rec.time||'', dentist:rec.dentist||'',
            type:rec.type||'', status:rec.status||'', branch:rec.branch||branchName||'',
            notes:rec.notes||''
          };
        } else if(section==='treatments'){
          data.treatments[id] = {
            patient_id:rec.patient_id||rec['patient id']||'',
            date:rec.date||'', procedure:rec.procedure||'', tooth:rec.tooth||'',
            dentist:rec.dentist||'', cost:rec.cost||'0', notes:rec.notes||''
          };
        } else if(section==='billing'){
          data.billing[id] = {
            patient_id:rec.patient_id||rec['patient id']||'',
            date:rec.date||'', services:rec.services||'',
            amount:rec.amount||'0', paid:rec.paid||'0',
            payment_method:rec.method||rec.payment_method||'',
            status:rec.status||'Unpaid', branch:rec.branch||branchName||''
          };
        } else if(section==='inventory'){
          data.inventory[id] = {
            name:rec.name||'', category:rec.category||'',
            quantity:rec.quantity||'0', unit:rec.unit||'',
            reorder:rec.reorder||'0', unit_cost:rec.unit_cost||'0',
            supplier:rec.supplier||''
          };
        }
      }

      const pts  = Object.keys(data.patients).length;
      const apts = Object.keys(data.appointments).length;
      const bil  = Object.keys(data.billing).length;
      const inv  = Object.keys(data.inventory).length;

      if(!pts && !apts){
        toast('❌ Could not read backup file.\n\nMake sure you are using a CSV exported from this system.');
        return;
      }

      if(!(await _confirm(
        `⚠️ RESTORE from CSV backup?\n\nFrom: "${branchName||'Unknown Branch'}"\n\n` +
        `Contains:\n• ${pts} patient(s)\n• ${apts} appointment(s)\n• ${bil} bill(s)\n• ${inv} inventory item(s)\n\n` +
        `Your CURRENT data will be replaced. Are you sure?`
      ))) return;

      // SAFE MERGE: combine with existing data instead of replacing entire table
      const mergeAndPush = (key, table, newRecords) => {
        const existing = load(key) || {};
        const merged = { ...existing, ...newRecords };
        DB.set(key, merged);
        Object.entries(newRecords).forEach(([id,rec])=>{
          _sbUpsertOne(table, id, rec).catch(()=>{});
        });
      };

      if(pts)  mergeAndPush(KEYS.patients,     'patients',     data.patients);
      if(apts) mergeAndPush(KEYS.appointments, 'appointments', data.appointments);
      if(Object.keys(data.treatments).length) mergeAndPush(KEYS.treatments, 'treatments', data.treatments);
      if(bil)  mergeAndPush(KEYS.billing,      'billing',      data.billing);
      if(inv)  mergeAndPush(KEYS.inventory,    'inventory',    data.inventory);

      toast('✅ CSV Backup merged & synced to Supabase!');
      showDashboard();
    } catch(err){
      toast('❌ Failed to read CSV file.\n\nError: '+err.message);
      console.error('Import error:', err);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── Parse a single CSV line (handles quoted values) ───────────────────────────
function parseCSVLine(line){
  const result = [];
  let current  = '';
  let inQuotes = false;
  for(let i=0; i<line.length; i++){
    const c = line[i];
    if(c==='"'){
      if(inQuotes && line[i+1]==='"'){ current+='"'; i++; }
      else inQuotes = !inQuotes;
    } else if(c===',' && !inQuotes){
      result.push(current.trim()); current='';
    } else { current+=c; }
  }
  result.push(current.trim());
  return result;
}

// ── Export full report as CSV ──────────────────────────────────────────────────
function exportFullReport(){
  const allBil  = load(KEYS.billing);
  const allPts  = load(KEYS.patients);
  const allTxs  = load(KEYS.treatments);
  const bil     = _filterByBranch(allBil, allPts);
  const txs     = _filterByBranch(allTxs, allPts);
  const branch  = getBranchName() || 'All Branches';

  const totalBilled    = Object.values(bil).reduce((s,b)=>s+parseFloat(b.amount||0),0);
  const totalCollected = Object.values(bil).reduce((s,b)=>s+parseFloat(b.paid||0),0);
  const collectionRate = totalBilled > 0 ? Math.round((totalCollected/totalBilled)*100) : 0;

  const procMap = {};
  Object.values(txs).forEach(t=>{ const p=t.procedure||'Unknown'; procMap[p]=(procMap[p]||0)+1; });

  const rows = [
    ['DENTAL CITY CLINIC — ANALYTICS REPORT'],
    ['Branch:', branch, 'Generated:', new Date().toLocaleString('en-PH')],
    [],
    ['=== REVENUE SUMMARY ==='],
    ['Total Billed','Total Collected','Outstanding','Collection Rate'],
    [totalBilled.toFixed(2), totalCollected.toFixed(2), (totalBilled-totalCollected).toFixed(2), collectionRate+'%'],
    [],
    ['=== MONTHLY REVENUE (Last 12 Months) ==='],
    ['Month','Billed','Collected','Outstanding'],
  ];

  for(let i=11;i>=0;i--){
    const d = new Date(); d.setMonth(d.getMonth()-i);
    const key  = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const label= d.toLocaleDateString('en-PH',{month:'long',year:'numeric'});
    let billed=0, collected=0;
    Object.values(bil).forEach(b=>{ if(cleanDate(b.date).startsWith(key)){ billed+=parseFloat(b.amount||0); collected+=parseFloat(b.paid||0); }});
    rows.push([label, billed.toFixed(2), collected.toFixed(2), (billed-collected).toFixed(2)]);
  }

  rows.push([],['=== TOP PROCEDURES ==='],['Procedure','Count']);
  Object.entries(procMap).sort((a,b)=>b[1]-a[1]).forEach(([name,count])=>rows.push([name,count]));

  downloadCSV(`analytics_report_${branch}_${today()}.csv`, rows);
  toast('📥 Analytics report exported!');
}
