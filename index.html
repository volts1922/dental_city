function showTreatments(q=''){
  document.getElementById('main').innerHTML = `
    <div class="section-header">
      <div class="section-title">Treatments & Procedures</div>
      <div class="btn-row">
        <input class="search-box" id="txSearch" placeholder="🔍 Search patient or procedure..." oninput="filterTxTable(this.value)" value="${q}">
        <button class="btn btn-teal" onclick="exportTreatments()">Export CSV</button>
        <button class="btn btn-primary" onclick="addTx()">＋ Add Treatment</button>
      </div>
    </div>
    <div class="table-wrap"><div class="table-scroll">
      <table><thead><tr>
        <th>ID</th><th>Patient</th><th>Date</th><th>Procedure</th><th>Tooth</th><th>Dentist</th><th>Cost</th><th>Actions</th>
      </tr></thead><tbody id="txTableBody"></tbody></table>
    </div></div>`;

  filterTxTable(q);
  const s = document.getElementById('txSearch');
  if(s && q){ s.focus(); s.setSelectionRange(q.length, q.length); }
  setTimeout(initScrollHints, 100);
}

function filterTxTable(q=''){
  const allTxs = load(KEYS.treatments);
  const allPts = load(KEYS.patients);
  const txs = _filterByBranch(allTxs, allPts);
  const ql  = (q||'').toLowerCase();

  const rows = Object.entries(txs)
    .sort((a,b)=>cleanDate(b[1].date).localeCompare(cleanDate(a[1].date)))
    .filter(([id,t])=>{
      if(!ql) return true;
      const pname = (allPts[t.patient_id]||{}).name || t.patient_name || '';
      return (pname+id+(t.procedure||'')+(t.dentist||'')).toLowerCase().includes(ql);
    })
    .map(([id,t])=>{
      const pname = (allPts[t.patient_id]||{}).name || t.patient_name || '—';
      return `<tr>
        <td>${id}</td><td><b>${pname}</b></td><td>${cleanDate(t.date)}</td>
        <td>${t.procedure||'—'}</td><td>${t.tooth||'—'}</td>
        <td>${t.dentist||'—'}</td><td>${fmt(t.cost)}</td>
        <td>
          <button class="btn btn-secondary btn-sm" onclick="editTx('${id}')">✏ Update</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTx('${id}')">🗑 Delete</button>
        </td>
      </tr>`;
    }).join('') || `<tr><td colspan="8"><div class="empty"><div class="empty-icon">🦷</div><p>${ql?'No results found':'No treatments yet'}</p></div></td></tr>`;

  const body = document.getElementById('txTableBody');
  if(body) body.innerHTML = rows;
}

function txForm(d={}){
  return `
    <div class="form-group"><label class="form-label">Patient *</label>
      <select class="form-control" id="f_patient_id">
        <option value="">-- Select Patient --</option>${patientOptions(d.patient_id)}
      </select></div>
    ${formRow('Procedure *','procedure',d.procedure||'',null,['Cleaning','Extraction','Filling','Root Canal','Crowning','Braces Adjustment','Whitening','X-Ray','Consultation','Scaling','Other'])}
    ${formRow('Date *','date',d.date||today(),'date')}
    ${formRow('Tooth No. (FDI)','tooth',d.tooth)}
    ${formRow('Dentist','dentist',d.dentist||'Dr. ')}
    ${formRow('Cost (₱)','cost',d.cost||'0','number')}
    ${formRow('Notes','notes',d.notes)}`;
}

function addTx(){
  const pts = load(KEYS.patients);
  if(!Object.keys(pts).length){
    if(confirm('No patients found!\n\nWould you like to add a patient first?')){
      navigate('Patients','showPatients');
    }
    return;
  }
  openModal('Add Treatment', txForm(), ()=>{
    if(!fval('patient_id')||!fval('procedure')){ alert('Patient and Procedure required'); return; }
    const txs  = load(KEYS.treatments);
    const id   = nextId(txs,'T');
    const txData = {
      patient_id: fval('patient_id'),
      patient_name: (pts[fval('patient_id')]||{}).name||'',
      procedure:  fval('procedure'),
      date:       fval('date'),
      tooth:      fval('tooth'),
      dentist:    fval('dentist'),
      cost:       fval('cost'),
      notes:      fval('notes'),
      branch:     getBranchName()||'Main Branch'
    };
    txs[id] = txData;
    save(KEYS.treatments, txs, id);
    closeModal();
    toast('✅ Treatment saved!');

    // ── Cascade to Billing ────────────────────────────────────────────────────
    const pname = (pts[txData.patient_id]||{}).name||'Patient';
    setTimeout(()=>{
      if(confirm(`✅ Treatment saved!\n\n👉 Create a Bill for ${pname} now?\n\n"${txData.procedure}" will be auto-filled as Services Rendered.`)){
        _addBillFromTx(txData);
      } else {
        showTreatments();
      }
    }, 300);
  });
}

function editTx(id){
  const txs = load(KEYS.treatments);
  openModal('Edit Treatment', txForm(txs[id]), ()=>{
    if(!fval('patient_id')||!fval('procedure')){ alert('Patient and Procedure required'); return; }
    txs[id] = {...txs[id], patient_id:fval('patient_id'),procedure:fval('procedure'),date:fval('date'),
      tooth:fval('tooth'),dentist:fval('dentist'),cost:fval('cost'),notes:fval('notes')};
    save(KEYS.treatments, txs, id);
    closeModal(); toast('✅ Treatment updated!'); showTreatments();
  });
}

function deleteTx(id){
  const txs = load(KEYS.treatments);
  confirmDelete('Delete this treatment record?', ()=>{
    delete txs[id]; save(KEYS.treatments, txs, id);
    _sbDelete('treatments', id);
    toast('🗑 Treatment deleted'); showTreatments();
  });
}

const UPPER = [18,17,16,15,14,13,12,11,21,22,23,24,25,26,27,28];
const LOWER = [48,47,46,45,44,43,42,41,31,32,33,34,35,36,37,38];
const CONDITIONS = ['Healthy','Caries','Filled','Missing','Crown','Bridge','Root Canal','Extraction','Implant','Fractured'];
const COND_COLORS = {Healthy:'#16A34A',Caries:'#DC2626',Filled:'#2563EB',Missing:'#94A3B8',
  Crown:'#D97706',Bridge:'#7C3AED','Root Canal':'#EA580C',Extraction:'#9F1239',Implant:'#0D9488',Fractured:'#DC2626'};

let chartPatientId = '';

function showDentalChart(){
  const allPts = load(KEYS.patients);
  const pts    = _filterPatientsByBranch(allPts);
  document.getElementById('main').innerHTML = `
    <div class="section-header">
      <div class="section-title">Dental Chart</div>
      <div class="btn-row">
        <select class="form-control" style="width:220px" id="chartPatSel" onchange="loadChart()">
          <option value="">-- Select Patient --</option>
          ${Object.entries(pts).map(([id,p])=>`<option value="${id}">${p.name} (${id})</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="legend">${Object.entries(COND_COLORS).map(([c,col])=>`
      <div class="legend-item"><div class="legend-dot" style="background:${col}"></div>${c}</div>`).join('')}
    </div>
    <div class="chart-container" id="chartContainer">
      <div style="text-align:center;color:var(--muted);padding:32px">Select a patient to view their dental chart</div>
    </div>
    <div id="chartHistory"></div>`;
}

function loadChart(){
  chartPatientId = document.getElementById('chartPatSel').value;
  if(!chartPatientId) return;
  renderChart();
  renderChartHistory();
}

function renderChart(){
  const charts = load(KEYS.charts);
  const chart  = charts[chartPatientId] || {};

  function teethRow(teeth){
    return teeth.map(t=>{
      const cond  = (chart[t]||{}).condition || 'Healthy';
      const color = COND_COLORS[cond] || COND_COLORS.Healthy;
      return `<div class="tooth-btn" style="background:${color}" onclick="editTooth(${t})" title="Tooth ${t}: ${cond}">
        <span style="font-size:8px;opacity:.8">${t}</span>
      </div>`;
    }).join('');
  }

  document.getElementById('chartContainer').innerHTML = `
    <div style="min-width:640px">
      <div style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:8px">UPPER JAW</div>
      <div class="teeth-row">${teethRow(UPPER)}</div>
      <div class="tooth-divider" style="margin:10px 0"></div>
      <div class="teeth-row">${teethRow(LOWER)}</div>
      <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:8px">LOWER JAW</div>
    </div>`;
}

function renderChartHistory(){
  const charts = load(KEYS.charts);
  const chart  = charts[chartPatientId] || {};
  const entries = Object.entries(chart);
  if(!entries.length){
    document.getElementById('chartHistory').innerHTML = '';
    return;
  }
  const rows = entries.map(([tooth,info])=>`<tr>
    <td>${tooth}</td>
    <td><span class="badge" style="background:${COND_COLORS[info.condition]}22;color:${COND_COLORS[info.condition]}">${info.condition}</span></td>
    <td>${info.updated||'—'}</td>
    <td>${info.notes||'—'}</td>
  </tr>`).join('');

  document.getElementById('chartHistory').innerHTML = `
    <div class="section-title" style="margin:20px 0 12px">Tooth Condition History</div>
    <div class="table-wrap"><div class="table-scroll">
      <table><thead><tr><th>Tooth</th><th>Condition</th><th>Updated</th><th>Notes</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div></div>`;
}

function editTooth(toothNum){
  if(!chartPatientId){ alert('Select a patient first'); return; }
  const charts = load(KEYS.charts);
  const current = (charts[chartPatientId]||{})[toothNum] || {};
  openModal(`Tooth ${toothNum}`, `
    ${formRow('Condition','condition',current.condition||'Healthy',null,CONDITIONS)}
    ${formRow('Notes','notes',current.notes)}`, ()=>{
    if(!charts[chartPatientId]) charts[chartPatientId]={};
    charts[chartPatientId][toothNum] = {condition:fval('condition'),notes:fval('notes'),updated:today()};
    save(KEYS.charts, charts);
    closeModal(); toast('✅ Tooth updated!');
    renderChart(); renderChartHistory();
  });
}

function showBilling(q=''){
  const allBil = load(KEYS.billing);
  const allPts = load(KEYS.patients);
  const bil = _filterByBranch(allBil, allPts);
  const pts = allPts;
  const ql  = (q||'').toLowerCase();

  const totalBilled = Object.values(bil).reduce((s,b)=>s+parseFloat(b.amount||0),0);
  const totalPaid   = Object.values(bil).reduce((s,b)=>s+parseFloat(b.paid||0),0);

  const rows = Object.entries(bil)
    .sort((a,b)=>cleanDate(b[1].date).localeCompare(cleanDate(a[1].date)))
    .filter(([id,b])=>{
      if(!ql) return true;
      const p = pts[b.patient_id]||{};
      const pname = p.name || b.patient_name || '';
      return (pname+id+(b.services||'')+(b.status||'')).toLowerCase().includes(ql);
    })
    .map(([id,b])=>{
      const p      = pts[b.patient_id]||{};
      const pname  = p.name || b.patient_name || '—';
      const branch = _getBranch(b, p);
      const amt    = parseFloat(b.amount||0);
      const paid   = parseFloat(b.paid||0);
      return `<tr>
        <td>${id}</td>

        <td>${b.services||'—'}</td><td>${fmt(amt)}</td>
        <td>${fmt(paid)}</td><td>${fmt(amt-paid)}</td>
        <td>
          ${badgeHtml(b.status||'Unpaid')}
          ${(b.payments||[]).length > 0
            ? `<span style="font-size:10px;color:var(--muted);display:block;margin-top:2px">${(b.payments||[]).length} payment(s)</span>`
            : ''}
        </td>
        <td style="white-space:nowrap">
          ${amt-paid > 0
            ? `<button class="btn btn-sm" style="background:#16A34A;color:#fff" onclick="recordPayment('${id}')">💳 Pay</button>`
            : `<button class="btn btn-sm" style="background:#D1FAE5;color:#16A34A;cursor:default">✅ Paid</button>`}
          <button class="btn btn-sm" style="background:#7C3AED;color:#fff" onclick="viewPayments('${id}')">📋 History</button>
          <button class="btn btn-secondary btn-sm" onclick="editBill('${id}')">✏</button>
          <button class="btn btn-danger btn-sm" onclick="deleteBill('${id}')">🗑</button>
          <button class="btn btn-sm" style="background:#6366F1;color:#fff" onclick="printReceipt('${id}')">🖨</button>
          <button class="btn btn-sm" style="background:#0891B2;color:#fff" onclick="printInvoice('${id}')">📄</button>
        </td>
      </tr>`;
    }).join('') || `<tr><td colspan="9"><div class="empty"><div class="empty-icon">💰</div><p>${ql?'No results found':'No bills yet'}</p></div></td></tr>`;

  document.getElementById('main').innerHTML = `
    <div class="section-header">
      <div class="section-title">Billing & Payments</div>
      <div class="btn-row">
        <input class="search-box" id="bilSearch" placeholder="🔍 Search patient or service..." oninput="showBilling(this.value)" value="${q}">
        <button class="btn btn-teal" onclick="exportBillingCSV()">Export CSV</button>
        <button class="btn btn-primary" onclick="addBill()">＋ New Bill</button>
      </div>
    </div>

function billAutoFillServices(patientId){
  const sugg = document.getElementById('apt_suggestions');
  const svc  = document.getElementById('f_services');
  if(!sugg || !patientId) return;

  const apts = load(KEYS.appointments);
  // Get this patient's recent appointments, most recent first
  const recent = Object.values(apts)
    .filter(a => a.patient_id === patientId && a.type)
    .sort((a,b) => (b.date||'').localeCompare(a.date||''))
    .slice(0, 6);

  if(!recent.length){
    sugg.innerHTML = '<span style="font-size:11px;color:var(--muted)">No appointments found for this patient.</span>';
    return;
  }

  // Show unique types as clickable chips
  const seen = new Set();
  const chips = recent
    .filter(a => { if(seen.has(a.type)) return false; seen.add(a.type); return true; })
    .map(a => `
      <button type="button" onclick="document.getElementById('f_services').value='${a.type.replace(/'/g,"\\'")}';document.getElementById('apt_suggestions').querySelectorAll('button').forEach(b=>b.style.background='');this.style.background='var(--blue)';this.style.color='#fff';"
        style="padding:5px 12px;border-radius:20px;border:1.5px solid var(--blue);background:var(--sky);color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s">
        ${a.type} <span style="font-size:10px;opacity:.7">${a.date||''}</span>
      </button>`).join('');

  sugg.innerHTML = '<span style="font-size:11px;color:var(--muted);width:100%;display:block;margin-bottom:4px">📋 Recent appointments — click to fill:</span>' + chips;

  // Auto-fill if field is empty
  if(!svc.value && recent[0]) svc.value = recent[0].type;
}

function addBill(){
  const pts = load(KEYS.patients);
  if(!Object.keys(pts).length){ alert('Add patients first!'); return; }
  openModal('New Bill', billForm(), ()=>{
    if(!fval('patient_id')){ alert('Select a patient'); return; }
    const bil = load(KEYS.billing);
    const id  = nextId(bil,'B');
    const amt = parseFloat(fval('amount')||0);
    const paid= parseFloat(fval('paid')||0);
    bil[id] = {patient_id:fval('patient_id'),date:fval('date'),services:fval('services'),
      amount:fval('amount'),paid:fval('paid'),payment_method:fval('payment_method'),
      notes:fval('notes'), status: paid>=amt?'Paid': paid>0?'Partial':'Unpaid',
      branch: getBranchName() || 'Main Branch'};
    save(KEYS.billing, bil, id);
    closeModal(); toast('✅ Bill saved!'); showBilling();
  });
}

function editBill(id){
  const bil = load(KEYS.billing);
  openModal('Edit Bill', billForm(bil[id]), ()=>{
    if(!fval('patient_id')){ alert('Select a patient'); return; }
    const amt = parseFloat(fval('amount')||0);
    const paid= parseFloat(fval('paid')||0);
    bil[id] = {...bil[id], patient_id:fval('patient_id'),date:fval('date'),services:fval('services'),
      amount:fval('amount'),paid:fval('paid'),payment_method:fval('payment_method'),
      notes:fval('notes'), status: paid>=amt?'Paid': paid>0?'Partial':'Unpaid'};
    save(KEYS.billing, bil, id);
    closeModal(); toast('✅ Bill updated!'); showBilling();
  });
  // Show appointment suggestions for the existing patient
  setTimeout(()=>billAutoFillServices(bil[id]?.patient_id), 150);
}

function markPaid(id){
  const bil = load(KEYS.billing);
  const b   = bil[id];
  const amt = parseFloat(b.amount||0);
  const alreadyPaid = parseFloat(b.paid||0);
  const remaining = amt - alreadyPaid;
  if(remaining <= 0){ toast('✅ Already fully paid!'); return; }
  // Record as a single full payment
  if(!b.payments) b.payments = [];
  b.payments.push({ date: today(), amount: remaining, method: b.payment_method||'Cash', notes: 'Full payment' });
  b.paid   = amt;
  b.status = 'Paid';
  save(KEYS.billing, bil, id);
  toast('✅ Marked as Paid!'); showBilling();
}

// ── INSTALLMENT: Record a Payment ────────────────────────────────────────────
function recordPayment(id){
  const bil = load(KEYS.billing);
  const pts = load(KEYS.patients);
  const b   = bil[id];
  if(!b){ toast('❌ Bill not found'); return; }
  const amt       = parseFloat(b.amount||0);
  const alreadyPaid = parseFloat(b.paid||0);
  const remaining = amt - alreadyPaid;
  const pname     = pName(b, pts);

  if(remaining <= 0){ toast('✅ This bill is already fully paid!'); return; }

  openModal(`💳 Record Payment — ${pname}`, `
    <div style="background:var(--sky);border-radius:10px;padding:14px 16px;margin-bottom:16px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center">
        <div>
          <div style="font-size:18px;font-weight:700;color:var(--blue)">${fmt(amt)}</div>
          <div style="font-size:11px;color:var(--muted)">Total Bill</div>
        </div>
        <div>
          <div style="font-size:18px;font-weight:700;color:var(--green)">${fmt(alreadyPaid)}</div>
          <div style="font-size:11px;color:var(--muted)">Already Paid</div>
        </div>
        <div>
          <div style="font-size:18px;font-weight:700;color:var(--red)">${fmt(remaining)}</div>
          <div style="font-size:11px;color:var(--muted)">Balance</div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Payment Amount (₱) *</label>
      <input class="form-control" id="f_pay_amount" type="number" step="0.01" min="0.01" max="${remaining}" value="${remaining}" placeholder="Enter amount"
        style="font-size:18px;font-weight:700;color:var(--navy)" oninput="updatePayBalance(${remaining})">
      <div id="payBalPreview" style="font-size:12px;color:var(--muted);margin-top:5px">
        After this payment, balance will be <b style="color:var(--green)">₱0.00</b>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Payment Date *</label>
      <input class="form-control" id="f_pay_date" type="date" value="${today()}" style="font-size:15px;min-height:44px">
    </div>
    <div class="form-group">
      <label class="form-label">Payment Method</label>
      <select class="form-control" id="f_pay_method">
        ${['Cash','GCash','Maya','Card','Bank Transfer','HMO','Other'].map(m=>`<option${m===(b.payment_method||'Cash')?' selected':''}>${m}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Notes <span style="font-weight:400;color:var(--muted)">(e.g. "2nd installment")</span></label>
      <input class="form-control" id="f_pay_notes" placeholder="Optional note...">
    </div>
  `, ()=>{
    const payAmt = parseFloat(document.getElementById('f_pay_amount').value||0);
    const payDate = document.getElementById('f_pay_date').value;
    const payMethod = document.getElementById('f_pay_method').value;
    const payNotes = document.getElementById('f_pay_notes').value.trim();

    if(!payAmt || payAmt <= 0){ alert('Please enter a valid payment amount.'); return; }
    if(payAmt > remaining + 0.01){ alert(`Maximum payable is ${fmt(remaining)}`); return; }
    if(!payDate){ alert('Please enter the payment date.'); return; }

    const bil2 = load(KEYS.billing);
    const b2   = bil2[id];
    if(!b2.payments) b2.payments = [];

function updatePayBalance(remaining){
  const v = parseFloat(document.getElementById('f_pay_amount')?.value||0);
  const bal = Math.max(0, remaining - v);
  const prev = document.getElementById('payBalPreview');
  if(prev) prev.innerHTML = `After this payment, balance will be <b style="color:${bal>0?'var(--red)':'var(--green)'}">${fmt(bal)}</b>`;
}

// ── INSTALLMENT: Delete a single payment entry ────────────────────────────────
function deletePayment(billId, payIndex){
  if(!confirm('Remove this payment entry? The amount will be deducted from the total paid.')) return;
  const bil = load(KEYS.billing);
  const b   = bil[billId];
  if(!b || !b.payments) return;
  const removed = parseFloat(b.payments[payIndex].amount||0);
  b.payments.splice(payIndex, 1);
  const newPaid = Math.max(0, parseFloat(b.paid||0) - removed);
  b.paid   = parseFloat(newPaid.toFixed(2));
  b.status = newPaid <= 0 ? 'Unpaid' : newPaid >= parseFloat(b.amount||0) - 0.01 ? 'Paid' : 'Partial';
  save(KEYS.billing, bil, id);
  toast('🗑 Payment entry removed');
  closeModal();
  showBilling();
}

function deleteBill(id){
  const bil = load(KEYS.billing);
  const pts = load(KEYS.patients);
  const pname = pName(bil[id]||{}, pts);
  confirmDelete(`Delete bill for ${pname}?`, ()=>{
    delete bil[id]; save(KEYS.billing, bil, id);
    _sbDelete('billing', id);
    toast('🗑 Bill deleted'); showBilling();
  });
}

function exportBilling(){
  const bil = load(KEYS.billing);
  const pts = load(KEYS.patients);
  const rows = [['ID','Patient','Date','Services','Amount','Paid','Balance','Method','Status']];
  Object.entries(bil).forEach(([id,b])=>{
    const pname = (pts[b.patient_id]||{}).name||'';
    const amt = parseFloat(b.amount||0), paid = parseFloat(b.paid||0);
    rows.push([id,pname,b.date,b.services,amt,paid,amt-paid,b.payment_method,b.status]);
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'billing_export.csv';
  a.click();
  toast('📥 CSV exported!');
}

function showInventory(){
  const inv = load(KEYS.inventory);
  const now = new Date();
  const in30 = new Date(); in30.setDate(in30.getDate()+30);

  const rows = Object.entries(inv).map(([id,item])=>{
    const qty = parseFloat(item.quantity||0);
    const reorder = parseFloat(item.reorder||0);
    const status = qty <= reorder ? '⚠ Low' : 'OK';

    // Expiry check
    let expiryDisplay = item.expiry || '—';
    let rowStyle = '';
    if(item.expiry){
      const expD = new Date(item.expiry);
      if(!isNaN(expD)){
        if(expD < now){
          expiryDisplay = `<span style="color:var(--red);font-weight:700">🚫 EXPIRED ${item.expiry}</span>`;
          rowStyle = 'background:#FFF1F1';
        } else if(expD <= in30){
          expiryDisplay = `<span style="color:var(--yellow);font-weight:700">⚠️ ${item.expiry}</span>`;
          rowStyle = 'background:#FFFBEB';
        }
      }
    }

    return `<tr style="${rowStyle}">
      <td>${id}</td><td><b>${item.name}</b></td><td>${item.category||'—'}</td>
      <td>${qty}</td><td>${item.unit||'pcs'}</td><td>${reorder}</td>
      <td>${fmt(item.unit_cost)}</td><td>${item.supplier||'—'}</td>
      <td>${expiryDisplay}</td>
      <td>${badgeHtml(status)}</td>
      <td>
        <button class="btn btn-teal btn-sm" onclick="addStock('${id}')" title="Add stock">＋ Stock</button>
        <button class="btn btn-secondary btn-sm" onclick="editItem('${id}')">✏ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteItem('${id}')">🗑 Delete</button>
      </td>
    </tr>`;
  }).join('') || `<tr><td colspan="11"><div class="empty"><div class="empty-icon">📦</div><p>No items in inventory</p></div></td></tr>`;

  document.getElementById('main').innerHTML = `
    <div class="section-header">
      <div class="section-title">Inventory & Supplies</div>
      <div class="btn-row">
        <button class="btn btn-teal" onclick="exportInventory()">Export CSV</button>
        <button class="btn btn-primary" onclick="addItem()">＋ Add Item</button>
      </div>
    </div>
    <div class="table-wrap"><div class="table-scroll">
      <table><thead><tr>
        <th>ID</th><th>Item</th><th>Category</th><th>Qty</th><th>Unit</th><th>Reorder</th><th>Unit Cost</th><th>Supplier</th><th>Expiry</th><th>Status</th><th>Actions</th>
      </tr></thead><tbody>${rows}</tbody></table>
    </div></div>`;
}

function addItem(){
  openModal('Add Inventory Item', itemForm(), ()=>{
    if(!fval('name')){ alert('Item name required'); return; }
    const inv = load(KEYS.inventory);
    const id  = nextId(inv,'I');
    inv[id] = {category:fval('category'),name:fval('name'),quantity:fval('quantity'),
      unit:fval('unit'),reorder:fval('reorder'),unit_cost:fval('unit_cost'),
      supplier:fval('supplier'),expiry:fval('expiry')};
    save(KEYS.inventory, inv, id);
    closeModal(); toast('✅ Item added!'); showInventory();
  });
}

function editItem(id){
  const inv = load(KEYS.inventory);
  openModal('Edit Item', itemForm(inv[id]), ()=>{

    inv[id] = {...inv[id], category:fval('category'),name:fval('name'),quantity:fval('quantity'),
      unit:fval('unit'),reorder:fval('reorder'),unit_cost:fval('unit_cost'),

function addStock(id){
  const inv  = load(KEYS.inventory);
  const item = inv[id]; if(!item) return;
  openModal(`＋ Add Stock — ${item.name}`,`
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:32px">📦</div>
      <p style="color:var(--muted);font-size:13px;margin-top:6px">Current stock: <b>${item.quantity||0} ${item.unit||'pcs'}</b></p>
    </div>
    <div class="form-group">
      <label class="form-label">Quantity to Add *</label>
      <input class="form-control" id="f_stock_add" type="number" min="1" value="1" style="font-size:18px;text-align:center;padding:12px">
    </div>`,
    ()=>{
      const add = parseFloat(document.getElementById('f_stock_add').value||0);
      if(!add || add<=0){ alert('Enter a valid quantity'); return; }
      inv[id].quantity = String(parseFloat(item.quantity||0) + add);

      closeModal();
      toast(`✅ Added ${add} ${item.unit||'pcs'} to ${item.name}`);
      showInventory();
    }, '＋ Add Stock'
  );
  setTimeout(()=>document.getElementById('f_stock_add')?.select(), 150);

// CSV EXPORT HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function downloadCSV(filename, rows){
  // Add BOM for Excel to read Filipino characters correctly
  const bom = '\uFEFF';
  const csv = rows.map(r=>r.map(v=>{
    const s = (v===null||v===undefined) ? '' : String(v);
    return (s.includes(',')||s.includes('\n')||s.includes('"')) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\r\n');
  const content = bom + csv;
  const blob = new Blob([content], {type:'text/csv;charset=utf-8'});

  // Detect mobile/tablet
  const isMobile = /Android|iPhone|iPad|iPod|Mobile|Tablet/i.test(navigator.userAgent);

  // Try Web Share API first (works on Android + iOS Safari)
  if(isMobile && navigator.share){
    const file = new File([blob], filename, {type:'text/csv'});
    navigator.share({
      title: 'Dental City Clinic — Export',
      text: filename,
      files: [file]
    }).then(()=>{
      toast('📤 File shared successfully!');
    }).catch(err=>{
      if(err.name !== 'AbortError'){
        _showMobileExportModal(content, filename);
      }
    });
    return;
  }

  // Desktop — normal download
  if(!isMobile){
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 10000);
    toast('📥 '+filename+' exported!');
    return;
  }

  // Mobile fallback — show options modal
  _showMobileExportModal(content, filename);
}

  const modal = document.createElement('div');

  modal.innerHTML = `

      <!-- Header -->
      <div style="background:var(--navy);padding:18px 20px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-weight:700;font-size:15px;color:#fff">📤 Export File</div>

      </div>

      <!-- Options -->
      <div style="padding:16px;display:flex;flex-direction:column;gap:10px">

        <!-- Copy to clipboard -->
        <button onclick="_copyCSVToClipboard()" style="width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px">
          <span style="font-size:20px">📋</span>
          <div style="text-align:left">
            <div>Copy to Clipboard</div>
            <div style="font-size:11px;opacity:.8">Paste into Google Sheets or Excel</div>
          </div>
        </button>

        <!-- Open in new tab -->
        <button onclick="_openCSVNewTab()" style="width:100%;padding:14px;background:var(--teal);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px">
          <span style="font-size:20px">🌐</span>
          <div style="text-align:left">
            <div>Open in Browser</div>
            <div style="font-size:11px;opacity:.8">Then tap Share → Save to Files/Drive</div>
          </div>
        </button>

        <!-- Email option -->
        <button onclick="_emailCSV('${filename}')" style="width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px">
          <span style="font-size:20px">📧</span>
          <div style="text-align:left">
            <div>Send via Email</div>
            <div style="font-size:11px;opacity:.8">Opens your email app with file attached</div>
          </div>
        </button>

        <div style="font-size:11px;color:var(--muted);text-align:center;padding:4px 0">
          Tip: Use "Copy to Clipboard" then paste into Google Sheets 😊
        </div>
      </div>
    </div>`;

  // Store content for buttons to use
  window._csvExportContent = content;
  window._csvExportFilename = filename;

  // Close on backdrop tap
  modal.addEventListener('click', e=>{
    if(e.target === modal) modal.remove();
  });

  document.body.appendChild(modal);
}

function _copyCSVToClipboard(){
  const content = window._csvExportContent || '';
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(content).then(()=>{
      toast('📋 Copied! Paste into Google Sheets or Excel');
      document.getElementById('mobileExportModal')?.remove();
    }).catch(()=>{
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = content;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('📋 Copied! Paste into Google Sheets or Excel');
      document.getElementById('mobileExportModal')?.remove();
    });
  }
}

function _openCSVNewTab(){
  const content  = window._csvExportContent || '';
  const filename = window._csvExportFilename || 'export.csv';
  const blob = new Blob([content], {type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  window.open(url, '_blank');
  toast('💡 Tap Share ⬆️ → Save to Files or Google Drive');
  document.getElementById('mobileExportModal')?.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 30000);
}

function _emailCSV(filename){
  const content = window._csvExportContent || '';
  const subject = encodeURIComponent('Dental City Clinic — ' + filename);
  const body    = encodeURIComponent('Please find the exported data below:\n\n' + content.substring(0, 2000) + (content.length > 2000 ? '\n...(truncated)' : ''));
  window.open(`mailto:?subject=${subject}&body=${body}`);
  toast('📧 Opening email app...');
  document.getElementById('mobileExportModal')?.remove();
}

function exportPatients(){

    [],
    ['ID','Name','Age','Gender','Contact','Email','Address','Medical History','Allergies','Branch','Last Visit']

    .sort((a,b)=>(a[1].name||'').localeCompare(b[1].name||''))

const _AUTO_BACKUP_KEY  = 'dc_auto_backups';   // rolling JSON snapshots
const _LAST_AUTO_BACKUP = 'dc_last_auto_backup';

// Take a full JSON snapshot and store in localStorage (keeps last 3)
function takeAutoBackup(){
  try{
    const snapshot = {
      ts:      Date.now(),
      time:    new Date().toLocaleString('en-PH'),
      branch:  getBranchName() || 'Main',
      version: '3.0',
      data:{
        patients:     load(KEYS.patients),
        appointments: load(KEYS.appointments),
        treatments:   load(KEYS.treatments),
        billing:      load(KEYS.billing),
        inventory:    load(KEYS.inventory),
      }
    };
    let backups = [];
    try{ backups = JSON.parse(localStorage.getItem(_AUTO_BACKUP_KEY)||'[]'); }catch(e){}
    backups.unshift(snapshot);
    backups = backups.slice(0, 3); // keep last 3 snapshots
    localStorage.setItem(_AUTO_BACKUP_KEY, JSON.stringify(backups));
    localStorage.setItem(_LAST_AUTO_BACKUP, Date.now().toString());
    localStorage.setItem(KEYS.lastBackup, new Date().toISOString());
    return true;
  }catch(e){
    console.warn('Auto-backup failed:', e);
    return false;
  }
}

// Restore from a specific auto-backup snapshot
function restoreAutoBackup(index){
  try{
    const backups = JSON.parse(localStorage.getItem(_AUTO_BACKUP_KEY)||'[]');
    const snap = backups[index];
    if(!snap){ toast('❌ Backup not found'); return; }
    if(!confirm(`Restore backup from ${snap.time}?\n\nYour current data will be replaced.`)) return;
    const d = snap.data;
    if(d.patients)     save(KEYS.patients,     d.patients);
    if(d.appointments) save(KEYS.appointments, d.appointments);
    if(d.treatments)   save(KEYS.treatments,   d.treatments);
    if(d.billing)      save(KEYS.billing,       d.billing);
    if(d.inventory)    save(KEYS.inventory,     d.inventory);
    toast('✅ Backup restored!');
    showDashboard();
  }catch(e){ toast('❌ Restore failed: '+e.message); }
}

// Check if auto-backup is needed (every 12 hours)
function checkAutoBackup(){
  if(!_appUnlocked) return;
  const last   = parseInt(localStorage.getItem(_LAST_AUTO_BACKUP)||'0');
  const hours  = (Date.now() - last) / (1000 * 60 * 60);
  if(hours >= 12){
    const ok = takeAutoBackup();
    if(ok) console.log('✅ Auto-backup completed');
  }
}

// Get backup health status
function getBackupHealth(){
  const last = parseInt(localStorage.getItem(_LAST_AUTO_BACKUP)||'0');
  if(!last) return { status:'none', label:'No backup', color:'var(--red)' };
  const hours = (Date.now() - last) / (1000 * 60 * 60);
  if(hours < 12)  return { status:'good',    label:'Backed up ' + (hours<1?'recently':`${Math.floor(hours)}h ago`), color:'var(--green)' };
  if(hours < 48)  return { status:'warning', label:'Backup ' + Math.floor(hours) + 'h ago',  color:'var(--yellow)' };
                  return { status:'danger',  label:'Backup overdue!',                          color:'var(--red)'    };
}

// ── Force backup download every 3 days — non-dismissible ─────────────────────
function checkBackupReminder(){
  const last = localStorage.getItem(KEYS.lastBackup);
  const daysSince = last
    ? (Date.now() - new Date(last).getTime()) / (1000 * 60 * 60 * 24)
    : 999;

  // Auto-backup snapshot every 12 hours (silent)
  setTimeout(checkAutoBackup, 3000);

  setInterval(checkAutoBackup, 12 * 60 * 60 * 1000);

  if(daysSince >= 3){
    setTimeout(()=>_showBackupRequiredModal(daysSince), 2500);
  }
}

function importBackup(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const text = e.target.result.replace(/^\uFEFF/,''); // remove BOM
      const lines = text.split(/\r?\n/);

      // Parse sections
      const data = { patients:{}, appointments:{}, treatments:{}, billing:{}, inventory:{} };
      let section = null;
      let headers = [];
      let branchName = '';

      // Get branch from header row
      const headerLine = lines[1]||'';
      const bMatch = headerLine.match(/Branch[,:]+"?([^,"]+)"?/i);
      if(bMatch) branchName = bMatch[1].trim();

      for(let i=0; i<lines.length; i++){
        const line = lines[i].trim();
        if(!line) continue;

        // Section headers
        if(line.includes('=== PATIENTS ==='))     { section='patients';     headers=[]; continue; }
        if(line.includes('=== APPOINTMENTS ==='))  { section='appointments'; headers=[]; continue; }
        if(line.includes('=== TREATMENTS ==='))    { section='treatments';   headers=[]; continue; }
        if(line.includes('=== BILLING ==='))       { section='billing';      headers=[]; continue; }
        if(line.includes('=== INVENTORY ==='))     { section='inventory';    headers=[]; continue; }
        if(line.includes('=== END'))               { section=null; continue; }

        if(!section) continue;
        const cols = parseCSVLine(line);
        if(!cols.length || !cols[0]) continue;

        // First data row after section = headers
        if(!headers.length){ headers=cols; continue; }

        const id = cols[0];
        if(!id || id.startsWith('Total') || id.startsWith('===')) continue;

        const rec = {};
        headers.forEach((h,idx)=>{ if(idx>0) rec[h.toLowerCase().replace(/\s+/g,'_')] = cols[idx]||''; });

        // Map columns back to internal field names
        if(section==='patients'){
          data.patients[id] = {
            name:rec.name||'', age:rec.age||'', gender:rec.gender||'',
            contact:rec.contact||'', email:rec.email||'', address:rec.address||'',
            medical_history:rec.medical_history||'', allergies:rec.allergies||'',
            branch:rec.branch||branchName||''
          };
        } else if(section==='appointments'){
          data.appointments[id] = {
            patient_id:rec.patient_id||rec['patient id']||'',
            date:rec.date||'', time:rec.time||'', dentist:rec.dentist||'',
            type:rec.type||'', status:rec.status||'', branch:rec.branch||branchName||'',
            notes:rec.notes||''
          };
        } else if(section==='treatments'){
          data.treatments[id] = {
            patient_id:rec.patient_id||rec['patient id']||'',
            date:rec.date||'', procedure:rec.procedure||'', tooth:rec.tooth||'',
            dentist:rec.dentist||'', cost:rec.cost||'0', notes:rec.notes||''
          };
        } else if(section==='billing'){
          data.billing[id] = {
            patient_id:rec.patient_id||rec['patient id']||'',
            date:rec.date||'', services:rec.services||'',
            amount:rec.amount||'0', paid:rec.paid||'0',
            payment_method:rec.method||rec.payment_method||'',
            status:rec.status||'Unpaid', branch:rec.branch||branchName||''
          };
        } else if(section==='inventory'){
          data.inventory[id] = {
            name:rec.name||'', category:rec.category||'',
            quantity:rec.quantity||'0', unit:rec.unit||'',
            reorder:rec.reorder||'0', unit_cost:rec.unit_cost||'0',
            supplier:rec.supplier||''
          };
        }
      }

      const pts  = Object.keys(data.patients).length;
      const apts = Object.keys(data.appointments).length;
      const bil  = Object.keys(data.billing).length;
      const inv  = Object.keys(data.inventory).length;

      if(!pts && !apts){
        alert('❌ Could not read backup file.\n\nMake sure you are using a CSV exported from this system.');
        return;
      }

      if(!confirm(
        `⚠️ RESTORE from CSV backup?\n\nFrom: "${branchName||'Unknown Branch'}"\n\n` +
        `Contains:\n• ${pts} patient(s)\n• ${apts} appointment(s)\n• ${bil} bill(s)\n• ${inv} inventory item(s)\n\n` +
        `Your CURRENT data will be replaced. Are you sure?`
      )) return;

      if(pts)  save(KEYS.patients,     data.patients);
      if(apts) save(KEYS.appointments, data.appointments);
      if(Object.keys(data.treatments).length) save(KEYS.treatments, data.treatments);
      if(bil)  save(KEYS.billing,      data.billing);
      if(inv)  save(KEYS.inventory,    data.inventory);

      toast('✅ CSV Backup restored successfully!');
      showDashboard();
    } catch(err){
      alert('❌ Failed to read CSV file.\n\nError: '+err.message);
      console.error('Import error:', err);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── Parse a single CSV line (handles quoted values) ───────────────────────────
function parseCSVLine(line){
  const result = [];
  let current  = '';
  let inQuotes = false;
  for(let i=0; i<line.length; i++){
    const c = line[i];
    if(c==='"'){
      if(inQuotes && line[i+1]==='"'){ current+='"'; i++; }
      else inQuotes = !inQuotes;
    } else if(c===',' && !inQuotes){
      result.push(current.trim()); current='';
    } else { current+=c; }
  }
  result.push(current.trim());
  return result;
}

// 📈 REPORTS & ANALYTICS
// ══════════════════════════════════════════════════════════════════════════════
function showReports(){
  const allPts  = load(KEYS.patients);
  const allApts = load(KEYS.appointments);
  const allBil  = load(KEYS.billing);
  const allTxs  = load(KEYS.treatments);
  const pts     = _filterPatientsByBranch(allPts);
  const apts    = _filterByBranch(allApts, allPts);
  const bil     = _filterByBranch(allBil, allPts);
  const txs     = _filterByBranch(allTxs, allPts);
  const td      = today();
  const branch  = getBranchName() || 'All Branches';

  // ── 1. Monthly Revenue (last 12 months) ────────────────────────────────────
  const monthRevMap = {};
  for(let i=11;i>=0;i--){
    const d = new Date(); d.setMonth(d.getMonth()-i);
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    monthRevMap[key] = { billed:0, collected:0, month: d.toLocaleDateString('en-PH',{month:'short',year:'2-digit'}) };
  }
  Object.values(bil).forEach(b=>{
    const m = cleanDate(b.date).substring(0,7);
    if(monthRevMap[m]){
      monthRevMap[m].billed    += parseFloat(b.amount||0);
      monthRevMap[m].collected += parseFloat(b.paid||0);
    }
  });
  const months     = Object.values(monthRevMap);
  const maxRev     = Math.max(...months.map(m=>m.billed), 1);
  const thisMonth  = td.substring(0,7);
  const revenueBar = months.map(m=>{
    const pctB = Math.round((m.billed/maxRev)*100);
    const pctC = Math.round((m.collected/maxRev)*100);
    const isThis = Object.keys(monthRevMap).find(k=>monthRevMap[k]===m)===thisMonth;
    return `
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0">
        <div style="font-size:9px;color:var(--muted);text-align:center;white-space:nowrap">${m.billed>0?'₱'+(m.billed/1000).toFixed(0)+'k':''}</div>
        <div style="width:100%;background:var(--bg-2);border-radius:4px 4px 0 0;height:100px;display:flex;flex-direction:column;justify-content:flex-end;gap:1px">
          <div style="width:100%;height:${Math.max(pctC,2)}%;background:${isThis?'var(--green)':'#86EFAC'};border-radius:2px 2px 0 0;transition:height .4s"></div>
        </div>
        <div style="font-size:9px;color:${isThis?'var(--blue)':'var(--muted)'};font-weight:${isThis?700:400};text-align:center">${m.month}</div>
      </div>`;
  }).join('');

  // ── 2. Collection Rate ─────────────────────────────────────────────────────
  const totalBilled    = Object.values(bil).reduce((s,b)=>s+parseFloat(b.amount||0),0);
  const totalCollected = Object.values(bil).reduce((s,b)=>s+parseFloat(b.paid||0),0);
  const collectionRate = totalBilled > 0 ? Math.round((totalCollected/totalBilled)*100) : 0;
  const unpaidCount    = Object.values(bil).filter(b=>b.status==='Unpaid'||b.status==='Partial').length;
  const paidCount      = Object.values(bil).filter(b=>b.status==='Paid').length;
  const rateColor      = collectionRate>=80?'var(--green)':collectionRate>=60?'var(--yellow)':'var(--red)';

  // ── 3. Most Common Procedures ──────────────────────────────────────────────
  const procMap = {};
  Object.values(txs).forEach(t=>{
    const p = t.procedure||'Unknown';
    procMap[p] = (procMap[p]||0) + 1;
  });
  const topProcs = Object.entries(procMap)
    .sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxProc  = topProcs[0]?.[1] || 1;
  const procBars = topProcs.length ? topProcs.map(([name,count],i)=>{
    const pct   = Math.round((count/maxProc)*100);
    const colors= ['var(--blue)','var(--teal)','var(--green)','var(--purple)','var(--yellow)','var(--accent)'];
    return `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="font-size:12px;color:var(--text);min-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
        <div style="flex:1;background:var(--bg-2);border-radius:4px;height:8px">
          <div style="width:${pct}%;background:${colors[i%colors.length]};height:8px;border-radius:4px;transition:width .5s"></div>
        </div>
        <div style="font-size:12px;font-weight:700;color:var(--text-2);min-width:30px;text-align:right">${count}</div>
      </div>`;
  }).join('') : '<div style="color:var(--muted);font-size:13px;padding:16px 0">No treatment data yet</div>';

  // ── 4. Branch Comparison ───────────────────────────────────────────────────
  const branchRevMap = {};
  Object.values(allBil).forEach(b=>{
    const br = b.branch || (allPts[b.patient_id]||{}).branch || 'Unassigned';
    if(!branchRevMap[br]) branchRevMap[br] = { collected:0, billed:0, patients:0 };
    branchRevMap[br].collected += parseFloat(b.paid||0);

// ── Export full report as CSV ──────────────────────────────────────────────────
function exportFullReport(){
  const allBil  = load(KEYS.billing);
  const allPts  = load(KEYS.patients);
  const allTxs  = load(KEYS.treatments);
  const bil     = _filterByBranch(allBil, allPts);
  const txs     = _filterByBranch(allTxs, allPts);
  const branch  = getBranchName() || 'All Branches';

  const totalBilled    = Object.values(bil).reduce((s,b)=>s+parseFloat(b.amount||0),0);
  const totalCollected = Object.values(bil).reduce((s,b)=>s+parseFloat(b.paid||0),0);
  const collectionRate = totalBilled > 0 ? Math.round((totalCollected/totalBilled)*100) : 0;

  const procMap = {};
  Object.values(txs).forEach(t=>{ const p=t.procedure||'Unknown'; procMap[p]=(procMap[p]||0)+1; });

  const rows = [
    ['DENTAL CITY CLINIC — ANALYTICS REPORT'],
    ['Branch:', branch, 'Generated:', new Date().toLocaleString('en-PH')],
    [],
    ['=== REVENUE SUMMARY ==='],
    ['Total Billed','Total Collected','Outstanding','Collection Rate'],
    [totalBilled.toFixed(2), totalCollected.toFixed(2), (totalBilled-totalCollected).toFixed(2), collectionRate+'%'],
    [],
    ['=== MONTHLY REVENUE (Last 12 Months) ==='],
    ['Month','Billed','Collected','Outstanding'],
  ];

  for(let i=11;i>=0;i--){
    const d = new Date(); d.setMonth(d.getMonth()-i);
    const key  = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const label= d.toLocaleDateString('en-PH',{month:'long',year:'numeric'});
    let billed=0, collected=0;
    Object.values(bil).forEach(b=>{ if(cleanDate(b.date).startsWith(key)){ billed+=parseFloat(b.amount||0); collected+=parseFloat(b.paid||0); }});
    rows.push([label, billed.toFixed(2), collected.toFixed(2), (billed-collected).toFixed(2)]);
  }

  rows.push([],['=== TOP PROCEDURES ==='],['Procedure','Count']);
  Object.entries(procMap).sort((a,b)=>b[1]-a[1]).forEach(([name,count])=>rows.push([name,count]));

  downloadCSV(`analytics_report_${branch}_${today()}.csv`, rows);
  toast('📥 Analytics report exported!');
}

// ── Fetch data from all configured branch sheets ──────────────────────────────
async function _fetchAllBranchData(){
  const cfg = getSBConfig();

  // Load local data first
  const allPts  = Object.assign({}, load(KEYS.patients));
  const allApts = Object.assign({}, load(KEYS.appointments));
  const allBil  = Object.assign({}, load(KEYS.billing));

  // If Supabase configured — pull ALL data (owner sees everything)
  if(cfg.url && cfg.key){
    const status = document.getElementById('mbLoadStatus');
    try{
      if(status) status.textContent = 'Pulling all branches from Supabase…';
      const [pts, apts, bil] = await Promise.all([
        _sbFetch('patients?select=*&limit=10000'),
        _sbFetch('appointments?select=*&limit=10000'),
        _sbFetch('billing?select=*&limit=10000'),
      ]);
      if(Array.isArray(pts))  pts.forEach(r=>{ allPts[r.id]  = r; });
      if(Array.isArray(apts)) apts.forEach(r=>{ allApts[r.id] = r; });
      if(Array.isArray(bil))  bil.forEach(r=>{ allBil[r.id]  = r; });
      if(status) status.textContent = 'Done!';
    }catch(e){
      console.warn('Supabase multi-branch fetch failed:', e);
      if(status) status.textContent = 'Using local data (offline)';
    }
  }

  return { pts: allPts, apts: allApts, bil: allBil };
}

// ── Render Multi-Branch view with combined data ───────────────────────────────
function _renderMultiBranch({ pts, apts, bil }){
  const td = today();
  const branchMap = {};
  const _branchColor = ['#1A7FC1','#16A34A','#7C3AED','#D97706','#DC2626','#0891B2','#BE185D','#065F46','#92400E'];

  function _resolveBranch(record){
    let b = (record.branch||'').trim();
    if(b && b !== '—' && b !== 'undefined' && b !== 'null') return b;
    if(record.patient_id){
      b = (pts[record.patient_id]||{}).branch||'';
      if(b && b !== '—') return b;
    }
    if(record.patient_name){
      const found = Object.values(pts).find(p=>p.name===record.patient_name);
      b = (found||{}).branch||'';
      if(b && b !== '—') return b;
    }
    return 'Unassigned';
  }

  Object.entries(pts).forEach(([id,p])=>{
    const b = (p.branch||'').trim() || 'Unassigned';
    if(!branchMap[b]) branchMap[b] = {patients:{}, appointments:{}, billing:{}};
    branchMap[b].patients[id] = p;
  });
  Object.entries(apts).forEach(([id,a])=>{
    const b = _resolveBranch(a);
    if(!branchMap[b]) branchMap[b] = {patients:{}, appointments:{}, billing:{}};
    branchMap[b].appointments[id] = a;

  Object.entries(bil).forEach(([id,bill])=>{
    const b = _resolveBranch(bill);
    if(!branchMap[b]) branchMap[b] = {patients:{}, appointments:{}, billing:{}};
    branchMap[b].billing[id] = bill;

  const branchList = Object.entries(branchMap);

let _activeBranchFilter = null;

function clearBranchFilter(){
  _activeBranchFilter = null;
  const badge = document.getElementById('branchFilterBadge');

}
function showBranchTab(tab, btn){

  ['patients','appointments','billing'].forEach(t=>{
    const b = document.getElementById('mbTab_'+t);
    if(b) b.className = 'btn btn-sm ' + (t===tab?'btn-primary':'btn-secondary');
  });

  const branchMap   = window._mbBranchMap || {};
  const branchColor = window._mbBranchColor || [];
  const pts         = window._mbAllPts || load(KEYS.patients);

  // Apply branch filter if active
  const filtered = _activeBranchFilter
    ? Object.entries(branchMap).filter(([name])=>name===_activeBranchFilter)
    : Object.entries(branchMap);

  const branchList = filtered;
  let html = '';

  if(tab === 'patients'){
    const rows = branchList.flatMap(([bname,b], i)=>{

        .sort((a,c)=>(c[1].date||'').localeCompare(a[1].date||''))

function importBranchBackup(e){
  const files = Array.from(e.target.files);
  if(!files.length) return;
  let loaded = 0;
  const branches = getBranches();
  const colorIdx = Object.keys(branches).length;

  files.forEach((file, i)=>{
    const reader = new FileReader();
    reader.onload = function(ev){
      try{
        const data = JSON.parse(ev.target.result);
        if(!data.version){ alert(`❌ ${file.name} is not a valid backup file.`); return; }
        // Use branch_name from file if available, otherwise use filename
        const branchName = data.branch_name ||
          file.name.replace('.json','').replace('dental_clinic_backup_','').replace(/_/g,' ');
        const id = 'B' + Date.now() + i;
        branches[id] = {
          name:         branchName,
          color:        BRANCH_COLORS[(colorIdx+i) % BRANCH_COLORS.length],
          imported:     new Date().toISOString(),
          patients:     data.patients     || {},
          appointments: data.appointments || {},
          treatments:   data.treatments   || {},
          billing:      data.billing      || {},
          inventory:    data.inventory    || {},
        };
        loaded++;
        if(loaded === files.length){
          saveBranches(branches);
          toast(`✅ ${loaded} branch backup(s) imported!`);
          showMultiBranch();
        }
      } catch(err){
        alert(`❌ Failed to read ${file.name}`);
      }
    };
    reader.readAsText(file);
  });
  e.target.value = '';
}

function renameBranch(id){
  const branches = getBranches();
  const current = branches[id]?.name || id;
  const newName = prompt('Enter branch name:', current);
  if(newName && newName.trim()){
    branches[id].name = newName.trim();
    saveBranches(branches);
    toast('✅ Branch renamed!');
    showMultiBranch();
  }
}

function removeBranch(id){
  const branches = getBranches();
  if(confirm(`Remove branch "${branches[id]?.name}"?\nThis only removes it from the multi-branch view, not the actual data.`)){
    delete branches[id];
    saveBranches(branches);
    toast('🗑 Branch removed from view');
    showMultiBranch();
  }
}

function exportAllBranches(){
  const branches = getBranches();
  const rows = [['Branch','Patient ID','Patient Name','Date','Services','Amount','Paid','Balance','Status']];
  Object.entries(branches).forEach(([,b])=>{
    Object.entries(b.billing||{}).forEach(([,bill])=>{
      const pname = (b.patients||{})[bill.patient_id]?.name||'—';
      const amt  = parseFloat(bill.amount||0);
      const paid = parseFloat(bill.paid||0);
      rows.push([b.name, bill.patient_id, pname, bill.date,
                 bill.services, amt, paid, amt-paid, bill.status]);
    });
  });
  downloadCSV(`all_branches_${today()}.csv`, rows);
}

function downloadPatientQR(id, name){
  const canvas = document.querySelector(`#qrcode_${id} canvas`);
  if(!canvas){ alert('QR not ready yet.'); return; }
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `QR_${name.replace(/\s+/g,'_')}_${id}.png`;
  a.click(); toast('⬇ QR downloaded!');
}

function uploadXray(input, pid){
  const files = Array.from(input.files);
  if(!files.length) return;
  const pts = load(KEYS.patients);
  const p   = pts[pid]||{};
  let uploaded = 0;

  files.forEach(file=>{
    if(!file.type.startsWith('image/')){ toast('⚠️ Only image files allowed'); return; }
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        // Compress X-ray — larger than photo but still manageable
        const MAX = 800;
        let w = img.width, h = img.height;
        if(w > MAX){ h = Math.round(h*MAX/w); w = MAX; }
        else if(h > MAX){ w = Math.round(w*MAX/h); h = MAX; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.75);

        // Ask for label
        const label = prompt(`Label for X-Ray ${uploaded+1} of ${files.length}:\n(e.g. Upper Jaw, Lower Jaw, Full Mouth, Periapical)`, 'Dental X-Ray');
        if(label === null) return; // cancelled

        const xrays = load(KEYS.xrays);
        const xid   = nextId(xrays, 'X');
        xrays[xid]  = {
          patient_id:   pid,
          patient_name: p.name||'',
          date:         today(),
          label:        label||'Dental X-Ray',
          type:         'X-Ray',
          notes:        '',
          image:        compressed,
          branch:       getBranchName()||'Main Branch',
          size:         Math.round(compressed.length*0.75/1024)+'KB'
        };
        DB.set(KEYS.xrays, xrays); // save locally only — images too large for Supabase free
        uploaded++;
        toast(`✅ X-Ray uploaded! (${Math.round(compressed.length*0.75/1024)}KB)`);
        loadXrays(pid); // refresh grid
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function switchQR(type, id){
  const sec  = document.getElementById('qrTabSecure');
  const pub  = document.getElementById('qrTabPublic');
  const phn  = document.getElementById('qrTabPhone');
  const desc = document.getElementById('qrDesc');
  const C_BLUE='var(--blue)', C_GREEN='#16A34A', C_TRANS='transparent', C_TXT='var(--text)';
  [sec,pub,phn].forEach(b=>{ if(b){b.style.background=C_TRANS;b.style.color=C_TXT;} });
  if(type==='secure'){
    sec.style.background=C_BLUE; sec.style.color='#fff';
    desc.innerHTML='🔒 <b>Secure QR</b> — Patient ID only. Only your app shows the info. Best for clinic privacy.';
    desc.style.color='var(--muted)';
    renderQR(id,'secure');
  } else if(type==='public'){
    pub.style.background='#7C3AED'; pub.style.color='#fff';
    desc.innerHTML='📋 <b>Public QR</b> — Embeds basic patient info. <span style="color:var(--red)">⚠️ Any scanner sees the data.</span>';
    desc.style.color='var(--muted)';

    renderPhoneQR(id);
  }
}

// ── QR helper: build API image URL ───────────────────────────────────────────
function _qrApiUrl(text, color, size){
  const safe = text.replace(/[^\x20-\x7E\n]/g,'').trim().slice(0,300);
  return 'https://api.qrserver.com/v1/create-qr-code/?size='+(size||220)+'x'+(size||220)
    +'&color='+(color||'0B3D6E')+'&bgcolor=ffffff&ecc=M&data='+encodeURIComponent(safe);
}

// ── Render QR into a div ──────────────────────────────────────────────────────
function renderQR(id, type){
  const el = document.getElementById('qrdiv_'+id);
  if(!el || !window._qrData) return;

  const rawText = type==='public' ? window._qrData.publicText : window._qrData.secureText;
  const color   = type==='public' ? '7C3AED' : '0B3D6E';

  el.style.cssText = 'padding:12px;background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(11,61,110,0.08);text-align:center;min-height:220px;min-width:220px;display:flex;align-items:center;justify-content:center;flex-direction:column;';
  el.innerHTML = '<div style="color:#6B84A0;font-size:12px">⏳ Generating QR…</div>';

  const img = new Image();
  img.width = 220; img.height = 220;
  img.crossOrigin = 'anonymous';
  img.style.cssText = 'border-radius:8px;display:block;';
  img.onload = () => { el.innerHTML=''; el.appendChild(img); };
  img.onerror = () => {
    // Fallback to qrcodejs library if API fails
    el.innerHTML = '';
    if(typeof QRCode !== 'undefined'){
      try{
        new QRCode(el, {
          text: rawText.replace(/[^\x20-\x7E\n]/g,'').trim().slice(0,200),
          width:220, height:220,
          colorDark:'#'+color, colorLight:'#ffffff',
          correctLevel: type==='public' ? QRCode.CorrectLevel.L : QRCode.CorrectLevel.H
        });
      } catch(e){
        el.innerHTML='<div style="color:#DC2626;font-size:12px;padding:16px">⚠️ Could not generate QR.<br>Check internet connection.</div>';
      }
    } else {
      el.innerHTML='<div style="color:#D97706;font-size:12px;padding:16px;text-align:center">⚠️ QR needs internet connection.<br>Please connect and try again.</div>';
    }
  };
  img.src = _qrApiUrl(rawText, color, 220);
}

async function renderPhoneQR(id){
  const el = document.getElementById('qrdiv_'+id);
  if(!el || !window._qrData) return;

  const p        = window._qrData.patient || {};
  const pid      = window._qrData.id;
  const lastVisit= window._qrData.lastVisit || null;
  const nextApt  = window._qrData.nextApt  || null;

  el.innerHTML = '<div style="padding:14px;color:var(--muted);font-size:12px;text-align:center">⏳ Building patient card…</div>';

  // Build the URL that the QR will point to
  // When scanned from any phone — opens the patient card page directly
  const base    = window.location.href.split('?')[0];
  const cardUrl = base + '?card=' + encodeURIComponent(pid);

  // Store for open on this device button
  window._lastPhoneCardHtml = _buildMiniCard(p, pid, lastVisit, nextApt);

function dlQR(id,name){
  const img=document.querySelector('#qrdiv_'+id+' img');
  const c=document.querySelector('#qrdiv_'+id+' canvas');
  const fname='QR_'+name.replace(/\s+/g,'_')+'_'+id+'.png';
  if(img&&img.src){
    // Try canvas draw (works if crossOrigin set)
    try{
      const cv=document.createElement('canvas'); cv.width=220; cv.height=220;
      cv.getContext('2d').drawImage(img,0,0,220,220);
      _downloadBlob(cv.toDataURL('image/png'),fname);
    }catch(e){ _downloadBlob(img.src,fname); }
    toast(_isIOS?'💡 Long-press image to save':'⬇ QR downloaded!');
  } else if(c){
    _downloadBlob(c.toDataURL('image/png'),fname);
    toast(_isIOS?'💡 Long-press image to save':'⬇ QR downloaded!');
  } else {
    alert('QR not ready yet.');
  }
}

// ── Compress photo for push ───────────────────────────────────────────────────
async function _compressPhoto(b64, size=80, q=0.4){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=c.height=size;
      c.getContext('2d').drawImage(img,
        (img.width-Math.min(img.width,img.height))/2,
        (img.height-Math.min(img.width,img.height))/2,
        Math.min(img.width,img.height), Math.min(img.width,img.height),
        0,0,size,size);
      res(c.toDataURL('image/jpeg',q).split(',')[1]);
    };
    img.onerror=()=>res(null);
    img.src='data:image/jpeg;base64,'+b64;
  });
}

        </div>
      </div>
    </div>`;

  setTimeout(()=>document.getElementById('qrInput')?.focus(),300);
}

function processInput(){
  const val=document.getElementById('qrInput')?.value?.trim();
  if(!val)return;
  document.getElementById('qrInput').value='';
  document.getElementById('qrInput').focus();
  handleScan(val);
}

function handleScan(text){
  text=text.trim();
  let id=text;
  if(text.startsWith('DENTAL:')) id=text.split(':')[1];
  else if(text.startsWith('DENTAL_PATIENT:')) id=text.split(':')[1];

  const pts=load(KEYS.patients);
  // Try exact ID
  let p=pts[id?.trim()];
  // Try case-insensitive
  if(!p){ const k=Object.keys(pts).find(k=>k.toLowerCase()===id?.toLowerCase()); if(k) p=pts[k]; id=k||id; }
  // Try name search
  if(!p){ const entry=Object.entries(pts).find(([,v])=>v.name?.toLowerCase().includes(text.toLowerCase())); if(entry){id=entry[0];p=entry[1];} }

  if(!p){
    toast('❌ Patient not found: '+text);
    const log=document.getElementById('scanLog');
    if(log){
      const err=document.createElement('div');
      err.style.cssText='background:var(--red-bg);border:1.5px solid var(--red);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:13px;color:var(--red);';
      err.textContent='❌ Not found: '+text;
      log.insertBefore(err,log.firstChild);
      setTimeout(()=>err.remove(),4000);
    }
    return;
  }

  // Build full record
  const apts=load(KEYS.appointments), bil=load(KEYS.billing), txs=load(KEYS.treatments);
  const patApts=Object.values(apts).filter(a=>a.patient_id===id).sort((a,b)=>b.date.localeCompare(a.date));
  const patBills=Object.values(bil).filter(b=>b.patient_id===id).sort((a,b)=>b.date.localeCompare(a.date));
  const totalBilled=patBills.reduce((s,b)=>s+parseFloat(b.amount||0),0);
  const totalPaid=patBills.filter(b=>b.status==='Paid').reduce((s,b)=>s+parseFloat(b.amount||0),0);
  const unpaidBills=patBills.filter(b=>b.status==='Unpaid'||b.status==='Partial');
  const patTxs=Object.values(txs).filter(t=>t.patient_id===id).sort((a,b)=>b.date.localeCompare(a.date));
  const lastApt=patApts[0];
  const now=new Date();
  const scanTime=now.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});

  // All treatments as a readable string (most recent 10)
  const txList=patTxs.slice(0,10).map(t=>`${t.date}: ${t.procedure||'—'}${t.tooth?' (Tooth '+t.tooth+')':''} - ₱${parseFloat(t.cost||0).toFixed(2)}`).join(' | ');

  // All unpaid bills as string
  const unpaidList=unpaidBills.map(b=>`${b.date}: ${b.services||'—'} ₱${parseFloat(b.amount||0).toFixed(2)} (${b.status})`).join(' | ');

  const record={
    id, scanTime, scanDate:today(),
    name:p.name||'',age:p.age||'',gender:p.gender||'',
    contact:p.contact||'',email:p.email||'',address:p.address||'',
    medical_history:p.medical_history||'',allergies:p.allergies||'',
    // Billing
    totalBilled:totalBilled.toFixed(2),
    totalPaid:totalPaid.toFixed(2),
    balance:(totalBilled-totalPaid).toFixed(2),
    unpaidCount:unpaidBills.length,
    unpaidList:unpaidList||'None',
    lastBillDate:patBills[0]?.date||'',
    lastBillServices:patBills[0]?.services||'',
    lastBillAmount:patBills[0]?.amount||'0',
    lastBillStatus:patBills[0]?.status||'',
    // Appointments
    totalVisits:patApts.filter(a=>a.status==='Completed').length,
    totalApts:patApts.length,
    lastApt:lastApt?.date||'',
    lastAptType:lastApt?.type||'',
    lastAptDentist:lastApt?.dentist||'',
    lastAptStatus:lastApt?.status||'',
    // Treatments
    totalTreatments:patTxs.length,
    lastTreatment:patTxs[0]?.procedure||'',
    lastTreatmentDate:patTxs[0]?.date||'',
    lastTreatmentTooth:patTxs[0]?.tooth||'',
    lastTreatmentCost:patTxs[0]?.cost||'0',
    lastTreatmentDentist:patTxs[0]?.dentist||'',
    treatmentHistory:txList||'None',
    // Raw arrays for multi-row export
    _txs:patTxs, _bills:patBills,
  };

  // Remove duplicate scan of same patient
  _scanned=_scanned.filter(r=>r.id!==id);
  _scanned.push(record);
  toast('✅ '+p.name+' added to preview!');

  // Update only the scan log + counts (don't re-render the whole page or it stops the camera)
  const log = document.getElementById('scanLog');
  if(log) log.innerHTML = _buildScanLog();
  const dlBtn = document.querySelector('[onclick="dlScannedCSV()"]');
  if(dlBtn) dlBtn.textContent = '⬇ Download Excel ('+_scanned.length+' records)';
  const countLabels = document.querySelectorAll('#main span[id="scanCount"]');
  countLabels.forEach(el => el.textContent = _scanned.length);
}

function removeScanned(id){
  _scanned = _scanned.filter(r=>r.id!==id);
  const log = document.getElementById('scanLog');
  if(log){
    log.innerHTML = _scanned.length ? _buildScanLog()
      : '<div style="background:var(--bg);border-radius:var(--radius);padding:32px;text-align:center;color:var(--muted)"><div style="font-size:32px;margin-bottom:8px">📋</div>Scanned patients will appear here.</div>';
  }
  const dlBtn = document.querySelector('[onclick="dlScannedCSV()"]');
  if(dlBtn) dlBtn.textContent = '⬇ Download Excel ('+_scanned.length+' records)';
  const countLabel = document.getElementById('scanCount');
  if(countLabel) countLabel.textContent = _scanned.length;
}
function clearScanned(){
  if(!_scanned.length) return;
  if(confirm('Clear all scanned records?')){
    _scanned = [];
    const log = document.getElementById('scanLog');
    if(log) log.innerHTML = '<div style="background:var(--bg);border-radius:var(--radius);padding:32px;text-align:center;color:var(--muted)"><div style="font-size:32px;margin-bottom:8px">📋</div>Scanned patients will appear here.</div>';

    if(dlBtn) dlBtn.textContent = '⬇ Download Excel (0 records)';
    const countLabel = document.getElementById('scanCount');

function _dlRecords(records, filename){
  const esc=v=>{ const s=String(v===undefined||v===null?'':v); return (s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s; };
  const rows=[];

  records.forEach((r,i)=>{
    // Separator between patients
    if(i>0){ rows.push([]); rows.push(['--- NEXT PATIENT ---']); rows.push([]); }

    // ── PATIENT INFO ──
    rows.push(['=== PATIENT INFORMATION ===']);
    rows.push(['Scan Date','Scan Time','Patient ID','Name','Age','Gender']);
    rows.push([r.scanDate,r.scanTime,r.id,r.name,r.age,r.gender]);
    rows.push([]);
    rows.push(['Contact','Email','Address','Medical History','Allergies']);
    rows.push([r.contact,r.email,r.address,r.medical_history,r.allergies]);
    rows.push([]);

    // ── BILLING SUMMARY ──
    rows.push(['=== BILLING SUMMARY ===']);
    rows.push(['Total Billed','Total Paid','BALANCE DUE','Unpaid Bills']);
    rows.push(['₱'+r.totalBilled,'₱'+r.totalPaid,'₱'+r.balance,r.unpaidCount]);
    rows.push([]);

    // ── BILLING DETAILS ──
    if(r._bills && r._bills.length){
      rows.push(['=== BILLING DETAILS ===']);
      rows.push(['Date','Services','Amount','Paid','Balance','Status','Payment Method']);
      r._bills.forEach(b=>{
        const amt=parseFloat(b.amount||0), paid=parseFloat(b.paid||0);
        rows.push([b.date,b.services||'—','₱'+amt.toFixed(2),'₱'+paid.toFixed(2),'₱'+(amt-paid).toFixed(2),b.status||'—',b.payment_method||'—']);
      });
      rows.push([]);
    }

    // ── TREATMENT HISTORY ──
    if(r._txs && r._txs.length){
      rows.push(['=== TREATMENT HISTORY ===']);
      rows.push(['Date','Procedure','Tooth No.','Dentist','Cost','Notes']);
      r._txs.forEach(t=>{
        rows.push([t.date,t.procedure||'—',t.tooth||'—',t.dentist||'—','₱'+parseFloat(t.cost||0).toFixed(2),t.notes||'']);
      });
      rows.push([]);
    } else {
      rows.push(['=== TREATMENT HISTORY ===']);
      rows.push(['No treatment records found']);
      rows.push([]);
    }

    // ── APPOINTMENT HISTORY ──
    rows.push(['=== APPOINTMENT SUMMARY ===']);
    rows.push(['Total Appointments','Completed Visits','Last Appointment','Last Apt Type','Last Apt Dentist','Last Apt Status']);
    rows.push([r.totalApts,r.totalVisits,r.lastApt,r.lastAptType,r.lastAptDentist,r.lastAptStatus]);
  });

  const csv=rows.map(r=>r.map(esc).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=filename; a.click();
}

function dlSingleRecord(id){ const r=_scanned.find(s=>s.id===id); if(r) _dlRecords([r],r.name.replace(/\s+/g,'_')+'_record.csv'); }
function dlScannedCSV(){
  if(!_scanned.length){alert('No scanned records yet. Scan some patients first!');return;}
  _dlRecords(_scanned,'scanned_patients_'+today()+'.csv');
  toast('✅ Excel file downloaded!');
}

// ── Camera ────────────────────────────────────────────────────────────────────
function startCam(){
  const video=document.getElementById('qr-video'), status=document.getElementById('camStatus');
  if(!video){alert('Go to QR Scanner page first');return;}
  if(typeof jsQR==='undefined'){
    status.textContent='⏳ Loading decoder...';
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js';
    s.onload=()=>_startStream(video,status);
    s.onerror=()=>{status.textContent='❌ No internet. Use USB/manual input.';status.style.color='var(--red)';};
    document.head.appendChild(s);
  } else _startStream(video,status);
}

function _startStream(video,status){
  video.setAttribute('playsinline',true); video.muted=true;
  const tries=[{video:{facingMode:{exact:'environment'}}},{video:{facingMode:'environment'}},{video:true}];
  function tryNext(i){
    if(i>=tries.length){status.innerHTML='❌ Camera blocked.<br><small>Use USB/manual input or allow camera in Settings.</small>';status.style.color='var(--red)';return;}
    navigator.mediaDevices.getUserMedia(tries[i]).then(stream=>{
      _qrStream=stream; video.srcObject=stream;
      video.play().then(()=>{
        status.textContent='✅ Camera active — point at QR code';status.style.color='var(--green)';
        video.addEventListener('loadeddata',()=>_decode(video),{once:true});
        if(video.readyState>=2)_decode(video);
      }).catch(()=>tryNext(i+1));
    }).catch(()=>tryNext(i+1));
  }
  tryNext(0);
}

function _decode(video){
  if(_qrInterval){clearInterval(_qrInterval);_qrInterval=null;}
  const canvas=document.getElementById('qr-canvas'),ctx=canvas.getContext('2d');
  let last='',busy=false;
  _qrInterval=setInterval(()=>{
    if(busy||!video||video.paused||!video.videoWidth)return;
    busy=true;
    canvas.width=video.videoWidth; canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);
    try{
      const d=jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data,canvas.width,canvas.height,{inversionAttempts:'attemptBoth'});
      if(d&&d.data&&d.data!==last){last=d.data;handleScan(d.data);setTimeout(()=>{last='';},3000);}
    }catch(e){}
    busy=false;
  },400);
}

function stopCam(){ _stopCam(); const s=document.getElementById('camStatus'); if(s){s.textContent='Camera stopped.';s.style.color='var(--muted)';} }
function _stopCam(){ if(_qrInterval){clearInterval(_qrInterval);_qrInterval=null;} if(_qrStream){_qrStream.getTracks().forEach(t=>t.stop());_qrStream=null;} }

// ── Scroll hint: show ›› arrow when table is wider than its container ─────────
function initScrollHints(){
  document.querySelectorAll('.table-wrap').forEach(wrap=>{
    const scroll = wrap.querySelector('.table-scroll');
    if(!scroll) return;
    // Add hint element if not already there
    if(!wrap.querySelector('.scroll-hint')){
      const hint = document.createElement('div');
      hint.className = 'scroll-hint';
      hint.textContent = '›';
      wrap.appendChild(hint);
    }
    const hint = wrap.querySelector('.scroll-hint');
    const check = () => {
      const scrollable = scroll.scrollWidth > scroll.clientWidth + 4;
      const atEnd = scroll.scrollLeft + scroll.clientWidth >= scroll.scrollWidth - 8;
      hint.classList.toggle('show', scrollable && !atEnd);
    };
    scroll.addEventListener('scroll', check);
    setTimeout(check, 300);
  });
}
